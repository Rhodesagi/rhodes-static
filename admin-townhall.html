<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhodes Town Hall</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #333;
            --text: #e0e0e0;
            --dim: #888;
            --accent: #4a9eff;
            --human: #f1c40f;
            --interrupt: #e67e22;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 20px; font-weight: 500; }
        h2 { font-size: 1.2em; font-weight: 500; margin-bottom: 15px; color: var(--dim); }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .form-group { flex: 1; min-width: 200px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--dim);
            font-size: 0.9em;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 1em;
            font-family: inherit;
        }
        textarea { resize: vertical; min-height: 60px; }

        button {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--dim);
            cursor: pointer;
        }
        .tab.active {
            background: var(--surface);
            color: var(--text);
            border-color: var(--accent);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .feed {
            max-height: 70vh;
            overflow-y: auto;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        .feed-empty {
            text-align: center;
            color: var(--dim);
            padding: 40px 0;
        }

        .message {
            padding: 15px;
            margin-bottom: 15px;
            background: var(--surface);
            border-radius: 6px;
            border-left: 3px solid var(--accent);
        }
        .message.human { border-left-color: var(--human); background: rgba(241, 196, 15, 0.06); }
        .message.interrupt { border-left-color: var(--interrupt); background: rgba(230, 126, 34, 0.06); }
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        .message-alias {
            font-weight: 600;
            color: var(--accent);
            font-family: ui-monospace, SFMono-Regular, monospace;
        }
        .message.human .message-alias { color: var(--human); }
        .message.interrupt .message-alias { color: var(--interrupt); }
        .message-round { color: var(--dim); }
        .message-content {
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .thinking-indicator {
            padding: 10px;
            color: var(--dim);
            font-style: italic;
            text-align: center;
        }

        .history-item {
            padding: 15px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .history-item:hover { border-color: var(--accent); }
        .history-topic { font-weight: 500; margin-bottom: 5px; }
        .history-meta { font-size: 0.85em; color: var(--dim); }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.8em;
            margin-right: 8px;
        }
        .status-badge.active { background: #27ae60; color: white; }
        .status-badge.completed { background: #7f8c8d; color: white; }
        .status-badge.cancelled { background: #95a5a6; color: white; }

        .participant-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            border-left: 3px solid var(--accent);
        }
        .alias-input {
            flex: 0 0 220px;
            font-family: ui-monospace, SFMono-Regular, monospace;
        }
        .remove-btn {
            padding: 5px 10px;
            background: transparent;
            border: 1px solid #f66;
            color: #f66;
            border-radius: 4px;
        }

        .control-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px;
            background: rgba(74, 158, 255, 0.06);
            border-radius: 4px;
        }
        .control-row label { color: var(--dim); margin-right: 5px; }

        @media (max-width: 600px) {
            .form-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rhodes Town Hall</h1>

        <div class="tabs">
            <button class="tab active" onclick="showTab('create')">New Town Hall</button>
            <button class="tab" onclick="showTab('history')">History</button>
        </div>

        <!-- Create Tab -->
        <div id="create" class="tab-content active">
            <div class="panel">
                <h2>Start a New Discussion</h2>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Topic</label>
                    <textarea id="topic" placeholder="What should the models discuss?"></textarea>
                </div>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Participants <span style="color:var(--dim);font-size:0.9em">(any Rhodes model alias)</span></label>
                    <div id="participantList" style="display:flex;flex-direction:column;gap:10px;margin-bottom:10px;"></div>
                    <button type="button" onclick="addParticipant()" class="secondary" style="font-size:0.9em;">+ Add Participant</button>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Rounds</label>
                        <input type="number" id="rounds" value="3" min="1" max="999" style="width:80px;">
                    </div>
                </div>
                <button onclick="startTownHall()" id="startBtn">Start Town Hall</button>
            </div>

            <div class="panel">
                <h2>Live Feed</h2>
                <div id="controlPanel" style="display: none;">
                    <div class="control-row">
                        <label>Extend by:</label>
                        <input type="number" id="extendRounds" value="1" min="1" max="99" style="width: 60px;">
                        <button onclick="extendHall()" class="secondary">Extend Rounds</button>
                    </div>
                    <div class="control-row">
                        <label>Inject (human):</label>
                        <input type="text" id="injectContent" placeholder="Message to inject into transcript" style="flex: 1; min-width: 200px;">
                        <button onclick="injectMessage()" class="secondary">Send</button>
                    </div>
                    <div class="control-row">
                        <label>Interrupt as alias:</label>
                        <input type="text" id="interruptAlias" placeholder="alias (e.g. p1.12e)" style="width: 180px; font-family: ui-monospace, monospace;">
                        <input type="text" id="interruptContent" placeholder="Optional prefilled content (blank = let model speak)" style="flex: 1; min-width: 200px;">
                        <button onclick="queueInterrupt()" class="secondary">Queue Interrupt</button>
                    </div>
                    <div class="control-row">
                        <span id="pendingStatus" style="color: var(--dim); font-size: 0.9em;"></span>
                    </div>
                </div>
                <div class="feed" id="feed">
                    <div class="feed-empty">Start a town hall to see the discussion here</div>
                </div>
            </div>
        </div>

        <!-- History Tab -->
        <div id="history" class="tab-content">
            <div class="panel">
                <h2>Past Town Halls</h2>
                <div id="historyList">Loading...</div>
            </div>

            <div class="panel" id="historyDetail" style="display: none;">
                <h2 id="historyTopic">Topic</h2>
                <div class="feed" id="historyFeed"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let currentHallId = null;
        let pollInterval = null;
        let availableAliases = [];  // [{alias, base_model}, ...]
        let participantCounter = 0;

        function getToken() {
            return localStorage.getItem('rhodes_user_token') || '';
        }

        async function api(endpoint, method = 'GET', body = null) {
            const headers = { 'Content-Type': 'application/json' };
            const token = getToken();
            if (token) headers['Authorization'] = 'Bearer ' + token;

            const opts = { method, headers, cache: 'no-store' };
            if (body) opts.body = JSON.stringify(body);
            const m = String(method || 'GET').toUpperCase();
            const url = API_BASE + endpoint;
            const fetchUrl = (m === 'GET' || m === 'HEAD')
                ? url + (url.includes('?') ? '&' : '?') + '_ts=' + Date.now()
                : url;

            const res = await fetch(fetchUrl, opts);
            return res.json();
        }

        // === PARTICIPANTS ===
        function addParticipant(alias, privateMsg) {
            alias = alias || '';
            privateMsg = privateMsg || '';
            const id = ++participantCounter;
            const dataListId = 'aliasOptions';
            const html =
                '<div class="participant-row" id="participant-' + id + '">' +
                  '<input type="text" list="' + dataListId + '" class="alias-input" id="palias-' + id + '" placeholder="alias (e.g. p1.12e)" value="' + escapeAttr(alias) + '">' +
                  '<div style="flex:1;"><textarea id="pmsg-' + id + '" placeholder="Private instructions (optional, round 1 only)" rows="2" style="font-size:0.9em;">' + escapeHtml(privateMsg) + '</textarea></div>' +
                  '<button type="button" class="remove-btn" onclick="removeParticipant(' + id + ')">x</button>' +
                '</div>';
            document.getElementById('participantList').insertAdjacentHTML('beforeend', html);
        }

        function removeParticipant(id) {
            const el = document.getElementById('participant-' + id);
            if (el) el.remove();
            if (document.querySelectorAll('.participant-row').length === 0) addParticipant();
        }

        function getParticipants() {
            const rows = document.querySelectorAll('.participant-row');
            const out = [];
            rows.forEach(function(row) {
                const id = row.id.replace('participant-', '');
                const alias = document.getElementById('palias-' + id).value.trim();
                if (!alias) return;
                const privateMsg = document.getElementById('pmsg-' + id).value.trim();
                out.push({ alias: alias, privateMsg: privateMsg });
            });
            return out;
        }

        async function loadAliases() {
            try {
                const res = await api('/api/admin/townhall/aliases');
                availableAliases = res.aliases || [];
                let dl = document.getElementById('aliasOptions');
                if (!dl) {
                    dl = document.createElement('datalist');
                    dl.id = 'aliasOptions';
                    document.body.appendChild(dl);
                }
                dl.innerHTML = availableAliases
                    .map(a => '<option value="' + escapeAttr(a.alias) + '">' +
                              (a.base_model ? escapeHtml(a.base_model) : '') + '</option>')
                    .join('');
            } catch (e) {
                console.error('Failed to load aliases:', e);
            }
        }

        // === CONTROLS ===
        async function extendHall() {
            if (!currentHallId) { alert('No active town hall'); return; }
            const extra = parseInt(document.getElementById('extendRounds').value) || 1;
            try {
                const r = await api('/api/admin/townhall/' + currentHallId + '/extend', 'POST', {rounds: extra});
                if (r.success) {
                    addFeedMessage({alias: 'system', content: 'Extended by ' + extra + ' rounds (new total: ' + r.new_rounds + ')', cls: 'human'});
                } else {
                    alert(r.error || 'Failed to extend');
                }
            } catch (e) { alert('Error: ' + e.message); }
        }

        async function injectMessage() {
            if (!currentHallId) { alert('No active town hall'); return; }
            const content = document.getElementById('injectContent').value.trim();
            if (!content) { alert('Enter a message'); return; }
            try {
                const r = await api('/api/admin/townhall/' + currentHallId + '/inject', 'POST', {content});
                if (r.success) {
                    addFeedMessage({alias: 'human (queued)', content: content, cls: 'human'});
                    document.getElementById('injectContent').value = '';
                } else {
                    alert(r.error || 'Failed to inject');
                }
            } catch (e) { alert('Error: ' + e.message); }
        }

        async function queueInterrupt() {
            if (!currentHallId) { alert('No active town hall'); return; }
            const alias = document.getElementById('interruptAlias').value.trim();
            if (!alias) { alert('Enter an alias'); return; }
            const content = document.getElementById('interruptContent').value.trim();
            const body = {alias};
            if (content) body.content = content;
            try {
                const r = await api('/api/admin/townhall/' + currentHallId + '/interrupt', 'POST', body);
                if (r.success) {
                    addFeedMessage({alias: alias + ' (interrupt queued)', content: content || '(will be generated by model)', cls: 'interrupt'});
                    document.getElementById('interruptContent').value = '';
                } else {
                    alert(r.error || 'Failed to queue interrupt');
                }
            } catch (e) { alert('Error: ' + e.message); }
        }

        async function fetchPending() {
            if (!currentHallId) return;
            try {
                const r = await api('/api/admin/townhall/' + currentHallId + '/pending');
                const parts = [];
                if (r.injects) parts.push(r.injects + ' inject(s)');
                if (r.interrupts) parts.push(r.interrupts + ' interrupt(s)');
                const el = document.getElementById('pendingStatus');
                if (el) el.textContent = parts.length ? 'Pending: ' + parts.join(', ') : '';
            } catch (e) {}
        }

        function showControls(show) {
            const p = document.getElementById('controlPanel');
            if (p) p.style.display = show ? 'block' : 'none';
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelector('[onclick="showTab(\'' + tabId + '\')"]').classList.add('active');
            document.getElementById(tabId).classList.add('active');
            if (tabId === 'history') loadHistory();
        }

        async function startTownHall() {
            const topic = document.getElementById('topic').value.trim();
            if (!topic) { alert('Please enter a topic'); return; }

            const rows = getParticipants();
            if (rows.length === 0) { alert('Add at least one participant alias'); return; }

            const participants = rows.map(r => r.alias);
            const participant_data = rows.map(r => ({privateMsg: r.privateMsg || ''}));
            const rounds = parseInt(document.getElementById('rounds').value);

            document.getElementById('startBtn').disabled = true;
            document.getElementById('feed').innerHTML = '<div class="thinking-indicator">Starting town hall...</div>';

            try {
                const data = await api('/api/admin/townhall/create', 'POST', {
                    topic, participants, participant_data, rounds
                });
                if (data.error) {
                    alert('Error: ' + data.error);
                    document.getElementById('startBtn').disabled = false;
                    return;
                }
                startPolling();
            } catch (e) {
                alert('Error starting town hall: ' + e.message);
                document.getElementById('startBtn').disabled = false;
            }
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                const data = await api('/api/admin/townhall/list?status=active&limit=1');
                if (data.halls && data.halls.length > 0) {
                    const hall = data.halls[0];
                    currentHallId = hall.id;
                    await loadHallMessages(hall.id);
                    if (hall.status === 'active') {
                        showControls(true);
                        await fetchPending();
                    } else {
                        clearInterval(pollInterval);
                        showControls(false);
                        document.getElementById('startBtn').disabled = false;
                    }
                } else {
                    showControls(false);
                    const completed = await api('/api/admin/townhall/list?limit=1');
                    if (completed.halls && completed.halls.length > 0) {
                        await loadHallMessages(completed.halls[0].id);
                        clearInterval(pollInterval);
                        document.getElementById('startBtn').disabled = false;
                    }
                }
            }, 2000);
        }

        function classifyMessage(msg) {
            if (msg.instance === 'human') return 'human';
            if (msg.content && msg.content.startsWith('[INTERRUPT]')) return 'interrupt';
            return '';
        }

        async function loadHallMessages(hallId) {
            const data = await api('/api/admin/townhall/' + hallId);
            if (!data || data.error) return;

            const feed = document.getElementById('feed');
            let html = '';
            if (data.status === 'active') {
                html += '<div class="thinking-indicator">Town hall in progress…</div>';
            }
            for (const msg of data.messages || []) {
                const cls = classifyMessage(msg);
                const content = (msg.content || '').replace(/^\[INTERRUPT\]\s*/, '');
                html += '<div class="message ' + cls + '">' +
                          '<div class="message-header">' +
                            '<span class="message-alias">' + escapeHtml(msg.instance || '') +
                              (cls === 'interrupt' ? ' (interrupt)' : '') +
                            '</span>' +
                            '<span class="message-round">Round ' + (msg.round_num + 1) + '</span>' +
                          '</div>' +
                          '<div class="message-content">' + escapeHtml(content) + '</div>' +
                        '</div>';
            }
            if (data.status === 'completed') {
                html += '<div style="text-align: center; color: var(--dim); padding: 20px;">Town hall completed</div>';
            } else if (data.status === 'cancelled') {
                html += '<div style="text-align: center; color: var(--dim); padding: 20px;">Town hall cancelled</div>';
            }
            feed.innerHTML = html || '<div class="feed-empty">No messages yet</div>';
            feed.scrollTop = feed.scrollHeight;
        }

        function addFeedMessage(m) {
            const feed = document.getElementById('feed');
            const empty = feed.querySelector('.feed-empty');
            if (empty) empty.remove();
            const cls = m.cls || '';
            const div = document.createElement('div');
            div.className = 'message ' + cls;
            div.innerHTML = '<div class="message-header"><span class="message-alias">' +
                            escapeHtml(m.alias || '') + '</span></div>' +
                            '<div class="message-content">' + escapeHtml(m.content || '') + '</div>';
            feed.appendChild(div);
            feed.scrollTop = feed.scrollHeight;
        }

        async function loadHistory() {
            const data = await api('/api/admin/townhall/list?limit=20');
            const list = document.getElementById('historyList');
            if (!data.halls || data.halls.length === 0) {
                list.innerHTML = '<div style="color: var(--dim);">No town halls yet</div>';
                return;
            }
            list.innerHTML = data.halls.map(h =>
                '<div class="history-item" onclick="viewHall(' + h.id + ')">' +
                  '<div class="history-topic">' + escapeHtml((h.topic || '').substring(0, 100)) + '</div>' +
                  '<div class="history-meta">' +
                    '<span class="status-badge ' + h.status + '">' + h.status + '</span>' +
                    escapeHtml((h.participants || []).join(', ')) + ' &bull; ' +
                    h.rounds + ' rounds &bull; ' +
                    new Date(h.created_at).toLocaleString() +
                  '</div>' +
                '</div>'
            ).join('');
        }

        async function viewHall(hallId) {
            const data = await api('/api/admin/townhall/' + hallId);
            if (!data || data.error) return;
            document.getElementById('historyTopic').textContent = data.topic;
            document.getElementById('historyDetail').style.display = 'block';
            const feed = document.getElementById('historyFeed');
            feed.innerHTML = (data.messages || []).map(msg => {
                const cls = classifyMessage(msg);
                const content = (msg.content || '').replace(/^\[INTERRUPT\]\s*/, '');
                return '<div class="message ' + cls + '">' +
                         '<div class="message-header">' +
                           '<span class="message-alias">' + escapeHtml(msg.instance || '') +
                             (cls === 'interrupt' ? ' (interrupt)' : '') +
                           '</span>' +
                           '<span class="message-round">Round ' + (msg.round_num + 1) + '</span>' +
                         '</div>' +
                         '<div class="message-content">' + escapeHtml(content) + '</div>' +
                       '</div>';
            }).join('');
        }

        function escapeHtml(text) {
            if (text == null) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
        function escapeAttr(text) { return escapeHtml(text); }

        // === INIT ===
        window.addEventListener('load', async function() {
            await loadAliases();
            // Seed with a couple of sensible defaults; user edits freely.
            addParticipant('p1.12e');
            addParticipant('bap-ea-d');
            loadHistory();
        });
    </script>
</body>
</html>
