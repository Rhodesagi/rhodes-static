<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>TOTAL CONTROL</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
:root { --bg:#0d0d08; --panel:#1a1a12; --metal:#2a2a1c; --amber:#ffcc00; --amber-dim:#cc9900; --green:#44ff44; --green-dim:#22aa22; --unless:#66ffaa; --red:#ff5555; --red-dim:#cc3333; --text:#f0e8d0; --text-dim:#b0a080; --border:#1f1b12; }
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono','Courier New',monospace;min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:9999}
button{-webkit-appearance:none;appearance:none;-webkit-tap-highlight-color:transparent;font-family:inherit}
button:focus{outline:none}
button:active{filter:brightness(0.92)}

.container{width:100%;max-width:500px;margin:0 auto;padding:12px}
.header{border:1px solid var(--amber-dim);background:var(--metal);text-align:center;padding:16px;margin-bottom:6px}
.header h1{color:var(--amber);font-family:'Orbitron',monospace;font-size:18px;font-weight:700;letter-spacing:3px}
.subtitle{text-align:center;color:var(--text-dim);font-size:12px;margin-bottom:12px;letter-spacing:2px}
.status-bar{display:flex;justify-content:space-between;padding:6px 10px;background:var(--panel);border:1px solid var(--metal);margin-bottom:10px;font-size:11px;color:var(--text-dim)}
.status-bar .active{color:var(--green)} .status-bar .inactive{color:var(--red)}

/* Rules */
.rules-list{margin-bottom:12px}
.rule-card{background:var(--metal);border:2px solid var(--red-dim);margin-bottom:8px;padding:12px;display:flex;gap:10px;align-items:flex-start}
.rule-card.allowed{border-color:var(--green-dim)}
.rule-status{min-width:60px;text-align:center;padding-top:2px}
.rule-status .icon{font-size:24px;display:block;margin-bottom:2px}
.rule-status .label{font-size:10px;font-weight:bold}
.rule-status.blocked .icon,.rule-status.blocked .label{color:var(--red)}
.rule-status.allowed-status .icon,.rule-status.allowed-status .label{color:var(--green)}
.rule-info{flex:1;min-width:0}
.mode-badge{display:inline-block;padding:2px 6px;font-size:10px;font-weight:bold;margin-bottom:4px}
.mode-until{border:2px solid var(--amber);color:var(--amber);background:rgba(0,255,204,0.1)}
.mode-during{border:2px solid var(--red);color:var(--red);background:rgba(255,0,204,0.1)}
.mode-allowDuring{border:2px solid var(--green);color:var(--green);background:rgba(0,255,102,0.1)}
.rule-items{font-size:15px;font-weight:bold;color:var(--text);margin-bottom:3px}
.rule-conditions{font-size:14px;font-weight:bold;color:var(--amber);margin-bottom:3px}
.rule-exceptions{font-size:12px;color:var(--unless);margin-bottom:3px}
.rule-detail{font-size:11px;color:var(--text-dim)}
.rule-delete{background:none;border:1px solid var(--red-dim);color:var(--red);cursor:pointer;padding:6px 8px;font-size:14px;flex-shrink:0}

/* Empty */
.empty{text-align:center;padding:40px 16px;color:var(--text-dim)}
.empty .shield-icon{font-size:48px;margin-bottom:12px;opacity:0.5}
.empty p{font-size:14px;margin-bottom:6px}
.empty-example{text-align:left;background:var(--metal);border:2px solid var(--amber-dim);padding:12px 16px;margin-top:12px;line-height:1.7;font-size:13px}
.empty-example .ex-label{color:var(--amber);font-size:11px;letter-spacing:2px;margin-bottom:8px;display:block}
.empty-example .ex-sentence{color:var(--text);font-size:14px}
.empty-example .ex-red{color:var(--red)} .empty-example .ex-green{color:var(--green)} .empty-example b{color:var(--text)}

/* Add button */
.add-btn{width:100%;background:var(--amber);color:var(--bg);border:none;padding:14px;font-size:15px;font-weight:bold;cursor:pointer;letter-spacing:1px}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:1000;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.modal-overlay.active{display:flex;flex-direction:column;align-items:center}
.modal{background:var(--panel);border:2px solid var(--amber-dim);width:100%;max-width:500px;padding:16px;margin-top:20px;margin-bottom:40px}

/* Example */
.example-sentence{text-align:left;padding:4px 12px 10px;margin-bottom:12px;font-size:16px;color:var(--text-dim);letter-spacing:1px;border-bottom:1px solid var(--metal);line-height:1.6}
.example-sentence .ex-label{display:block;font-size:10px;letter-spacing:2px;margin-bottom:3px;opacity:0.6}
.example-sentence .ex-kw{color:var(--red);font-weight:bold}
.example-sentence .ex-items{color:var(--text);font-weight:bold}
.example-sentence .ex-val{color:var(--green);font-weight:bold}
.example-sentence .ex-unless{color:var(--unless);font-size:14px;font-weight:bold}
.example-sentence .ex-until{color:var(--amber);font-weight:bold}

/* Presets */
.presets-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.preset-btn{background:none;border:1px solid var(--text-dim);color:var(--text-dim);padding:6px 10px;font-size:12px;font-weight:bold;cursor:pointer;white-space:nowrap;flex-shrink:0}
.preset-btn.active{border-color:var(--amber);color:var(--amber);background:rgba(0,255,204,0.1)}

/* Sentence rows */
.items-row-box{display:flex;align-items:stretch;border:2px solid var(--red);margin-bottom:8px}
.items-row-box.mode-allow{border-color:var(--green)}
.sentence-label{display:flex;align-items:center;justify-content:center;padding:0 10px;min-width:70px;font-size:15px;font-weight:bold;white-space:nowrap;flex-shrink:0}
.sentence-label.block{color:var(--red);background:rgba(255,0,204,0.1);border-right:2px solid var(--red)}
.sentence-label.allow{color:var(--green);background:rgba(0,255,102,0.1);border-right:2px solid var(--green)}
.items-input{display:flex;align-items:center;flex-wrap:wrap;gap:5px;background:var(--metal);padding:6px 8px;flex:1;min-width:0}
.item-chip{display:inline-flex;align-items:center;gap:3px;background:var(--bg);border:1px solid var(--amber-dim);color:var(--text);font-size:12px;font-weight:bold;padding:3px 6px;letter-spacing:1px;white-space:nowrap;text-transform:uppercase}
.item-chip .chip-x{cursor:pointer;color:var(--text-dim);font-size:12px;margin-left:2px}
.items-input input{flex:1;background:none;border:none;color:var(--text);font-family:inherit;font-size:13px;font-weight:bold;outline:none;padding:4px 2px;min-width:60px}
.items-input input::placeholder{color:var(--text-dim);opacity:0.7}

/* Condition row */
.cond-row{display:flex;align-items:stretch;border:2px solid var(--amber);margin-bottom:8px}
.cond-row .sentence-label{color:var(--amber);background:rgba(0,255,204,0.1);border-right:2px solid var(--amber);cursor:pointer;font-size:13px;min-width:60px}
.cond-body{display:flex;align-items:center;flex-wrap:wrap;gap:6px;background:var(--metal);padding:6px 8px;flex:1}
.cond-type-select{background:var(--bg);border:1px solid var(--amber-dim);color:var(--amber);font-family:inherit;font-size:12px;padding:4px 6px;cursor:pointer}
.cond-type-select option{background:var(--bg);color:var(--text)}
.cond-value input,.cond-value select{background:var(--bg);border:1px solid var(--text-dim);color:var(--text);font-family:inherit;font-size:13px;padding:4px 8px;width:80px}
.cond-value select{width:auto}

/* Mode tabs */
.mode-tabs{display:flex;gap:4px;margin-bottom:12px}
.mode-tab{flex:1;padding:8px;font-size:12px;font-weight:bold;cursor:pointer;background:none;border:2px solid transparent;text-align:center}
.mode-tab[data-mode="until"]{color:var(--amber-dim)} .mode-tab[data-mode="during"]{color:var(--red-dim)} .mode-tab[data-mode="allowDuring"]{color:var(--green-dim)}
.mode-tab.active[data-mode="until"]{background:var(--amber);color:var(--bg);border-color:var(--amber)}
.mode-tab.active[data-mode="during"]{background:var(--red);color:var(--bg);border-color:var(--red)}
.mode-tab.active[data-mode="allowDuring"]{background:var(--green);color:var(--bg);border-color:var(--green)}

/* Unless row */
.unless-row{display:flex;align-items:stretch;border:2px solid var(--unless);margin-bottom:8px}
.unless-row .sentence-label{color:var(--unless);background:rgba(102,255,170,0.1);border-right:2px solid var(--unless);font-size:13px;min-width:65px}

/* Password */
.pw-row{margin-bottom:12px}
.pw-label{color:var(--text-dim);font-size:11px;letter-spacing:1px;margin-bottom:4px}
.pw-input{width:100%;background:var(--metal);border:2px solid var(--border);color:var(--text);font-family:inherit;font-size:13px;padding:8px}

/* Actions */
.modal-actions{display:flex;gap:8px;margin-top:16px}
.btn-cancel{flex:1;background:none;border:2px solid var(--text-dim);color:var(--text-dim);padding:12px;font-size:13px;font-weight:bold;cursor:pointer}
.btn-create{flex:1;background:var(--amber);color:var(--bg);border:none;padding:12px;font-size:13px;font-weight:bold;cursor:pointer}

/* Confirm delete */
.confirm-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:2000;justify-content:center;align-items:center;padding:20px}
.confirm-overlay.active{display:flex}
.confirm-box{background:var(--panel);border:2px solid var(--red);padding:20px;max-width:400px;width:100%}
.confirm-box h3{color:var(--red);font-size:16px;margin-bottom:12px;letter-spacing:2px}
.confirm-box p{color:var(--text);font-size:13px;margin-bottom:16px}
.delete-pw-row{display:none;margin-bottom:12px}
.delete-pw-row input{width:100%;background:var(--metal);border:2px solid var(--amber);color:var(--amber);font-family:inherit;font-size:13px;padding:8px}
.delete-pw-error{color:var(--red);font-size:11px;margin-top:4px;display:none}

/* Schedule days */
.days-row{display:flex;gap:4px;flex-wrap:wrap}
.day-btn{padding:6px 8px;font-size:11px;font-weight:bold;cursor:pointer;background:none;border:1px solid var(--text-dim);color:var(--text-dim)}
.day-btn.active{border-color:var(--amber);color:var(--amber);background:rgba(0,255,204,0.1)}
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>TOTAL CONTROL</h1></div>
  <div class="subtitle">UNTIL &bull; DURING &bull; ALLOW</div>
  <div class="status-bar">
    <span>SYS: iOS</span>
    <span id="block-count">0 RULES</span>
    <span id="protection-status" class="inactive">STANDBY</span>
  </div>
  <div class="rules-list" id="rules-list"><div class="empty"><div class="shield-icon">&#9711;</div><p>Loading...</p></div></div>
  <button class="add-btn" onclick="openModal()">+ ADD RULE</button>
</div>

<!-- Add Rule Modal -->
<div class="modal-overlay" id="modal">
<div class="modal">
  <div class="example-sentence" id="example-sentence">
    <span class="ex-label">EXAMPLE</span><span class="ex-kw">BLOCK</span> <span class="ex-items">NETFLIX, TWITTER</span><br><span class="ex-until">UNTIL</span> <span class="ex-val">5:00 PM</span>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="until" onclick="setMode('until')">UNTIL</button>
    <button class="mode-tab" data-mode="during" onclick="setMode('during')">DURING</button>
    <button class="mode-tab" data-mode="allowDuring" onclick="setMode('allowDuring')">ALLOW</button>
  </div>
  <div class="presets-row" id="presets"></div>
  <div class="items-row-box" id="items-box">
    <div id="sentence-label" class="sentence-label block">BLOCK</div>
    <div class="items-input" id="items-chips">
      <input type="text" id="items-input" placeholder="type & press Enter...">
    </div>
  </div>
  <div class="cond-row">
    <div class="sentence-label" id="cond-keyword" onclick="cycleMode()">UNTIL</div>
    <div class="cond-body">
      <select id="cond-type-select" class="cond-type-select" onchange="onCondTypeChange()"></select>
      <div class="cond-value" id="cond-value"></div>
    </div>
  </div>
  <div class="unless-row">
    <div class="sentence-label">UNLESS</div>
    <div class="items-input">
      <input type="text" id="exceptions-input" placeholder="WhatsApp, music.youtube.com...">
    </div>
  </div>
  <div class="pw-row">
    <div class="pw-label">DELETION PASSWORD (optional):</div>
    <input type="password" class="pw-input" id="rule-password" placeholder="Leave empty for no protection">
  </div>
  <div class="modal-actions">
    <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
    <button class="btn-create" onclick="createRule()">CREATE</button>
  </div>
</div>
</div>

<!-- Confirm delete -->
<div class="confirm-overlay" id="confirm-dialog">
<div class="confirm-box">
  <h3>DELETE RULE?</h3>
  <p id="confirm-text"></p>
  <div class="delete-pw-row" id="delete-pw-row">
    <div style="color:var(--amber);font-size:11px;margin-bottom:4px;letter-spacing:1px">&#128274; PASSWORD REQUIRED</div>
    <input type="password" id="delete-password" placeholder="Enter deletion password">
    <div class="delete-pw-error" id="delete-pw-error">Wrong password</div>
  </div>
  <div class="modal-actions">
    <button class="btn-cancel" onclick="closeConfirm()">CANCEL</button>
    <button class="btn-create" style="background:var(--red)" onclick="confirmDelete()">DELETE</button>
  </div>
</div>
</div>

<script>
const TOKEN = window.__TC_TOKEN__ || '';
const API = 'https://rhodesagi.com';
const PRESETS = {
  "Social Media": ["Facebook","Instagram","Twitter","X","TikTok","Snapchat","LinkedIn","Pinterest","Reddit"],
  "Streaming": ["Netflix","YouTube","Hulu","Disney+","HBO Max","Amazon Prime","Twitch","Spotify","Apple TV"],
  "Messaging": ["WhatsApp","Telegram","Discord","Slack","Messenger","Signal"],
  "Gaming": ["Steam","Epic Games","Roblox"],
  "News": ["CNN","BBC","Fox News","NYTimes"],
  "Dating": ["Tinder","Bumble","Hinge"]
};

const COND_TYPES = {
  until: [{v:'time',n:'Time'},{v:'tomorrow',n:'Tomorrow'},{v:'password',n:'Password'}],
  during: [{v:'timeRange',n:'Hours'},{v:'schedule',n:'Days'}],
  allowDuring: [{v:'timeRange',n:'Hours'},{v:'schedule',n:'Days'}]
};

let currentMode = 'until';
let itemChips = [];
let deleteTarget = null;
let allRules = [];
let selectedDays = [1,2,3,4,5];

async function apiFetch(path, method, body) {
  const opts = { method: method||'GET', headers: {'Content-Type':'application/json','Authorization':'Bearer '+TOKEN} };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  return res.json();
}

// ── Load & Render ──
async function loadRules() {
  try {
    const data = await apiFetch('/api/tc/rules');
    allRules = data.rules || [];
    renderRules();
  } catch(e) {
    document.getElementById('rules-list').innerHTML = '<div class="empty"><p style="color:var(--red)">Failed to load rules</p></div>';
  }
}

function renderRules() {
  const list = document.getElementById('rules-list');
  const bc = document.getElementById('block-count');
  const ps = document.getElementById('protection-status');

  if (!allRules.length) {
    list.innerHTML = '<div class="empty"><div class="shield-icon">&#9711;</div><p>No rules yet</p>' +
      '<div class="empty-example"><div class="ex-label">HOW IT WORKS</div>' +
      '<p class="ex-sentence"><span class="ex-red">Block</span> <b>Twitter, Reddit</b> <span class="ex-red">until</span> <span class="ex-green">5:00 PM</span></p>' +
      '<p class="ex-sentence" style="margin-top:6px"><span class="ex-red">Block</span> <b>Netflix</b> <span class="ex-red">during</span> <span class="ex-green">weekdays</span></p>' +
      '</div><p style="font-size:13px;margin-top:12px">Tap + ADD RULE to create one</p></div>';
    bc.textContent = '0 RULES';
    ps.textContent = 'STANDBY'; ps.className = 'inactive';
    return;
  }

  bc.textContent = allRules.length + ' RULE' + (allRules.length>1?'S':'');
  let anyBlocked = false;

  list.innerHTML = allRules.map(function(rule) {
    const blocked = evaluateRule(rule);
    if (blocked) anyBlocked = true;
    const cls = blocked ? '' : ' allowed';
    const stCls = blocked ? 'blocked' : 'allowed-status';
    const icon = blocked ? '&#128274;' : '&#128275;';
    const label = blocked ? 'BLOCKED' : 'ALLOWED';
    const modeClass = 'mode-' + rule.mode;
    const modeLabel = rule.mode === 'until' ? 'UNTIL' : rule.mode === 'during' ? 'BLOCK DURING' : 'ONLY DURING';
    const items = (rule.items||[]).slice(0,3).join(', ') + (rule.items.length>3 ? ' +' + (rule.items.length-3) : '');
    const condDesc = (rule.conditions||[]).map(descCond).join(' + ');
    const exceptions = (rule.exceptions||[]).length ? 'UNLESS ' + rule.exceptions.join(', ') : '';
    const hasPw = rule.password && rule.password.length > 0;

    return '<div class="rule-card'+cls+'">' +
      '<div class="rule-status '+stCls+'"><span class="icon">'+icon+'</span><span class="label">'+label+'</span></div>' +
      '<div class="rule-info">' +
        '<span class="mode-badge '+modeClass+'">'+modeLabel+'</span>' +
        '<div class="rule-items">'+esc(items)+(hasPw?' &#128274;':'')+'</div>' +
        '<div class="rule-conditions">'+esc(condDesc)+'</div>' +
        (exceptions?'<div class="rule-exceptions">'+esc(exceptions)+'</div>':'') +
      '</div>' +
      '<button class="rule-delete" onclick="startDelete(\''+rule.id+'\',\''+esc(items)+'\','+(hasPw?'true':'false')+')">&times;</button>' +
    '</div>';
  }).join('');

  ps.textContent = anyBlocked ? 'ENFORCING' : 'STANDBY';
  ps.className = anyBlocked ? 'active' : 'inactive';
}

function evaluateRule(rule) {
  // Simple client-side eval for display
  const now = new Date();
  const conds = rule.conditions || [];
  if (!conds.length) return true;
  if (rule.mode === 'until') {
    return !conds.every(function(c) {
      if (c.type === 'time') {
        const parts = (c.time_target||'17:00').split(':');
        return now.getHours() > parseInt(parts[0]) || (now.getHours() === parseInt(parts[0]) && now.getMinutes() >= parseInt(parts[1]||0));
      }
      if (c.type === 'tomorrow') return false;
      if (c.type === 'password') return false;
      return false;
    });
  }
  if (rule.mode === 'during') {
    return conds.some(function(c) {
      if (c.type === 'timeRange') {
        const s = (c.time_range?.start||'09:00').split(':'), e = (c.time_range?.end||'17:00').split(':');
        const mins = now.getHours()*60+now.getMinutes();
        return mins >= parseInt(s[0])*60+parseInt(s[1]||0) && mins < parseInt(e[0])*60+parseInt(e[1]||0);
      }
      if (c.type === 'schedule') {
        const day = now.getDay() === 0 ? 7 : now.getDay();
        return (c.schedule?.days||[]).includes(day);
      }
      return true;
    });
  }
  if (rule.mode === 'allowDuring') {
    return !conds.some(function(c) {
      if (c.type === 'timeRange') {
        const s = (c.time_range?.start||'09:00').split(':'), e = (c.time_range?.end||'17:00').split(':');
        const mins = now.getHours()*60+now.getMinutes();
        return mins >= parseInt(s[0])*60+parseInt(s[1]||0) && mins < parseInt(e[0])*60+parseInt(e[1]||0);
      }
      if (c.type === 'schedule') {
        const day = now.getDay() === 0 ? 7 : now.getDay();
        return (c.schedule?.days||[]).includes(day);
      }
      return false;
    });
  }
  return true;
}

function descCond(c) {
  switch(c.type) {
    case 'time': return c.time_target || '17:00';
    case 'timeRange': return (c.time_range?.start||'09:00')+' - '+(c.time_range?.end||'17:00');
    case 'tomorrow': return 'tomorrow';
    case 'password': return 'password';
    case 'schedule': {
      const d = c.schedule?.days||[];
      if (JSON.stringify(d)==='[1,2,3,4,5]') return 'weekdays';
      if (JSON.stringify(d)==='[6,7]') return 'weekends';
      const n = ['','Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      return d.map(function(x){return n[x]}).join(', ');
    }
    default: return c.type;
  }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Modal ──
function openModal() {
  currentMode = 'until';
  itemChips = [];
  selectedDays = [1,2,3,4,5];
  document.getElementById('items-input').value = '';
  document.getElementById('exceptions-input').value = '';
  document.getElementById('rule-password').value = '';
  document.getElementById('modal').classList.add('active');
  renderPresets();
  renderChips();
  renderModal();
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }

function setMode(mode) {
  currentMode = mode;
  renderModal();
}

function cycleMode() {
  const modes = ['until','during','allowDuring'];
  currentMode = modes[(modes.indexOf(currentMode)+1)%3];
  renderModal();
}

function renderModal() {
  // Mode tabs
  document.querySelectorAll('.mode-tab').forEach(function(t){t.classList.toggle('active',t.dataset.mode===currentMode)});

  // Sentence label
  const sl = document.getElementById('sentence-label');
  const box = document.getElementById('items-box');
  if (currentMode === 'allowDuring') {
    sl.textContent = 'ALLOW'; sl.className = 'sentence-label allow';
    box.className = 'items-row-box'; box.style.borderColor = 'var(--green)';
  } else {
    sl.textContent = 'BLOCK'; sl.className = 'sentence-label block';
    box.className = 'items-row-box'; box.style.borderColor = 'var(--red)';
  }

  // Condition keyword
  const kw = document.getElementById('cond-keyword');
  kw.textContent = currentMode==='until'?'UNTIL':currentMode==='during'?'DURING':'ONLY DURING';

  // Condition type dropdown
  const sel = document.getElementById('cond-type-select');
  const types = COND_TYPES[currentMode];
  sel.innerHTML = types.map(function(t){return '<option value="'+t.v+'">'+t.n+'</option>'}).join('');
  renderCondValue();

  // Example
  const ex = document.getElementById('example-sentence');
  if (currentMode==='until') ex.innerHTML='<span class="ex-label">EXAMPLE</span><span class="ex-kw">BLOCK</span> <span class="ex-items">NETFLIX, TWITTER</span><br><span class="ex-until">UNTIL</span> <span class="ex-val">5:00 PM</span>';
  else if (currentMode==='during') ex.innerHTML='<span class="ex-label">EXAMPLE</span><span class="ex-kw">BLOCK</span> <span class="ex-items">INSTAGRAM, TIKTOK</span><br><span class="ex-until">DURING</span> <span class="ex-val">9 AM - 5 PM weekdays</span>';
  else ex.innerHTML='<span class="ex-label">EXAMPLE</span><span class="ex-kw">ALLOW</span> <span class="ex-items">SPOTIFY</span><br><span class="ex-until">ONLY DURING</span> <span class="ex-val">weekends</span>';
}

function onCondTypeChange() { renderCondValue(); }

function renderCondValue() {
  const type = document.getElementById('cond-type-select').value;
  const el = document.getElementById('cond-value');
  if (type === 'time') {
    el.innerHTML = '<input type="time" id="cond-time" value="17:00">';
  } else if (type === 'tomorrow') {
    el.innerHTML = '<span style="color:var(--green);font-size:13px;font-weight:bold">Until tomorrow</span>';
  } else if (type === 'password') {
    el.innerHTML = '<span style="color:var(--green);font-size:13px;font-weight:bold">Password to unlock</span>';
  } else if (type === 'timeRange') {
    el.innerHTML = '<input type="time" id="cond-start" value="09:00" style="width:70px"> <span style="color:var(--amber)">-</span> <input type="time" id="cond-end" value="17:00" style="width:70px">';
  } else if (type === 'schedule') {
    const names = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const nums = [1,2,3,4,5,6,7];
    el.innerHTML = '<div class="days-row">' + nums.map(function(d,i){
      return '<button class="day-btn'+(selectedDays.includes(d)?' active':'')+'" onclick="toggleDay('+d+',this)">'+names[i]+'</button>';
    }).join('') + '</div>';
  } else {
    el.innerHTML = '';
  }
}

function toggleDay(d, btn) {
  const idx = selectedDays.indexOf(d);
  if (idx >= 0) selectedDays.splice(idx, 1);
  else selectedDays.push(d);
  selectedDays.sort();
  btn.classList.toggle('active');
}

// ── Presets ──
function renderPresets() {
  const pp = document.getElementById('presets');
  pp.innerHTML = Object.keys(PRESETS).map(function(name){
    return '<button class="preset-btn" onclick="togglePreset(this,\''+name+'\')">'+name+'</button>';
  }).join('');
}

function togglePreset(btn, name) {
  const items = PRESETS[name] || [];
  const isActive = btn.classList.contains('active');
  if (isActive) {
    btn.classList.remove('active');
    items.forEach(function(item) {
      const idx = itemChips.findIndex(function(c){return c.toLowerCase()===item.toLowerCase()});
      if (idx >= 0) itemChips.splice(idx, 1);
    });
  } else {
    btn.classList.add('active');
    items.forEach(function(item) {
      if (!itemChips.some(function(c){return c.toLowerCase()===item.toLowerCase()})) itemChips.push(item);
    });
  }
  renderChips();
}

// ── Chips ──
function renderChips() {
  const container = document.getElementById('items-chips');
  const input = document.getElementById('items-input');
  // Remove existing chips
  container.querySelectorAll('.item-chip').forEach(function(c){c.remove()});
  // Add chips before input
  itemChips.forEach(function(item, i) {
    const chip = document.createElement('span');
    chip.className = 'item-chip';
    chip.innerHTML = esc(item) + ' <span class="chip-x" onclick="removeChip('+i+')">&times;</span>';
    container.insertBefore(chip, input);
  });
}

function removeChip(idx) {
  itemChips.splice(idx, 1);
  renderChips();
}

// Items input handler
document.getElementById('items-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = this.value.trim().replace(/,$/,'');
    if (val && !itemChips.some(function(c){return c.toLowerCase()===val.toLowerCase()})) {
      itemChips.push(val);
      renderChips();
    }
    this.value = '';
  }
});

// ── Create Rule ──
async function createRule() {
  if (!itemChips.length) { alert('Add at least one item to block'); return; }
  const condType = document.getElementById('cond-type-select').value;
  let cond = { type: condType };
  if (condType === 'time') {
    cond.time_target = (document.getElementById('cond-time')||{}).value || '17:00';
  } else if (condType === 'timeRange') {
    cond.time_range = { start: (document.getElementById('cond-start')||{}).value||'09:00', end: (document.getElementById('cond-end')||{}).value||'17:00' };
  } else if (condType === 'schedule') {
    cond.schedule = { days: selectedDays.slice() };
  } else if (condType === 'tomorrow') {
    cond.created_at = new Date().toISOString();
  }

  const excInput = document.getElementById('exceptions-input').value.trim();
  const exceptions = excInput ? excInput.split(',').map(function(e){return e.trim()}).filter(Boolean) : [];
  const pw = document.getElementById('rule-password').value;

  const rule = {
    id: Date.now().toString(),
    items: itemChips.slice(),
    mode: currentMode,
    conditions: [cond],
    exceptions: exceptions,
    password: pw || '',
    enabled: true,
    created_at: new Date().toISOString()
  };

  try {
    await apiFetch('/api/tc/rules/add', 'POST', rule);
    closeModal();
    loadRules();
  } catch(e) {
    alert('Failed to save rule');
  }
}

// ── Delete ──
function startDelete(id, desc, hasPw) {
  deleteTarget = { id: id, hasPw: hasPw };
  document.getElementById('confirm-text').textContent = 'Delete rule: ' + desc + '?';
  document.getElementById('delete-pw-row').style.display = hasPw ? 'block' : 'none';
  document.getElementById('delete-password').value = '';
  document.getElementById('delete-pw-error').style.display = 'none';
  document.getElementById('confirm-dialog').classList.add('active');
}

function closeConfirm() {
  document.getElementById('confirm-dialog').classList.remove('active');
  deleteTarget = null;
}

async function confirmDelete() {
  if (!deleteTarget) return;
  const body = {};
  if (deleteTarget.hasPw) {
    body.password = document.getElementById('delete-password').value;
  }
  try {
    const res = await apiFetch('/api/tc/rules/' + deleteTarget.id, 'DELETE', body);
    if (res.error) {
      document.getElementById('delete-pw-error').textContent = res.error;
      document.getElementById('delete-pw-error').style.display = 'block';
      return;
    }
    closeConfirm();
    loadRules();
  } catch(e) {
    alert('Failed to delete');
  }
}

// ── Init ──
loadRules();
setInterval(loadRules, 30000);
</script>
