<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ask Rhodes</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🜛%3C/text%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0a;
    --panel: #0d0d0d;
    --panel-hi: #121212;
    --border: #1a1a1a;
    --border-hi: #2a2a2a;
    --cyan: #00ffcc;
    --cyan-dim: rgba(0,255,204,0.14);
    --cyan-glow: rgba(0,255,213,0.3);
    --green: #00ff66;
    --magenta: #ff00cc;
    --dim: #404040;
    --text: #e0e0e0;
    --text-dim: #808080;
    --text-fade: #505050;
    --red: #ff3355;
    --mono: 'Share Tech Mono', 'JetBrains Mono', Menlo, Consolas, monospace;
    --display: 'Orbitron', 'Share Tech Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html {
    overflow-y: scroll;
    scroll-behavior: smooth;
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overscroll-behavior: none;
  }
  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, transparent 1px, transparent 2px);
    pointer-events: none;
    z-index: 1000;
  }
  /* Grid overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,204,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,204,0.025) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 999;
  }
  a { color: var(--cyan); text-decoration: none; }
  a:hover { text-shadow: 0 0 8px var(--cyan-glow); }

  /* ─── Layout ────────────────────────────────────────────── */
  #app {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 24px 140px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 56px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--cyan);
    text-shadow: 0 0 10px var(--cyan), 0 0 24px rgba(0,255,204,0.35);
    animation: glow 2.5s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { text-shadow: 0 0 8px var(--cyan), 0 0 20px rgba(0,255,204,0.3); }
    to   { text-shadow: 0 0 14px var(--cyan), 0 0 30px rgba(0,255,204,0.55); }
  }
  .logo .glyph { margin-right: 6px; }
  .logo .ask-rhodes { color: var(--cyan); }
  .meta {
    font-family: var(--display);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 3px;
    font-weight: 400;
  }
  .meta .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--dim); margin-right: 8px; vertical-align: middle; }
  .meta.live .dot { background: var(--green); box-shadow: 0 0 8px var(--green), 0 0 16px rgba(0,255,102,0.4); }
  .meta.err .dot  { background: var(--red); box-shadow: 0 0 8px var(--red); }

  /* ─── Empty state (big search) ──────────────────────────── */
  #hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 28px;
    margin-top: -40px;
  }
  #hero .big-title {
    font-family: var(--display);
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--cyan);
    text-shadow: 0 0 14px var(--cyan), 0 0 32px rgba(0,255,204,0.4);
    text-align: center;
    text-transform: uppercase;
  }
  #hero .tagline {
    font-family: var(--mono);
    font-size: 16px;
    line-height: 1.6;
    color: var(--text-dim);
    text-align: center;
    max-width: 560px;
    margin-top: -14px;
  }
  #hero .tagline .emph { color: var(--green); text-shadow: 0 0 6px rgba(0,255,102,0.3); }
  #hero .tagline .pipe { color: var(--dim); margin: 0 10px; }

  /* ─── Search input (terminal-style) ─────────────────────── */
  .searchbox {
    width: 100%;
    max-width: 680px;
    background: #000;
    border: 1px solid rgba(0,255,213,0.3);
    display: flex;
    align-items: stretch;
    box-shadow: 0 0 8px rgba(0,255,213,0.1), inset 0 0 20px rgba(0,0,0,0.5);
    transition: all 0.2s ease;
    position: relative;
  }
  .searchbox::before {
    content: '>';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--cyan);
    font-family: var(--mono);
    font-size: 18px;
    text-shadow: 0 0 8px var(--cyan);
    pointer-events: none;
  }
  .searchbox:focus-within {
    border-color: var(--cyan);
    box-shadow: 0 0 16px var(--cyan-glow), 0 0 32px rgba(0,255,213,0.15), inset 0 0 20px rgba(0,0,0,0.5);
  }
  .searchbox input {
    flex: 1;
    background: transparent;
    border: 0;
    color: var(--cyan);
    font-family: var(--mono);
    font-size: 17px;
    padding: 16px 8px 16px 34px;
    outline: none;
    text-shadow: 0 0 6px rgba(0,255,213,0.4);
  }
  .searchbox input::placeholder { color: rgba(0,255,213,0.35); }
  .searchbox button {
    background: transparent;
    border: 0;
    border-left: 1px solid rgba(0,255,102,0.3);
    color: var(--green);
    font-family: var(--display);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 3px;
    padding: 0 22px;
    cursor: pointer;
    text-transform: uppercase;
    text-shadow: 0 0 6px rgba(0,255,102,0.4);
    transition: all 0.15s;
  }
  .searchbox button:hover {
    background: rgba(0,255,102,0.08);
    text-shadow: 0 0 12px var(--green);
    color: var(--green);
  }
  .searchbox button:disabled { color: var(--dim); text-shadow: none; cursor: not-allowed; }

  /* Focus-mode chips */
  .focuschips {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 680px;
  }
  .focuschips label {
    font-family: var(--display);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--border-hi);
    padding: 7px 14px;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
  }
  .focuschips label:hover {
    color: var(--cyan);
    border-color: rgba(0,255,213,0.3);
    text-shadow: 0 0 6px var(--cyan-glow);
  }
  .focuschips input { display: none; }
  .focuschips label:has(input:checked) {
    color: var(--cyan);
    border-color: var(--cyan);
    text-shadow: 0 0 8px var(--cyan);
    box-shadow: 0 0 10px rgba(0,255,213,0.2), inset 0 0 10px rgba(0,255,213,0.05);
  }

  /* ─── Question (after submit) ───────────────────────────── */
  .question {
    font-family: var(--mono);
    font-size: 22px;
    line-height: 1.4;
    color: var(--cyan);
    margin-bottom: 28px;
    padding: 12px 0 16px;
    border-bottom: 1px solid var(--border);
    text-shadow: 0 0 8px rgba(0,255,213,0.25);
    position: relative;
  }
  .question::before {
    content: '> ';
    color: var(--green);
    text-shadow: 0 0 6px rgba(0,255,102,0.4);
  }

  /* ─── Section labels (terminal tags) ─────────────────────── */
  .section-label {
    font-family: var(--display);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin: 20px 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::before {
    content: '';
    display: inline-block;
    width: 18px;
    height: 1px;
    background: var(--text-dim);
  }
  .section-label .count {
    color: var(--cyan);
    text-shadow: 0 0 6px var(--cyan-glow);
  }

  /* ─── Sources strip ─────────────────────────────────────── */
  .sources {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }
  .source {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-decoration: none;
    color: inherit;
    position: relative;
  }
  .source:hover {
    border-color: var(--cyan);
    background: var(--panel-hi);
    box-shadow: 0 0 12px rgba(0,255,213,0.15), inset 0 0 8px rgba(0,255,213,0.04);
    text-decoration: none;
  }
  .source-head {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--mono);
  }
  .source-head img { width: 14px; height: 14px; flex-shrink: 0; filter: grayscale(0.2) brightness(0.9); }
  .source-head .n {
    color: var(--cyan);
    font-family: var(--display);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 2px 6px;
    border: 1px solid rgba(0,255,213,0.4);
    text-shadow: 0 0 6px var(--cyan-glow);
  }
  .source-head .domain {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-transform: lowercase;
    letter-spacing: 0.5px;
  }
  .source-title {
    font-size: 13px;
    line-height: 1.4;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .source-note {
    font-size: 11px;
    color: var(--text-fade);
    line-height: 1.35;
    padding-top: 4px;
    border-top: 1px dashed var(--border);
  }
  .source.ref { cursor: default; border-style: dashed; border-color: var(--border-hi); }
  .source.ref:hover { border-color: var(--magenta); box-shadow: 0 0 12px rgba(255,0,204,0.15); background: var(--panel-hi); }
  .ref-badge {
    color: var(--magenta);
    font-family: var(--display);
    font-size: 9px;
    font-weight: 700;
    padding: 2px 5px;
    border: 1px solid rgba(255,0,204,0.4);
    letter-spacing: 1px;
    text-shadow: 0 0 6px rgba(255,0,204,0.4);
  }

  /* ─── Thinking (collapsed) ──────────────────────────────── */
  .thinking {
    border: 1px dashed var(--border-hi);
    padding: 12px 16px;
    margin-bottom: 22px;
    font-size: 12px;
    color: var(--text-dim);
    background: rgba(255,0,204,0.02);
  }
  .thinking summary {
    cursor: pointer;
    font-family: var(--display);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--magenta);
    text-shadow: 0 0 6px rgba(255,0,204,0.3);
    list-style: none;
  }
  .thinking summary::-webkit-details-marker { display: none; }
  .thinking summary::before { content: '[+] '; }
  .thinking[open] summary::before { content: '[−] '; }
  .thinking summary:hover { text-shadow: 0 0 10px rgba(255,0,204,0.5); }
  .thinking .tk-body {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--border-hi);
    white-space: pre-wrap;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.55;
    max-height: 320px;
    overflow-y: auto;
    color: var(--text-dim);
  }

  /* ─── Answer ────────────────────────────────────────────── */
  .answer {
    font-family: var(--mono);
    font-size: 15px;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 28px;
    padding: 4px 0;
  }
  .answer p { margin-bottom: 1em; }
  .answer strong { color: var(--cyan); font-weight: 700; text-shadow: 0 0 6px rgba(0,255,213,0.25); }
  .answer em { color: var(--green); font-style: normal; text-shadow: 0 0 6px rgba(0,255,102,0.2); }
  .answer h1, .answer h2, .answer h3 {
    font-family: var(--display);
    font-weight: 700;
    margin: 1.3em 0 0.6em;
    line-height: 1.25;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 10px var(--cyan-glow);
  }
  .answer h1 { font-size: 18px; }
  .answer h2 { font-size: 16px; }
  .answer h3 { font-size: 14px; }
  .answer ul, .answer ol { margin: 0.5em 0 1em 1.5em; }
  .answer li { margin-bottom: 0.4em; }
  .answer li::marker { color: var(--cyan); }
  .answer code {
    font-family: var(--mono);
    font-size: 0.92em;
    background: #000;
    border: 1px solid var(--border-hi);
    color: var(--green);
    padding: 1px 6px;
  }
  .answer pre {
    background: #000;
    border: 1px solid var(--border-hi);
    border-left: 2px solid var(--green);
    padding: 12px 14px;
    overflow-x: auto;
    margin: 0.8em 0;
  }
  .answer pre code { background: none; border: 0; padding: 0; }
  .answer blockquote {
    border-left: 2px solid var(--magenta);
    padding-left: 14px;
    color: var(--text-dim);
    margin: 0.8em 0;
    font-style: normal;
  }
  .cite {
    display: inline-block;
    color: var(--cyan);
    font-family: var(--display);
    font-size: 0.68em;
    font-weight: 700;
    padding: 1px 6px;
    margin: 0 2px;
    cursor: pointer;
    vertical-align: super;
    line-height: 1.4;
    border: 1px solid rgba(0,255,213,0.35);
    text-shadow: 0 0 6px var(--cyan-glow);
    transition: all 0.12s;
    letter-spacing: 0.5px;
  }
  .cite:hover {
    background: rgba(0,255,213,0.12);
    border-color: var(--cyan);
    text-shadow: 0 0 10px var(--cyan);
    box-shadow: 0 0 8px rgba(0,255,213,0.3);
  }
  .cursor {
    display: inline-block;
    width: 9px;
    height: 1.1em;
    background: var(--cyan);
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
    margin-left: 2px;
    box-shadow: 0 0 8px var(--cyan);
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ─── Related ───────────────────────────────────────────── */
  .related {
    display: flex;
    flex-direction: column;
    gap: 0;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
  .related button {
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 15px;
    text-align: left;
    padding: 14px 4px 14px 18px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    position: relative;
  }
  .related button::before {
    content: '>';
    position: absolute;
    left: 0;
    color: var(--dim);
    font-family: var(--mono);
    transition: all 0.15s;
  }
  .related button:hover {
    color: var(--cyan);
    background: rgba(0,255,213,0.03);
    text-shadow: 0 0 8px var(--cyan-glow);
    padding-left: 22px;
  }
  .related button:hover::before {
    color: var(--cyan);
    text-shadow: 0 0 8px var(--cyan);
    left: 4px;
  }
  .related button::after {
    content: "[↵]";
    color: var(--dim);
    font-size: 11px;
    font-family: var(--display);
    letter-spacing: 1px;
  }
  .related button:hover::after { color: var(--green); text-shadow: 0 0 6px rgba(0,255,102,0.4); }

  /* ─── Status / pending (terminal-style log line) ─────────── */
  .status {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 2px solid var(--cyan);
  }
  .status .spin {
    width: 10px;
    height: 10px;
    border: 1px solid var(--border-hi);
    border-top-color: var(--cyan);
    border-right-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(0,255,213,0.3);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status .phase {
    color: var(--cyan);
    font-family: var(--display);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 11px;
    text-shadow: 0 0 6px var(--cyan-glow);
  }
  .status .phase::before { content: '['; color: var(--dim); text-shadow: none; margin-right: 2px; }
  .status .phase::after  { content: ']'; color: var(--dim); text-shadow: none; margin-left: 2px; }
  .status.done { border-left-color: var(--green); }
  .status.done .spin { display: none; }

  /* ─── Follow-up bar (sticky bottom) ─────────────────────── */
  .followup {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, var(--bg) 55%, rgba(10,10,10,0.92) 80%, transparent);
    padding: 28px 24px 22px;
    z-index: 10;
    border-top: 1px solid transparent;
  }
  .followup .searchbox {
    max-width: 860px;
    margin: 0 auto;
  }

  /* ─── Errors ────────────────────────────────────────────── */
  .error {
    background: rgba(255,51,85,0.06);
    border: 1px solid rgba(255,51,85,0.35);
    border-left: 2px solid var(--red);
    color: var(--red);
    padding: 12px 16px;
    font-size: 13px;
    font-family: var(--mono);
    margin-bottom: 18px;
    text-shadow: 0 0 6px rgba(255,51,85,0.25);
  }
  .error::before { content: '! ERROR // '; font-family: var(--display); font-weight: 700; letter-spacing: 2px; font-size: 11px; }

  /* ─── Animations ────────────────────────────────────────── */
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
</style>
</head>

<body>
<div id="app">
  <header>
    <div class="logo"><span class="glyph">🜛</span> Ask <span class="ask-rhodes">Rhodes</span></div>
    <div class="meta" id="status-pill"><span class="dot"></span><span id="status-txt">connecting</span></div>
  </header>

  <main id="main">
    <div id="hero">
      <div class="big-title">Ask Rhodes</div>
      <div class="tagline">
        <span class="emph">// OPINIONATED SEARCH ENGINE //</span><br>
        Rhodes searches the web<span class="pipe">·</span>queries its archive<span class="pipe">·</span>tells you what it thinks.<br>
        Citations included. No hedging.
      </div>

      <form class="searchbox" id="hero-form">
        <input type="text" id="hero-input" placeholder="why did calvinist societies outcompete their neighbors?" autocomplete="off" autofocus>
        <button type="submit">Query</button>
      </form>

      <div class="focuschips">
        <label><input type="radio" name="focus" value="all" checked><span>All</span></label>
        <label><input type="radio" name="focus" value="kb"><span>KB Only</span></label>
        <label><input type="radio" name="focus" value="web"><span>Web</span></label>
        <label><input type="radio" name="focus" value="academic"><span>Academic</span></label>
        <label><input type="radio" name="focus" value="contrarian"><span>Contrarian</span></label>
      </div>
    </div>

    <div id="thread"></div>
  </main>
</div>

<div class="followup" id="followup" style="display:none">
  <form class="searchbox" id="followup-form">
    <input type="text" id="followup-input" placeholder="follow-up query..." autocomplete="off">
    <button type="submit">Send</button>
  </form>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   Rhodes Ask — Perplexity-style surface over the Rhodes WS.
   Standalone frontend. No backend changes. Uses the existing
   /ws endpoint, routes to bap-ea-d (opinionated DeepSeek),
   wraps every user turn with a citation contract the model
   answers against, then parses <sources> + <related> blocks.
   ═══════════════════════════════════════════════════════════ */

const MODEL = "bap-ea-d";
const WS_URL = (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws";

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
const $ = (id) => document.getElementById(id);
const el = (tag, cls, text) => { const e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = text; return e; };
const escapeHtml = (s) => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const state = {
  ws: null,
  authed: false,
  modelSet: false,
  thread: [],         // list of {q, sources, answer, related, thinking, status, phase, nodes}
  currentTurn: null,
  phaseTimer: null,
};

/* ───────────── Prompt wrap: the citation contract ───────────── */
function buildWrappedQuery(userQuestion, focus) {
  const focusDirective = ({
    "all":        "Use web_search AND search_knowledge. Cast a wide net across live web results and Rhodes's internal archive (LessWrong, EA Forum, DSL, Sailer, Hanania, Kirkegaard, Zvi, Cremieux, Anthropic research).",
    "kb":         "Use search_knowledge ONLY — do not touch web_search. Sources must come from Rhodes's internal corpus (LessWrong, DSL, Sailer, Hanania, Kirkegaard, Zvi, Cremieux).",
    "web":        "Use web_search primarily. Use search_knowledge only if the topic is plainly in-corpus.",
    "academic":   "Use web_search with preference for primary literature, preprints, and working papers. Quote effect sizes. Name authors.",
    "contrarian": "Use web_search AND search_knowledge. Weight sources toward heterodox/dissident/neoreactionary/HBD-adjacent analysis. No mainstream consensus-laundering.",
  })[focus] || "";

  return (
`[RHODES-ASK MODE — PERPLEXITY SURFACE]

The user has submitted a question through the Rhodes Ask interface. Answer in structured Perplexity-style citation format.

PROCEDURE:
1. ${focusDirective}
2. Before answering, run at least one search tool call. Prefer 3-6 sources total.
3. Write a substantive, opinionated answer in your own Rhodes voice. Do NOT hedge, neutralize, or both-sides. Plain-spoken. Data-first. If the mainstream view is wrong, say so and say why.
4. Cite inline as [1], [2], etc. — every non-obvious empirical claim must carry a citation.
5. End your answer with the TWO required blocks below, in this EXACT format (no extra prose between them):

<sources>
[1] https://full.url/path | Source Title | one-line why-this-matters
[2] https://full.url/path | Source Title | one-line why-this-matters
</sources>

<related>
1. A natural follow-up question the user might ask next
2. A second follow-up question
3. A third follow-up question
</related>

IMPORTANT:
- Use REAL urls from your actual search results. Do not fabricate urls.
- Every [n] inline must appear in the <sources> block.
- The one-line "why-this-matters" should be tight and pointed — 6-12 words.
- Do not add any text after </related>.

USER QUESTION:
${userQuestion}`
  );
}

/* ───────────── Parsers ───────────── */
function parseSourcesBlock(block) {
  return block.trim().split("\n").map(line => {
    line = line.trim();
    if (!line) return null;
    // Format: [n] <url-or-ref> | title | note    (note optional)
    // Tolerant split-on-pipe parser — handles https:// urls AND identifier refs
    // like "KB: CALVINIST-EVOLUTION" where the "url" has spaces.
    const m = line.match(/^\[(\d+)\]\s+(.+)$/);
    if (!m) return null;
    const parts = m[2].split(/\s*\|\s*/);
    if (parts.length < 2) return null;
    const url = parts[0].trim();
    const title = parts[1].trim();
    const note = (parts[2] || "").trim();
    let domain = "";
    try {
      // Real URL
      domain = new URL(url).hostname.replace(/^www\./, "");
    } catch {
      // Identifier ref — strip to a short tag
      domain = url.slice(0, 24);
    }
    return { n: parseInt(m[1], 10), url, title, note, domain, isRef: !/^https?:\/\//.test(url) };
  }).filter(Boolean);
}

function parseRelatedBlock(block) {
  return block.trim().split("\n").map(line => {
    return line.trim().replace(/^(\d+[\.\)]|[-*])\s*/, "").trim();
  }).filter(s => s.length > 0).slice(0, 5);
}

function splitAnswerAndBlocks(fullText) {
  const srcIdx = fullText.indexOf("<sources>");
  const answerText = srcIdx === -1 ? fullText : fullText.slice(0, srcIdx);
  const srcMatch = fullText.match(/<sources>([\s\S]*?)<\/sources>/);
  const relMatch = fullText.match(/<related>([\s\S]*?)<\/related>/);
  return {
    answer: answerText.trim(),
    sources: srcMatch ? parseSourcesBlock(srcMatch[1]) : [],
    related: relMatch ? parseRelatedBlock(relMatch[1]) : [],
  };
}

/* ───────────── Rendering ───────────── */
function renderAnswerBody(text, sources, streaming) {
  // Basic markdown: **bold**, *italic*, `code`, paragraphs, headings, lists
  let html = escapeHtml(text);
  html = html.replace(/^### (.+)$/gm, "<h3>$1</h3>");
  html = html.replace(/^## (.+)$/gm, "<h2>$1</h2>");
  html = html.replace(/^# (.+)$/gm, "<h1>$1</h1>");
  html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, "<em>$1</em>");
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
  // citation chips
  html = html.replace(/\[(\d+)\]/g, '<sup class="cite" data-n="$1">[$1]</sup>');
  // paragraph splitting on blank lines
  const paras = html.split(/\n\n+/).map(p => {
    if (/^<h[1-3]>/.test(p)) return p;
    // list detection
    if (/^[-*]\s/.test(p)) {
      const items = p.split("\n").filter(l => l.trim()).map(l => "<li>" + l.replace(/^[-*]\s*/, "") + "</li>").join("");
      return "<ul>" + items + "</ul>";
    }
    if (/^\d+[.)]\s/.test(p)) {
      const items = p.split("\n").filter(l => l.trim()).map(l => "<li>" + l.replace(/^\d+[.)]\s*/, "") + "</li>").join("");
      return "<ol>" + items + "</ol>";
    }
    return "<p>" + p.replace(/\n/g, "<br>") + "</p>";
  }).join("");
  return paras + (streaming ? '<span class="cursor"></span>' : "");
}

function renderTurn(turn) {
  const root = turn.nodes.root;
  root.innerHTML = "";
  root.className = "fade-in";

  // Question
  root.appendChild(el("div", "question", turn.q));

  // Status (phase)
  if (turn.status !== "done") {
    const st = el("div", "status" + (turn.status === "done" ? " done" : ""));
    st.appendChild(el("div", "spin"));
    const phaseEl = el("span", "phase", turn.phase || "thinking");
    st.appendChild(phaseEl);
    if (turn.phaseDetail) st.appendChild(document.createTextNode(" · " + turn.phaseDetail));
    root.appendChild(st);
    turn.nodes.status = st;
  }

  // Thinking (collapsed)
  if (turn.thinking && turn.thinking.trim()) {
    const det = document.createElement("details");
    det.className = "thinking";
    const sum = el("summary", null, "▸ reasoning (" + turn.thinking.length + " chars)");
    det.appendChild(sum);
    det.appendChild(el("div", "tk-body", turn.thinking));
    root.appendChild(det);
  }

  // Sources
  if (turn.sources && turn.sources.length) {
    const ttl = el("div", "section-label");
    ttl.innerHTML = 'Sources <span class="count">[' + turn.sources.length + ']</span>';
    root.appendChild(ttl);

    const grid = el("div", "sources");
    turn.sources.forEach(s => {
      const card = s.isRef ? document.createElement("div") : document.createElement("a");
      card.className = "source" + (s.isRef ? " ref" : "");
      if (!s.isRef) {
        card.href = s.url;
        card.target = "_blank";
        card.rel = "noopener noreferrer";
      }
      card.id = "src-" + turn.id + "-" + s.n;

      const head = el("div", "source-head");
      head.appendChild(el("span", "n", s.n));
      if (s.isRef) {
        // "KB" badge instead of favicon
        const badge = el("span", "ref-badge", "KB");
        head.appendChild(badge);
      } else {
        const fav = document.createElement("img");
        fav.src = "https://www.google.com/s2/favicons?domain=" + encodeURIComponent(s.domain) + "&sz=32";
        fav.alt = "";
        fav.onerror = () => fav.style.display = "none";
        head.appendChild(fav);
      }
      head.appendChild(el("span", "domain", s.domain));
      card.appendChild(head);

      card.appendChild(el("div", "source-title", s.title));
      if (s.note) card.appendChild(el("div", "source-note", s.note));
      grid.appendChild(card);
    });
    root.appendChild(grid);
  }

  // Answer
  if (turn.answer) {
    const ans = el("div", "answer");
    ans.innerHTML = renderAnswerBody(turn.answer, turn.sources, turn.status !== "done");
    // wire citation chips to scroll to source card
    ans.querySelectorAll(".cite").forEach(ch => {
      ch.addEventListener("click", (ev) => {
        ev.preventDefault();
        const n = ch.getAttribute("data-n");
        const target = document.getElementById("src-" + turn.id + "-" + n);
        if (target) {
          target.scrollIntoView({behavior: "smooth", block: "center"});
          target.style.transition = "transform .2s";
          target.style.transform = "scale(1.04)";
          setTimeout(() => target.style.transform = "", 300);
        }
      });
    });
    root.appendChild(ans);
  }

  // Related
  if (turn.related && turn.related.length && turn.status === "done") {
    const relTtl = el("div", "section-label");
    relTtl.innerHTML = 'Follow-up <span class="count">[' + turn.related.length + ']</span>';
    root.appendChild(relTtl);
    const rel = el("div", "related");
    turn.related.forEach(q => {
      const btn = el("button", null, q);
      btn.addEventListener("click", () => submitQuery(q));
      rel.appendChild(btn);
    });
    root.appendChild(rel);
  }
}

/* ───────────── Status / phases ───────────── */
function setPhase(turn, phase, detail) {
  turn.phase = phase;
  turn.phaseDetail = detail || "";
  renderTurn(turn);
}

function setStatusPill(state, text) {
  const pill = $("status-pill");
  pill.className = "meta " + (state || "");
  $("status-txt").textContent = text;
}

/* ───────────── WebSocket ───────────── */
function connect() {
  try { state.ws = new WebSocket(WS_URL); } catch (e) { setStatusPill("err", "ws failed"); return; }

  state.ws.onopen = () => {
    setStatusPill("", "authing");
    state.ws.send(JSON.stringify({
      msg_type: "auth_request",
      msg_id: uid(),
      payload: { client_id: "ask", tab_id: uid(), token: "", user_token: "", resume_session: "" }
    }));
  };

  state.ws.onclose = () => {
    setStatusPill("err", "disconnected");
    state.authed = false;
    state.modelSet = false;
    setTimeout(connect, 2000);
  };

  state.ws.onerror = () => setStatusPill("err", "ws error");

  state.ws.onmessage = (e) => {
    let m; try { m = JSON.parse(e.data); } catch { return; }
    handleMessage(m);
  };
}

function handleMessage(m) {
  const p = m.payload || {};
  const type = m.msg_type;

  if (type === "auth_response") {
    state.authed = !!p.success;
    if (state.authed) {
      // Switch to opinionated model
      state.ws.send(JSON.stringify({
        msg_type: "model_set_request",
        msg_id: uid(),
        payload: { model: MODEL }
      }));
      setStatusPill("live", "ready · " + MODEL);
      state.modelSet = true;
    } else {
      setStatusPill("err", "auth failed");
    }
    return;
  }

  if (type === "model_set_response") {
    // ignore — we optimistically set above
    return;
  }

  if (!state.currentTurn) return;
  const turn = state.currentTurn;

  if (type === "tool_call") {
    const name = p.name || p.tool || "tool";
    const mapping = {
      "web_search": "searching the web",
      "search_knowledge": "searching rhodes archive",
      "web_fetch": "reading page",
      "rhodes_thinking": "thinking",
    };
    setPhase(turn, mapping[name] || name, p.arguments?.query || "");
    return;
  }

  if (type === "tool_result") {
    setPhase(turn, "synthesizing");
    return;
  }

  if (type === "ai_thinking" || type === "reasoning_chunk") {
    turn.thinking = (turn.thinking || "") + (p.content || p.thinking || "");
    // no rerender while thinking — too noisy
    return;
  }

  if (type === "ai_message_chunk") {
    const chunk = p.content || "";
    if (!chunk) return;
    turn.rawBuffer += chunk;
    // While streaming, show everything up to <sources>
    const split = splitAnswerAndBlocks(turn.rawBuffer);
    turn.answer = split.answer;
    if (turn.phase !== "writing") setPhase(turn, "writing");
    else renderTurn(turn);
    // autoscroll
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    return;
  }

  if (type === "ai_message") {
    // Final — parse blocks, finalize
    const finalText = p.content || turn.rawBuffer;
    const split = splitAnswerAndBlocks(finalText);
    turn.answer = split.answer;
    turn.sources = split.sources;
    turn.related = split.related;
    turn.status = "done";
    turn.phase = null;
    renderTurn(turn);
    // Show follow-up bar
    $("followup").style.display = "block";
    $("followup-input").focus();
    state.currentTurn = null;
    setStatusPill("live", "ready · " + MODEL);
    return;
  }

  if (type === "error" || type === "usage_limit") {
    const msg = p.message || p.error || "error";
    const err = el("div", "error", "⚠ " + msg);
    turn.nodes.root.appendChild(err);
    turn.status = "done";
    state.currentTurn = null;
    setStatusPill("err", "error");
    return;
  }
}

/* ───────────── Submit ───────────── */
function submitQuery(q) {
  if (!q || !q.trim()) return;
  if (!state.authed || !state.modelSet) return;

  q = q.trim();

  // Hide hero
  $("hero").style.display = "none";

  // Create turn
  const turn = {
    id: uid(),
    q,
    answer: "",
    sources: [],
    related: [],
    thinking: "",
    rawBuffer: "",
    status: "pending",
    phase: "queued",
    phaseDetail: "",
    nodes: { root: el("div", "turn") },
  };
  $("thread").appendChild(turn.nodes.root);
  state.thread.push(turn);
  state.currentTurn = turn;
  renderTurn(turn);

  // Focus mode
  const focus = (document.querySelector('input[name="focus"]:checked') || {}).value || "all";

  // Send wrapped message
  const wrapped = buildWrappedQuery(q, focus);
  state.ws.send(JSON.stringify({
    msg_type: "user_message",
    msg_id: uid(),
    payload: { content: wrapped, stream: true }
  }));
  setStatusPill("live", "thinking…");
  setPhase(turn, "dispatching");

  // Clear inputs
  $("hero-input").value = "";
  $("followup-input").value = "";

  // Scroll into view
  turn.nodes.root.scrollIntoView({ behavior: "smooth", block: "start" });
}

/* ───────────── Wire up ───────────── */
$("hero-form").addEventListener("submit", (e) => {
  e.preventDefault();
  submitQuery($("hero-input").value);
});
$("followup-form").addEventListener("submit", (e) => {
  e.preventDefault();
  submitQuery($("followup-input").value);
});

connect();
</script>
</body>
</html>
