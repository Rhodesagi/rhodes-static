<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            background: #0f0f23;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
        }

        .display {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .previous {
            color: #888;
            font-size: 16px;
            min-height: 24px;
            word-break: break-all;
        }

        .current {
            color: #fff;
            font-size: 42px;
            font-weight: 300;
            word-break: break-all;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 20px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-weight: 500;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .number {
            background: #2d2d44;
            color: #fff;
        }

        .number:hover {
            background: #3d3d5c;
        }

        .operator {
            background: #ff6b35;
            color: #fff;
        }

        .operator:hover {
            background: #ff8555;
        }

        .function {
            background: #4a4a6a;
            color: #fff;
        }

        .function:hover {
            background: #5a5a7a;
        }

        .equals {
            background: #00d4aa;
            color: #fff;
            grid-column: span 2;
        }

        .equals:hover {
            background: #00e6b8;
        }

        .zero {
            grid-column: span 2;
        }

        .history {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #2d2d44;
        }

        .history-title {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .history-item {
            color: #aaa;
            font-size: 14px;
            padding: 5px 0;
            cursor: pointer;
            transition: color 0.15s;
        }

        .history-item:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="previous" id="previous"></div>
            <div class="current" id="current">0</div>
        </div>
        <div class="buttons">
            <button class="function" onclick="clearAll()">AC</button>
            <button class="function" onclick="clearEntry()">CE</button>
            <button class="function" onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="setOperation('/')">÷</button>

            <button class="number" onclick="appendNumber('7')">7</button>
            <button class="number" onclick="appendNumber('8')">8</button>
            <button class="number" onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="setOperation('*')">×</button>

            <button class="number" onclick="appendNumber('4')">4</button>
            <button class="number" onclick="appendNumber('5')">5</button>
            <button class="number" onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="setOperation('-')">−</button>

            <button class="number" onclick="appendNumber('1')">1</button>
            <button class="number" onclick="appendNumber('2')">2</button>
            <button class="number" onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="setOperation('+')">+</button>

            <button class="number zero" onclick="appendNumber('0')">0</button>
            <button class="number" onclick="appendDecimal()">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
        <div class="history" id="history" style="display: none;">
            <div class="history-title">History</div>
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        let currentValue = '0';
        let previousValue = '';
        let operation = null;
        let shouldResetScreen = false;
        let history = [];

        const currentDisplay = document.getElementById('current');
        const previousDisplay = document.getElementById('previous');

        function updateDisplay() {
            currentDisplay.textContent = currentValue;
            if (operation && previousValue) {
                previousDisplay.textContent = previousValue + ' ' + getOperatorSymbol(operation);
            } else {
                previousDisplay.textContent = '';
            }
        }

        function getOperatorSymbol(op) {
            const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
            return symbols[op] || op;
        }

        function appendNumber(num) {
            if (shouldResetScreen) {
                currentValue = num;
                shouldResetScreen = false;
            } else {
                currentValue = currentValue === '0' ? num : currentValue + num;
            }
            updateDisplay();
        }

        function appendDecimal() {
            if (shouldResetScreen) {
                currentValue = '0.';
                shouldResetScreen = false;
            } else if (!currentValue.includes('.')) {
                currentValue += '.';
            }
            updateDisplay();
        }

        function setOperation(op) {
            if (operation !== null && !shouldResetScreen) {
                calculate();
            }
            previousValue = currentValue;
            operation = op;
            shouldResetScreen = true;
            updateDisplay();
        }

        function calculate() {
            if (operation === null || previousValue === '') return;

            const prev = parseFloat(previousValue);
            const current = parseFloat(currentValue);
            let result;

            switch (operation) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    if (current === 0) {
                        currentValue = 'Error';
                        operation = null;
                        previousValue = '';
                        shouldResetScreen = true;
                        updateDisplay();
                        return;
                    }
                    result = prev / current;
                    break;
            }

            result = Math.round(result * 1000000000) / 1000000000;
            
            addToHistory(previousValue + ' ' + getOperatorSymbol(operation) + ' ' + currentValue + ' = ' + result);
            
            currentValue = result.toString();
            operation = null;
            previousValue = '';
            shouldResetScreen = true;
            updateDisplay();
        }

        function clearAll() {
            currentValue = '0';
            previousValue = '';
            operation = null;
            shouldResetScreen = false;
            updateDisplay();
        }

        function clearEntry() {
            currentValue = '0';
            updateDisplay();
        }

        function deleteLast() {
            if (currentValue.length > 1 && !shouldResetScreen) {
                currentValue = currentValue.slice(0, -1);
            } else {
                currentValue = '0';
            }
            updateDisplay();
        }

        function addToHistory(entry) {
            history.unshift(entry);
            if (history.length > 5) history.pop();
            updateHistoryDisplay();
        }

        function updateHistoryDisplay() {
            const historyEl = document.getElementById('history');
            const listEl = document.getElementById('history-list');
            
            if (history.length > 0) {
                historyEl.style.display = 'block';
                listEl.innerHTML = history.map(function(item) {
                    var val = item.split(' = ')[1];
                    return '<div class="history-item" onclick="loadFromHistory(' + val + ')">' + item + '</div>';
                }).join('');
            }
        }

        function loadFromHistory(value) {
            currentValue = value.toString();
            shouldResetScreen = true;
            updateDisplay();
        }

        document.addEventListener('keydown', function(e) {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendDecimal();
            if (e.key === '+') setOperation('+');
            if (e.key === '-') setOperation('-');
            if (e.key === '*') setOperation('*');
            if (e.key === '/') { e.preventDefault(); setOperation('/'); }
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Escape') clearAll();
            if (e.key === 'Backspace') deleteLast();
        });
    </script>
</body>
</html>
