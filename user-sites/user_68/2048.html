<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            background: #faf8ef;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        h1 {
            color: #776e65;
            font-size: 48px;
            margin-bottom: 10px;
        }
        .score-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .score-box {
            background: #bbada0;
            padding: 10px 20px;
            border-radius: 6px;
            text-align: center;
            color: white;
        }
        .score-label {
            font-size: 12px;
            text-transform: uppercase;
        }
        .score-value {
            font-size: 24px;
            font-weight: bold;
        }
        .game-container {
            background: #bbada0;
            padding: 10px;
            border-radius: 6px;
            position: relative;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 10px;
        }
        .grid-cell {
            background: rgba(238, 228, 218, 0.35);
            border-radius: 3px;
        }
        .tile-container {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
        }
        .tile {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            font-weight: bold;
            transition: all 0.15s ease;
            z-index: 10;
        }
        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 30px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 30px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 30px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 25px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 25px; }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 20px; }
        .game-message {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 6px;
        }
        .game-message.visible {
            display: flex;
        }
        .game-message p {
            font-size: 48px;
            color: #776e65;
            margin-bottom: 20px;
        }
        .restart-button {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 3px;
            cursor: pointer;
        }
        .restart-button:hover {
            background: #9f8b77;
        }
        .instructions {
            margin-top: 20px;
            color: #776e65;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>2048</h1>
    <div class="score-container">
        <div class="score-box">
            <div class="score-label">Score</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">Best</div>
            <div class="score-value" id="best">0</div>
        </div>
    </div>
    <div class="game-container">
        <div class="grid-container">
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        </div>
        <div class="tile-container" id="tile-container"></div>
        <div class="game-message" id="game-message">
            <p id="message-text">Game Over!</p>
            <button class="restart-button" onclick="restartGame()">Try Again</button>
        </div>
    </div>
    <p class="instructions">Use arrow keys to play. Join tiles to reach 2048!</p>

    <script>
        let grid = [];
        let score = 0;
        let bestScore = localStorage.getItem('best2048') || 0;
        let hasWon = false;
        
        document.getElementById('best').textContent = bestScore;
        
        function initGame() {
            grid = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0;
            hasWon = false;
            updateScore();
            spawnTile();
            spawnTile();
            render();
            hideMessage();
        }
        
        function spawnTile() {
            const emptyCells = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) emptyCells.push({r, c});
                }
            }
            if (emptyCells.length === 0) return false;
            
            const pos = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            grid[pos.r][pos.c] = Math.random() < 0.9 ? 2 : 4;
            return {r: pos.r, c: pos.c, value: grid[pos.r][pos.c], isNew: true};
        }
        
        function render() {
            const container = document.getElementById('tile-container');
            container.innerHTML = '';
            
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] !== 0) {
                        const tile = document.createElement('div');
                        tile.className = 'tile tile-' + grid[r][c];
                        if (grid[r][c] > 2048) tile.className = 'tile tile-super';
                        tile.textContent = grid[r][c];
                        tile.style.left = (c * 110) + 'px';
                        tile.style.top = (r * 110) + 'px';
                        container.appendChild(tile);
                    }
                }
            }
        }
        
        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('best2048', bestScore);
                document.getElementById('best').textContent = bestScore;
            }
        }
        
        function move(direction) {
            let moved = false;
            let merged = Array(4).fill(null).map(() => Array(4).fill(false));
            
            const getVector = () => {
                switch(direction) {
                    case 'up': return {x: 0, y: -1};
                    case 'down': return {x: 0, y: 1};
                    case 'left': return {x: -1, y: 0};
                    case 'right': return {x: 1, y: 0};
                }
            };
            
            const vector = getVector();
            
            const traversals = {
                x: direction === 'right' ? [3,2,1,0] : [0,1,2,3],
                y: direction === 'down' ? [3,2,1,0] : [0,1,2,3]
            };
            
            for (let y of traversals.y) {
                for (let x of traversals.x) {
                    if (grid[y][x] === 0) continue;
                    
                    let newX = x;
                    let newY = y;
                    
                    while (true) {
                        const nextX = newX + vector.x;
                        const nextY = newY + vector.y;
                        
                        if (nextX < 0 || nextX >= 4 || nextY < 0 || nextY >= 4) break;
                        
                        if (grid[nextY][nextX] === 0) {
                            grid[nextY][nextX] = grid[newY][newX];
                            grid[newY][newX] = 0;
                            newX = nextX;
                            newY = nextY;
                            moved = true;
                        } else if (grid[nextY][nextX] === grid[newY][newX] && !merged[nextY][nextX] && !merged[newY][newX]) {
                            grid[nextY][nextX] *= 2;
                            grid[newY][newX] = 0;
                            merged[nextY][nextX] = true;
                            score += grid[nextY][nextX];
                            if (grid[nextY][nextX] === 2048 && !hasWon) {
                                hasWon = true;
                                showMessage('You Win!', false);
                            }
                            moved = true;
                            break;
                        } else {
                            break;
                        }
                    }
                }
            }
            
            if (moved) {
                spawnTile();
                updateScore();
                render();
                if (isGameOver()) {
                    showMessage('Game Over!', true);
                }
            }
        }
        
        function isGameOver() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) return false;
                    if (c < 3 && grid[r][c] === grid[r][c+1]) return false;
                    if (r < 3 && grid[r][c] === grid[r+1][c]) return false;
                }
            }
            return true;
        }
        
        function showMessage(text, isGameOver) {
            document.getElementById('message-text').textContent = text;
            document.getElementById('game-message').classList.add('visible');
        }
        
        function hideMessage() {
            document.getElementById('game-message').classList.remove('visible');
        }
        
        function restartGame() {
            initGame();
        }
        
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': e.preventDefault(); move('up'); break;
                case 'ArrowDown': e.preventDefault(); move('down'); break;
                case 'ArrowLeft': e.preventDefault(); move('left'); break;
                case 'ArrowRight': e.preventDefault(); move('right'); break;
            }
        });
        
        initGame();
    </script>
</body>
</html>
