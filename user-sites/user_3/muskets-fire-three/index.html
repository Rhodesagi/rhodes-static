<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSKETS FIRE THREE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #gameContainer { width: 100vw; height: 100vh; position: relative; }
        canvas { display: block; width: 100%; height: 100%; }
        #instructions {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            color: #888; font-size: 12px; text-align: center; z-index: 100;
            background: rgba(0,0,0,0.8); padding: 8px 20px; border-radius: 3px; border: 1px solid #333;
        }
        .playerLabel {
            position: absolute; bottom: 15px; color: #666; font-size: 16px;
            font-weight: bold; z-index: 100; text-shadow: 0 0 5px rgba(0,0,0,0.8);
        }
        #p1Label { left: 25%; transform: translateX(-50%); }
        #p2Label { right: 25%; transform: translateX(50%); }
        #divider {
            position: absolute; left: 50%; top: 0; width: 3px; height: 100%;
            background: #333; z-index: 50; transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="instructions">
            P1: WASD Move | Mouse Aim | Click Fire | R Reload<br>
            P2: IJKL Move | Arrow Keys Aim | Enter Fire | P Reload
        </div>
        <div id="divider"></div>
        <div class="playerLabel" id="p1Label">SOLDIER 1</div>
        <div class="playerLabel" id="p2Label">SOLDIER 2</div>
    </div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const GAME_CONFIG = {
            walkSpeed: 3.5, turnSpeed: 0.02, mouseSensitivity: 0.002,
            musketVelocity: 137, gravity: 9.8,
            reloadStages: [
                { name: 'half-cock', duration: 0.4 },
                { name: 'frizzen-open', duration: 0.3 },
                { name: 'prime-pan', duration: 0.7 },
                { name: 'close-frizzen', duration: 0.3 },
                { name: 'charge-barrel', duration: 0.9 },
                { name: 'draw-ramrod', duration: 0.4 },
                { name: 'ram-charge', duration: 1.3 },
                { name: 'return-ramrod', duration: 0.4 },
                { name: 'full-cock', duration: 0.4 },
                { name: 'ready', duration: 0 }
            ],
            flashInPanDelay: 0.15,
            sightFOV: 18, hipFOV: 70,
            aimTransitionSpeed: 0.1
        };

        // Layer masks for culling
        const LAYERS = { P1_WEAPON: 1, P2_WEAPON: 2, WORLD: 4 };

        // Input
        const keys = {}, keysPressed = {}, mouseDelta = { x: 0, y: 0 };
        const playerKeys = {
            p1: { forward: 'w', back: 's', left: 'a', right: 'd', aim: 'q', fire: 'e', reload: 'r' },
            p2: { forward: 'i', back: 'k', left: 'j', right: 'l', aim: 'u', fire: 'o', reload: 'p' }
        };

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (!keys[key]) keysPressed[key] = true;
            keys[key] = true;
        });
        document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                mouseDelta.x += e.movementX * GAME_CONFIG.mouseSensitivity;
                mouseDelta.y += e.movementY * GAME_CONFIG.mouseSensitivity;
            }
        });

        // ============================================
        // FLINTLOCK MUSKET
        // ============================================
        class FlintlockMusket {
            constructor(scene, playerId, layerMask) {
                this.scene = scene; this.playerId = playerId;
                this.state = 'ready'; this.loaded = false; this.primed = false; this.cocked = false;
                this.reloadStageIndex = 0; this.reloadTimer = 0;
                this.layerMask = layerMask;
                this.flashInPanTimer = 0;
                
                this.hipPos = new THREE.Vector3(0.3, -0.35, 0.5);
                this.hipRot = new THREE.Euler(0.1, -0.25, 0);
                this.aimPos = new THREE.Vector3(0, -0.08, 0.22);
                this.aimRot = new THREE.Euler(0, 0, 0);
                
                this.currentPos = this.hipPos.clone();
                this.currentRot = this.hipRot.clone();
                
                this.createWeaponModel();
            }

            createWeaponModel() {
                this.group = new THREE.Group();
                this.group.layers.set(this.layerMask);
                
                const metalMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.4, metalness: 0.8 });
                const woodMat = new THREE.MeshStandardMaterial({ color: 0x654321, roughness: 0.8 });

                // Barrel
                const barrelGeo = new THREE.CylinderGeometry(0.022, 0.028, 1.15, 12);
                this.barrel = new THREE.Mesh(barrelGeo, metalMat);
                this.barrel.rotation.x = Math.PI / 2;
                this.barrel.position.z = 0.58;
                this.barrel.layers.set(this.layerMask);
                this.group.add(this.barrel);

                // Stock
                const stockGeo = new THREE.BoxGeometry(0.09, 0.11, 0.65);
                this.stock = new THREE.Mesh(stockGeo, woodMat);
                this.stock.position.set(0, -0.035, -0.12);
                this.stock.layers.set(this.layerMask);
                this.group.add(this.stock);

                // Rear sight - V notch
                const rearSightGeo = new THREE.BoxGeometry(0.03, 0.02, 0.012);
                this.rearSight = new THREE.Mesh(rearSightGeo, metalMat);
                this.rearSight.position.set(0, 0.07, 0.18);
                this.rearSight.layers.set(this.layerMask);
                this.group.add(this.rearSight);

                // Front sight post
                const frontSightGeo = new THREE.BoxGeometry(0.01, 0.03, 0.006);
                this.frontSight = new THREE.Mesh(frontSightGeo, metalMat);
                this.frontSight.position.set(0, 0.06, 1.12);
                this.frontSight.layers.set(this.layerMask);
                this.group.add(this.frontSight);

                // Lock
                const lockGeo = new THREE.BoxGeometry(0.05, 0.07, 0.1);
                this.lock = new THREE.Mesh(lockGeo, metalMat);
                this.lock.position.set(0.065, 0.015, 0.12);
                this.lock.layers.set(this.layerMask);
                this.group.add(this.lock);

                // Pan
                const panGeo = new THREE.BoxGeometry(0.02, 0.012, 0.03);
                this.pan = new THREE.Mesh(panGeo, new THREE.MeshStandardMaterial({ color: 0x1a1a1a }));
                this.pan.position.set(0.065, 0.065, 0.12);
                this.pan.layers.set(this.layerMask);
                this.group.add(this.pan);

                // Ramrod
                const ramrodGeo = new THREE.CylinderGeometry(0.004, 0.004, 0.8, 8);
                this.ramrod = new THREE.Mesh(ramrodGeo, metalMat);
                this.ramrod.rotation.x = Math.PI / 2;
                this.ramrod.position.set(0.045, -0.055, 0.22);
                this.ramrod.layers.set(this.layerMask);
                this.group.add(this.ramrod);

                this.scene.add(this.group);
            }

            update(delta, cameraPos, camQuat, isAiming) {
                if (this.state !== 'ready') {
                    this.reloadTimer += delta;
                    const stage = GAME_CONFIG.reloadStages[this.reloadStageIndex];
                    if (this.reloadTimer >= stage.duration) {
                        this.reloadTimer = 0;
                        this.reloadStageIndex++;
                        if (this.reloadStageIndex >= GAME_CONFIG.reloadStages.length) {
                            this.loaded = true; this.primed = true; this.cocked = true;
                            this.state = 'ready';
                        }
                    }
                }

                // Ramrod animation during reload
                if (this.state !== 'ready' && this.reloadStageIndex >= 5 && this.reloadStageIndex <= 7) {
                    this.ramrod.position.set(0.12, -0.015, 0.25);
                    this.ramrod.rotation.z = -0.4;
                } else {
                    this.ramrod.position.set(0.045, -0.055, 0.22);
                    this.ramrod.rotation.z = 0;
                    this.ramrod.rotation.x = Math.PI / 2;
                }

                const targetPos = isAiming ? this.aimPos : this.hipPos;
                const targetRot = isAiming ? this.aimRot : this.hipRot;

                this.currentPos.lerp(targetPos, GAME_CONFIG.aimTransitionSpeed);
                this.currentRot.x += (targetRot.x - this.currentRot.x) * GAME_CONFIG.aimTransitionSpeed;
                this.currentRot.y += (targetRot.y - this.currentRot.y) * GAME_CONFIG.aimTransitionSpeed;

                this.group.position.copy(cameraPos);
                this.group.rotation.setFromQuaternion(camQuat);
                const offset = this.currentPos.clone().applyQuaternion(camQuat);
                this.group.position.add(offset);
                this.group.rotateX(this.currentRot.x);
                this.group.rotateY(this.currentRot.y);
            }

            startReload() {
                if (this.state !== 'ready' || this.loaded) return false;
                this.state = 'reloading'; this.reloadStageIndex = 0; this.reloadTimer = 0;
                this.primed = false; this.cocked = false;
                return true;
            }

            fire() {
                if (!this.loaded || !this.cocked || this.state !== 'ready') return null;
                this.loaded = false; this.primed = false; this.cocked = false;

                // Calculate bullet trajectory from sight picture
                // Align front post with rear notch to determine true aim point
                const rearSightWorld = new THREE.Vector3(0, 0.07, 0.18);
                const frontSightWorld = new THREE.Vector3(0, 0.06, 1.12);
                
                rearSightWorld.applyMatrix4(this.group.matrixWorld);
                frontSightWorld.applyMatrix4(this.group.matrixWorld);
                
                // Direction from rear sight through front sight
                const direction = new THREE.Vector3().subVectors(frontSightWorld, rearSightWorld).normalize();
                
                // Muzzle position (slightly offset from barrel end)
                const muzzlePos = new THREE.Vector3(0, 0.06, 1.15);
                muzzlePos.applyMatrix4(this.group.matrixWorld);

                return { position: muzzlePos, direction: direction, flashInPan: true };
            }
        }

        // ============================================
        // PROJECTILES
        // ============================================
        class ProjectileManager {
            constructor(scene) {
                this.scene = scene; this.projectiles = [];
                this.ballGeo = new THREE.SphereGeometry(0.018, 8, 8);
                this.ballMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            }

            spawn(pos, dir, ownerId, hasFlashInPan) {
                if (hasFlashInPan) {
                    // Flash in the pan delay before main discharge
                    setTimeout(() => {
                        this.createProjectile(pos, dir, ownerId);
                    }, GAME_CONFIG.flashInPanDelay * 1000);
                } else {
                    this.createProjectile(pos, dir, ownerId);
                }
            }

            createProjectile(pos, dir, ownerId) {
                const mesh = new THREE.Mesh(this.ballGeo, this.ballMat);
                mesh.position.copy(pos);
                mesh.layers.set(LAYERS.WORLD);
                this.scene.add(mesh);

                this.projectiles.push({
                    mesh, velocity: dir.clone().multiplyScalar(GAME_CONFIG.musketVelocity),
                    owner: ownerId, life: 4
                });
            }

            update(delta, players) {
                for (let i = this.projectiles.length - 1; i >= 0; i--) {
                    const p = this.projectiles[i];
                    p.life -= delta;
                    p.velocity.y -= GAME_CONFIG.gravity * delta;
                    p.mesh.position.addScaledVector(p.velocity, delta);

                    let hit = false;
                    for (const player of players) {
                        if (player.id !== p.owner && player.alive) {
                            if (p.mesh.position.distanceTo(player.position) < 0.5) {
                                player.takeDamage(100); hit = true; break;
                            }
                        }
                    }

                    if (hit || p.life <= 0 || p.mesh.position.y < -1) {
                        this.scene.remove(p.mesh); this.projectiles.splice(i, 1);
                    }
                }
            }
        }

        // ============================================
        // PLAYER
        // ============================================
        class Player {
            constructor(id, startPos, keyMap, weaponLayer) {
                this.id = id; this.position = startPos.clone();
                this.rotationY = id === 1 ? 0 : Math.PI;
                this.pitch = 0; this.health = 100; this.alive = true;
                this.keyMap = keyMap; this.isAiming = false;
                this.weaponLayer = weaponLayer;
                
                this.camera = new THREE.PerspectiveCamera(GAME_CONFIG.hipFOV, 0.5, 0.1, 500);
                this.camera.layers.enable(LAYERS.WORLD);
                this.camera.layers.enable(weaponLayer);
                this.camera.layers.disable(weaponLayer === LAYERS.P1_WEAPON ? LAYERS.P2_WEAPON : LAYERS.P1_WEAPON);
                
                this.camQuat = new THREE.Quaternion();
                this.respawnTimer = 0;
            }

            init(scene) {
                this.musket = new FlintlockMusket(scene, this.id, this.weaponLayer);
            }

            update(delta, players, useMouse) {
                if (!this.alive) {
                    this.respawnTimer -= delta;
                    if (this.respawnTimer <= 0) this.respawn();
                    return;
                }

                const k = this.keyMap;
                let moveForward = 0, turn = 0;

                if (keys[k.forward]) moveForward += 1;
                if (keys[k.back]) moveForward -= 1;
                
                // Keyboard turning or mouse
                if (useMouse) {
                    this.rotationY -= mouseDelta.x * 0.5;
                    this.pitch -= mouseDelta.y * 0.3;
                    this.pitch = Math.max(-0.5, Math.min(0.5, this.pitch));
                    mouseDelta.x = 0; mouseDelta.y = 0;
                } else {
                    if (keys[k.left]) turn += 1;
                    if (keys[k.right]) turn -= 1;
                    this.rotationY += turn * GAME_CONFIG.turnSpeed;
                }

                // Movement
                const speed = this.isAiming ? GAME_CONFIG.walkSpeed * 0.15 : GAME_CONFIG.walkSpeed;
                const newX = this.position.x + Math.sin(this.rotationY) * moveForward * speed * delta;
                const newZ = this.position.z + Math.cos(this.rotationY) * moveForward * speed * delta;

                let canMove = true;
                for (const other of players) {
                    if (other !== this && other.alive) {
                        const dist = Math.hypot(newX - other.position.x, newZ - other.position.z);
                        if (dist < 1.0) { canMove = false; break; }
                    }
                }

                if (canMove) {
                    this.position.x = Math.max(-48, Math.min(48, newX));
                    this.position.z = Math.max(-48, Math.min(48, newZ));
                }

                this.isAiming = keys[k.aim];

                // FOV transition
                const targetFOV = this.isAiming ? GAME_CONFIG.sightFOV : GAME_CONFIG.hipFOV;
                this.camera.fov += (targetFOV - this.camera.fov) * GAME_CONFIG.aimTransitionSpeed;
                this.camera.updateProjectionMatrix();

                this.updateCamera();
                this.musket.update(delta, this.camera.position, this.camQuat, this.isAiming);
            }

            updateCamera() {
                this.camera.position.copy(this.position);
                this.camera.position.y = 1.65;
                
                const euler = new THREE.Euler(this.pitch, this.rotationY, 0, 'YXZ');
                this.camQuat.setFromEuler(euler);
                this.camera.quaternion.copy(this.camQuat);
            }

            fire() {
                const data = this.musket.fire();
                if (data) {
                    // Visual recoil
                    this.pitch += 0.05;
                }
                return data;
            }

            takeDamage(amt) {
                this.health -= amt;
                if (this.health <= 0) { this.alive = false; this.health = 0; this.respawnTimer = 3; }
            }

            respawn() {
                this.alive = true; this.health = 100;
                this.position.set(this.id === 1 ? -15 : 15, 0, (Math.random() - 0.5) * 20);
                this.rotationY = this.id === 1 ? 0 : Math.PI; this.pitch = 0;
            }
        }

        // ============================================
        // GAME
        // ============================================
        class Game {
            constructor() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x7ba3c9);
                this.scene.fog = new THREE.Fog(0x7ba3c9, 30, 120);

                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                document.getElementById('gameContainer').appendChild(this.renderer.domElement);

                // Lighting
                const ambient = new THREE.AmbientLight(0xffffff, 0.5);
                this.scene.add(ambient);
                const dir = new THREE.DirectionalLight(0xffffff, 0.7);
                dir.position.set(60, 100, 40);
                dir.castShadow = true;
                dir.shadow.camera.left = -60; dir.shadow.camera.right = 60;
                dir.shadow.camera.top = 60; dir.shadow.camera.bottom = -60;
                this.scene.add(dir);

                this.createEnvironment();

                // Players with layer masks
                this.player1 = new Player(1, new THREE.Vector3(-15, 0, 0), playerKeys.p1, LAYERS.P1_WEAPON);
                this.player2 = new Player(2, new THREE.Vector3(15, 0, 0), playerKeys.p2, LAYERS.P2_WEAPON);
                this.players = [this.player1, this.player2];
                this.player1.init(this.scene);
                this.player2.init(this.scene);

                this.projectiles = new ProjectileManager(this.scene);
                this.lastFire = { p1: 0, p2: 0 };

                // Pointer lock for P1 mouse
                this.renderer.domElement.addEventListener('click', () => {
                    this.renderer.domElement.requestPointerLock();
                });

                window.addEventListener('resize', () => this.onResize());
                this.clock = new THREE.Clock();
                this.onResize();
                this.animate();
            }

            createEnvironment() {
                const groundGeo = new THREE.PlaneGeometry(100, 100, 20, 20);
                const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a5d4a, roughness: 0.9 });
                const pos = groundGeo.attributes.position;
                for (let i = 0; i < pos.count; i++) {
                    pos.setZ(i, Math.sin(pos.getX(i) * 0.08) * Math.cos(pos.getY(i) * 0.08) * 0.6);
                }
                groundGeo.computeVertexNormals();
                const ground = new THREE.Mesh(groundGeo, groundMat);
                ground.rotation.x = -Math.PI / 2;
                ground.layers.set(LAYERS.WORLD);
                ground.receiveShadow = true;
                this.scene.add(ground);

                // Trees
                for (let i = 0; i < 15; i++) {
                    const x = (Math.random() - 0.5) * 80, z = (Math.random() - 0.5) * 80;
                    if (Math.abs(x) > 12 || Math.abs(z) > 10) this.createTree(x, z);
                }
                // Barricades
                for (let i = 0; i < 10; i++) {
                    const x = (Math.random() - 0.5) * 60, z = (Math.random() - 0.5) * 60;
                    if (Math.abs(x) > 8 || Math.abs(z) > 8) this.createBarricade(x, z);
                }
            }

            createTree(x, z) {
                const trunkMat = new THREE.MeshStandardMaterial({ color: 0x3d2817 });
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.35, 2.5, 8), trunkMat);
                trunk.position.set(x, 1.25, z);
                trunk.layers.set(LAYERS.WORLD);
                trunk.castShadow = true;
                this.scene.add(trunk);

                const leaves = new THREE.Mesh(
                    new THREE.ConeGeometry(2.5, 5, 8),
                    new THREE.MeshStandardMaterial({ color: 0x1a3d0a })
                );
                leaves.position.set(x, 4.5, z);
                leaves.layers.set(LAYERS.WORLD);
                leaves.castShadow = true;
                this.scene.add(leaves);
            }

            createBarricade(x, z) {
                const bar = new THREE.Mesh(
                    new THREE.BoxGeometry(2 + Math.random() * 2, 1.8, 0.4),
                    new THREE.MeshStandardMaterial({ color: 0x4a3728 })
                );
                bar.position.set(x, 0.9, z);
                bar.rotation.y = Math.random() * Math.PI;
                bar.layers.set(LAYERS.WORLD);
                bar.castShadow = true;
                this.scene.add(bar);
            }

            onResize() {
                const w = window.innerWidth, h = window.innerHeight;
                this.renderer.setSize(w, h);
                const aspect = (w / 2) / h;
                this.player1.camera.aspect = aspect;
                this.player2.camera.aspect = aspect;
                this.player1.camera.updateProjectionMatrix();
                this.player2.camera.updateProjectionMatrix();
            }

            checkInput() {
                const now = this.clock.getElapsedTime();

                // P1 Fire (mouse click via pointer lock or E key)
                if ((keys[this.player1.keyMap.fire] || keys[' ']) && now - this.lastFire.p1 > 0.5) {
                    const data = this.player1.fire();
                    if (data) {
                        this.projectiles.spawn(data.position, data.direction, 1, data.flashInPan);
                        this.lastFire.p1 = now;
                    }
                }
                if (keysPressed[this.player1.keyMap.reload]) {
                    keysPressed[this.player1.keyMap.reload] = false;
                    this.player1.musket.startReload();
                }

                // P2 Fire
                if (keys[this.player2.keyMap.fire] && now - this.lastFire.p2 > 0.5) {
                    const data = this.player2.fire();
                    if (data) {
                        this.projectiles.spawn(data.position, data.direction, 2, data.flashInPan);
                        this.lastFire.p2 = now;
                    }
                }
                if (keysPressed[this.player2.keyMap.reload]) {
                    keysPressed[this.player2.keyMap.reload] = false;
                    this.player2.musket.startReload();
                }
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const delta = Math.min(this.clock.getDelta(), 0.1);

                this.player1.update(delta, this.players, true); // Mouse aim
                this.player2.update(delta, this.players, false); // Keyboard aim
                this.checkInput();
                this.projectiles.update(delta, this.players);

                const w = this.renderer.domElement.width, h = this.renderer.domElement.height;
                this.renderer.setScissorTest(true);

                this.renderer.setScissor(0, 0, w / 2, h);
                this.renderer.setViewport(0, 0, w / 2, h);
                this.renderer.render(this.scene, this.player1.camera);

                this.renderer.setScissor(w / 2, 0, w / 2, h);
                this.renderer.setViewport(w / 2, 0, w / 2, h);
                this.renderer.render(this.scene, this.player2.camera);

                this.renderer.setScissorTest(false);
            }
        }

        window.addEventListener('load', () => { window.game = new Game(); });
    </script>
</body>
</html>
