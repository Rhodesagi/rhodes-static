<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muskets Fire - 2 Player FPS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            color: rgba(255,255,255,0.7);
            font-family: monospace;
            font-size: 11px;
            pointer-events: none;
            z-index: 100;
            line-height: 1.5;
        }
        #centerLine {
            position: absolute;
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            background: rgba(255,255,255,0.3);
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="instructions">
        <b>P1 (Left):</b> WASD + Mouse | LMB=Fire | E=Sights | R=Reload<br>
        <b>P2 (Right):</b> Arrows=Move | IJKL=Look | Enter=Fire | .=Sights | /=Reload<br>
        <span style="color:#aa8">Or Gamepad: Right Stick=Look | RT=Fire | LT=Aim | X/Y=Reload</span><br>
        <span style="color:#888;font-size:10px">Click for mouse lock. Audio requires interaction.</span>
    </div>
    <div id="centerLine"></div>
    <canvas id="gameCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
