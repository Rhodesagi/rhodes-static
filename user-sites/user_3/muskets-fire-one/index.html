<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSKETS FIRE ONE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="instructions">
            <div class="player-instr">
                <h3>PLAYER 1 (Left)</h3>
                <p>WASD - Move</p>
                <p>Mouse - Aim</p>
                <p>L-Click - Fire / Iron Sights</p>
                <p>R - Reload</p>
            </div>
            <div class="player-instr">
                <h3>PLAYER 2 (Right)</h3>
                <p>IJKL - Move</p>
                <p>Arrow Keys - Aim</p>
                <p>R-Shift - Fire / Iron Sights</p>
                <p>Period - Reload</p>
            </div>
            <p id="start-hint">Click to Start</p>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="input.js"></script>
    <script src="musket.js"></script>
    <script src="player.js"></script>
    <script src="world.js"></script>
    <script src="game.js"></script>
</body>
</html>
