<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Musketeers Two</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden; 
            font-family: 'Courier New', monospace;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        canvas { display: block; }
        #divider {
            position: absolute;
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            background: #333;
            z-index: 10;
        }
        #start-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: #d4af37;
        }
        h1 { font-size: 48px; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .controls {
            display: flex;
            gap: 60px;
            margin: 30px 0;
        }
        .player-controls {
            background: rgba(212,175,55,0.1);
            padding: 20px 30px;
            border: 1px solid #d4af37;
            border-radius: 8px;
        }
        .player-controls h3 { 
            color: #fff; 
            margin-bottom: 15px;
            text-align: center;
        }
        .key { 
            display: inline-block; 
            background: #333; 
            padding: 4px 10px; 
            margin: 2px; 
            border-radius: 4px;
            font-size: 12px;
        }
        button {
            background: #d4af37;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        button:hover { background: #e5c048; }
        #reload-status-1, #reload-status-2 {
            position: absolute;
            bottom: 10%;
            font-size: 14px;
            color: #d4af37;
            opacity: 0;
            transition: opacity 0.2s;
        }
        #reload-status-1 { left: 25%; transform: translateX(-50%); }
        #reload-status-2 { right: 25%; transform: translateX(50%); }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="divider"></div>
        <div id="reload-status-1"></div>
        <div id="reload-status-2"></div>
        <div id="start-screen">
            <h1>⚔️ THE MUSKETEERS TWO ⚔️</h1>
            <div class="controls">
                <div class="player-controls">
                    <h3>PLAYER 1 (Left)</h3>
                    <div><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> Move</div>
                    <div><span class="key">Q</span><span class="key">E</span> Turn Musket</div>
                    <div><span class="key">X</span> Aim Down Sights</div>
                    <div><span class="key">F</span> Fire</div>
                    <div><span class="key">R</span> Reload</div>
                </div>
                <div class="player-controls">
                    <h3>PLAYER 2 (Right)</h3>
                    <div><span class="key">I</span><span class="key">J</span><span class="key">K</span><span class="key">L</span> Move</div>
                    <div><span class="key">U</span><span class="key">O</span> Turn Musket</div>
                    <div><span class="key">P</span> Aim Down Sights</div>
                    <div><span class="key">H</span> Fire</div>
                    <div><span class="key">Y</span> Reload</div>
                </div>
            </div>
            <button id="start-btn">CLICK TO START</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Flintlock reload states
        const ReloadState = {
            IDLE: 'IDLE',
            HALF_COCK: 'HALF_COCK',
            POUR_POWDER: 'POUR_POWDER',
            PATCH_BALL: 'PATCH_BALL',
            RAMROD_1: 'RAMROD_1',
            RAMROD_2: 'RAMROD_2',
            RAMROD_3: 'RAMROD_3',
            RETURN_ROD: 'RETURN_ROD',
            PRIME_PAN: 'PRIME_PAN',
            FULL_COCK: 'FULL_COCK'
        };

        let scene, renderer, player1, player2, targets = [], gameStarted = false;
        const clock = new THREE.Clock();

        class Musket {
            constructor(scene) {
                this.scene = scene;
                this.group = new THREE.Group();
                this.loaded = true;
                this.reloading = false;
                this.reloadState = ReloadState.IDLE;
                this.reloadTimer = 0;
                this.hammer = null;
                this.ramrodPivot = null;
                this.buildMusket();
                scene.add(this.group);
            }

            buildMusket() {
                const woodMat = new THREE.MeshLambertMaterial({ color: 0x5c3a21 });
                const steelMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
                const brassMat = new THREE.MeshLambertMaterial({ color: 0xd4af37 });
                const darkMat = new THREE.MeshLambertMaterial({ color: 0x222222 });

                const stock = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.08, 1.2), woodMat);
                stock.position.set(0, -0.04, 0.3);
                this.group.add(stock);

                const butt = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.09, 0.05), steelMat);
                butt.position.set(0, -0.04, 0.92);
                this.group.add(butt);

                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.03, 1.4, 16), steelMat);
                barrel.rotation.x = Math.PI / 2;
                barrel.position.set(0, 0.02, -0.4);
                this.group.add(barrel);

                for (let i = 0; i < 3; i++) {
                    const band = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.03, 16), brassMat);
                    band.rotation.x = Math.PI / 2;
                    band.position.set(0, 0.02, -0.1 - (i * 0.4));
                    this.group.add(band);
                }

                const frontSight = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.04, 0.01), steelMat);
                frontSight.position.set(0, 0.08, -1.1);
                this.group.add(frontSight);

                const rearSight = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.03, 0.01), steelMat);
                rearSight.position.set(0, 0.06, -0.15);
                this.group.add(rearSight);

                this.hammer = new THREE.Group();
                const hammerBase = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.08, 8), steelMat);
                hammerBase.rotation.z = Math.PI / 2;
                const hammerArm = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.08, 0.02), steelMat);
                hammerArm.position.set(0, 0.04, 0);
                const flint = new THREE.Mesh(new THREE.BoxGeometry(0.015, 0.03, 0.02), darkMat);
                flint.position.set(0, 0.08, 0);
                this.hammer.add(hammerBase, hammerArm, flint);
                this.hammer.position.set(0, 0.05, -0.05);
                this.group.add(this.hammer);

                const pan = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.01, 0.03), brassMat);
                pan.position.set(0, 0.04, -0.05);
                this.group.add(pan);

                const guardGeo = new THREE.TorusGeometry(0.04, 0.005, 4, 16, Math.PI);
                const guard = new THREE.Mesh(guardGeo, brassMat);
                guard.rotation.z = Math.PI;
                guard.position.set(0, -0.06, 0.1);
                this.group.add(guard);

                const trigger = new THREE.Mesh(new THREE.BoxGeometry(0.008, 0.04, 0.008), steelMat);
                trigger.rotation.x = -0.3;
                trigger.position.set(0, -0.06, 0.12);
                this.group.add(trigger);

                this.ramrodPivot = new THREE.Group();
                this.ramrodPivot.position.set(0, -0.06, -0.4);
                
                const ramrod = new THREE.Mesh(new THREE.CylinderGeometry(0.006, 0.006, 1.3, 8), steelMat);
                ramrod.rotation.x = Math.PI / 2;
                this.ramrodPivot.add(ramrod);
                
                for (let i = 0; i < 3; i++) {
                    const thimble = new THREE.Mesh(new THREE.TorusGeometry(0.015, 0.003, 4, 12), brassMat);
                    thimble.rotation.x = Math.PI / 2;
                    thimble.position.set(0, 0.08, -0.35 + (i * 0.4));
                    this.group.add(thimble);
                }
                
                this.group.add(this.ramrodPivot);
                this.setHammerPosition('full-cock');
            }

            setHammerPosition(pos) {
                if (pos === 'down') this.hammer.rotation.x = -0.5;
                else if (pos === 'half-cock') this.hammer.rotation.x = 0.3;
                else if (pos === 'full-cock') this.hammer.rotation.x = 0.8;
            }

            fire() {
                if (!this.loaded || this.reloading) return false;
                this.setHammerPosition('down');
                this.loaded = false;
                const flash = new THREE.PointLight(0xffaa00, 2, 3);
                flash.position.set(0, 0.1, -0.05);
                this.group.add(flash);
                setTimeout(() => this.group.remove(flash), 50);
                return true;
            }

            startReload() {
                if (this.loaded || this.reloading) return;
                this.reloading = true;
                this.reloadState = ReloadState.HALF_COCK;
                this.reloadTimer = 0;
                this.updateReloadStatus();
            }

            updateReloadStatus() {
                const statusEl = this === player1.musket ? 
                    document.getElementById('reload-status-1') : 
                    document.getElementById('reload-status-2');
                const stateNames = {
                    [ReloadState.HALF_COCK]: 'HALF-COCK SAFETY',
                    [ReloadState.POUR_POWDER]: 'POURING POWDER...',
                    [ReloadState.PATCH_BALL]: 'PATCH AND BALL...',
                    [ReloadState.RAMROD_1]: 'RAMMING (1/3)...',
                    [ReloadState.RAMROD_2]: 'RAMMING (2/3)...',
                    [ReloadState.RAMROD_3]: 'RAMMING (3/3)...',
                    [ReloadState.RETURN_ROD]: 'RETURNING ROD...',
                    [ReloadState.PRIME_PAN]: 'PRIMING PAN...',
                    [ReloadState.FULL_COCK]: 'FULL COCK - READY!'
                };
                if (this.reloading) {
                    statusEl.textContent = stateNames[this.reloadState] || 'RELOADING...';
                    statusEl.style.opacity = '1';
                } else {
                    statusEl.style.opacity = '0';
                }
            }

            update(delta) {
                if (!this.reloading) return;
                this.reloadTimer += delta;
                const stepDuration = 0.4;
                switch(this.reloadState) {
                    case ReloadState.HALF_COCK:
                        this.setHammerPosition('half-cock');
                        if (this.reloadTimer > stepDuration) {
                            this.reloadState = ReloadState.POUR_POWDER;
                            this.reloadTimer = 0;
                            this.updateReloadStatus();
                        }
                        break;
                    case ReloadState.POUR_POWDER:
                        this.group.rotation.x = Math.sin(this.reloadTimer * 10) * 0.1 - 0.2;
                        if (this.reloadTimer > stepDuration) {
                            this.group.rotation.x = 0;
                            this.reloadState = ReloadState.PATCH_BALL;
                            this.reloadTimer = 0;
                            this.updateReloadStatus();
                        }
                        break;
                    case ReloadState.PATCH_BALL:
                        if (this.reloadTimer > stepDuration) {
                            this.reloadState = ReloadState.RAMROD_1;
                            this.reloadTimer = 0;
                            this.updateReloadStatus();
                        }
                        break;
                    case ReloadState.RAMROD_1:
                        this.ramrodPivot.rotation.z = Math.min(this.reloadTimer * 2, 0.5);
                        this.ramrodPivot.position.y = Math.min(this.reloadTimer * 0.1, 0.3);
                        if (this.reloadTimer > stepDuration) {
                            this.reloadState = ReloadState.RAMROD_2;
                            this.reloadTimer = 0;
                            this.updateReloadStatus();
                        }
                        break;
                    case ReloadState.RAMROD_2:
                        this.ramrodPivot.position.z = Math.min((this.reloadTimer / stepDuration) * 0.6, 0.6);
                        if (this.reloadTimer > stepDuration) {
                            this.reloadState = ReloadState.RAMROD_3;
                            this.reloadTimer = 0;
                            this.updateReloadStatus();
                        }
                        break;
                    case ReloadState.RAMROD_3:
                        this.ramrodPivot.position.z = 0.6 - Math.min((this.reloadTimer / stepDuration) * 0.6, 0.6);
                        if (this.reloadTimer > stepDuration) {
                            this.reloadState = ReloadState.RETURN_ROD;
                            this.reloadTimer = 0;
                            this.updateReloadStatus();
                        }
                        break;
                    case ReloadState.RETURN_ROD:
                        this.ramrodPivot.rotation.z = 0.5 - Math.min(this.reloadTimer * 2, 0.5);
                        this.ramrodPivot.position.y = 0.3 - Math.min(this.reloadTimer * 0.1, 0.3);
                        if (this.reloadTimer > stepDuration) {
                            this.reloadState = ReloadState.PRIME_PAN;
                            this.reloadTimer = 0;
                            this.updateReloadStatus();
                        }
                        break;
                    case ReloadState.PRIME_PAN:
                        this.group.rotation.x = Math.sin(this.reloadTimer * 15) * 0.05;
                        if (this.reloadTimer > stepDuration) {
                            this.group.rotation.x = 0;
                            this.reloadState = ReloadState.FULL_COCK;
                            this.reloadTimer = 0;
                            this.updateReloadStatus();
                        }
                        break;
                    case ReloadState.FULL_COCK:
                        this.setHammerPosition('full-cock');
                        if (this.reloadTimer > stepDuration * 0.5) {
                            this.reloading = false;
                            this.loaded = true;
                            this.reloadState = ReloadState.IDLE;
                            this.updateReloadStatus();
                        }
                        break;
                }
            }
        }

        class Player {
            constructor(scene, startPos, isPlayer2) {
                this.scene = scene;
                this.isPlayer2 = isPlayer2;
                this.position = startPos.clone();
                this.rotation = isPlayer2 ? Math.PI : 0;
                this.musketRotation = 0;
                this.aiming = false;
                this.speed = 3;
                this.camera = new THREE.PerspectiveCamera(60, 0.5, 0.1, 1000);
                this.musket = new Musket(scene);
                this.projectiles = [];
            }

            updateMusketPosition() {
                const offset = new THREE.Vector3(
                    Math.sin(this.rotation + this.musketRotation) * 0.3,
                    this.aiming ? -0.05 : -0.15,
                    Math.cos(this.rotation + this.musketRotation) * 0.3
                );
                this.musket.group.position.copy(this.position).add(offset);
                this.musket.group.rotation.y = this.rotation + this.musketRotation + Math.PI;
                if (this.aiming) {
                    this.musket.group.position.copy(this.position);
                    this.musket.group.position.y += 0.05;
                    this.musket.group.rotation.y = this.rotation + this.musketRotation + Math.PI;
                }
            }

            updateCamera() {
                if (this.aiming) {
                    const sightOffset = new THREE.Vector3(
                        Math.sin(this.rotation + this.musketRotation) * 0.15,
                        0.02,
                        Math.cos(this.rotation + this.musketRotation) * 0.15
                    );
                    this.camera.position.copy(this.position).add(sightOffset);
                    this.camera.fov = 30;
                } else {
                    this.camera.position.copy(this.position);
                    this.camera.position.y = 1.6;
                    this.camera.fov = 60;
                }
                this.camera.updateProjectionMatrix();
                const lookTarget = new THREE.Vector3(
                    this.position.x + Math.sin(this.rotation + this.musketRotation) * 10,
                    this.aiming ? this.position.y : this.position.y + 1.6,
                    this.position.z + Math.cos(this.rotation + this.musketRotation) * 10
                );
                this.camera.lookAt(lookTarget);
            }

            move(dx, dz, delta) {
                if (this.musket.reloading) return;
                const moveSpeed = this.speed * delta;
                this.position.x += Math.sin(this.rotation) * dz * moveSpeed + Math.cos(this.rotation) * dx * moveSpeed;
                this.position.z += Math.cos(this.rotation) * dz * moveSpeed - Math.sin(this.rotation) * dx * moveSpeed;
                this.position.x = Math.max(-24, Math.min(24, this.position.x));
                this.position.z = Math.max(-24, Math.min(24, this.position.z));
            }

            turnMusket(dir) {
                this.musketRotation += dir * 0.05;
                this.musketRotation = Math.max(-0.5, Math.min(0.5, this.musketRotation));
            }

            toggleAim() {
                this.aiming = !this.aiming;
            }

            fire() {
                if (this.musket.fire()) {
                    const direction = new THREE.Vector3(
                        Math.sin(this.rotation + this.musketRotation),
                        0,
                        Math.cos(this.rotation + this.musketRotation)
                    );
                    const projectile = {
                        mesh: new THREE.Mesh(new THREE.SphereGeometry(0.02, 8, 8), new THREE.MeshBasicMaterial({ color: 0x222222 })),
                        velocity: direction.multiplyScalar(80),
                        life: 2
                    };
                    projectile.mesh.position.copy(this.position);
                    projectile.mesh.position.y = 1.5;
                    this.scene.add(projectile.mesh);
                    this.projectiles.push(projectile);
                    const flash = new THREE.PointLight(0xffaa00, 3, 5);
                    flash.position.copy(this.position).add(direction.clone().multiplyScalar(0.5));
                    flash.position.y = 1.5;
                    this.scene.add(flash);
                    setTimeout(() => this.scene.remove(flash), 30);
                }
            }

            reload() {
                this.musket.startReload();
            }

            update(delta) {
                this.musket.update(delta);
                this.updateMusketPosition();
                this.updateCamera();
                for (let i = this.projectiles.length - 1; i >= 0; i--) {
                    const p = this.projectiles[i];
                    p.life -= delta;
                    p.mesh.position.add(p.velocity.clone().multiplyScalar(delta));
                    for (let target of targets) {
                        if (p.mesh.position.distanceTo(target.mesh.position) < 1) {
                            target.hit();
                            this.scene.remove(p.mesh);
                            this.projectiles.splice(i, 1);
                            break;
                        }
                    }
                    if (p.life <= 0 && this.projectiles[i]) {
                        this.scene.remove(p.mesh);
                        this.projectiles.splice(i, 1);
                    }
                }
            }
        }

        class Target {
            constructor(scene, x, z) {
                this.scene = scene;
                const geo = new THREE.CylinderGeometry(0.5, 0.5, 2, 16);
                const mat = new THREE.MeshLambertMaterial({ color: 0xcc0000 });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.set(x, 1, z);
                scene.add(this.mesh);
                const stripeGeo = new THREE.CylinderGeometry(0.51, 0.51, 0.3, 16);
                const stripeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                this.stripe = new THREE.Mesh(stripeGeo, stripeMat);
                this.stripe.position.set(x, 1, z);
                scene.add(this.stripe);
            }
            hit() {
                this.mesh.material.color.setHex(0x00cc00);
                setTimeout(() => this.mesh.material.color.setHex(0xcc0000), 500);
            }
        }

        function init() { console.log("INIT STARTED"); alert("Game initializing...");
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshLambertMaterial({ color: 0x3a5f0b }));
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            for (let i = 0; i < 30; i++) {
                const tree = new THREE.Mesh(new THREE.ConeGeometry(1.5, 6, 8), new THREE.MeshLambertMaterial({ color: 0x1a3d0b }));
                tree.position.set((Math.random() - 0.5) * 80, 3, (Math.random() - 0.5) * 80);
                scene.add(tree);
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 2, 8), new THREE.MeshLambertMaterial({ color: 0x4a3728 }));
                trunk.position.set(tree.position.x, 1, tree.position.z);
                scene.add(trunk);
            }

            for (let i = 0; i < 10; i++) {
                targets.push(new Target(scene, (Math.random() - 0.5) * 60, (Math.random() - 0.5) * 60));
            }

            scene.add(new THREE.AmbientLight(0x404040, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setScissorTest(true);
            document.getElementById('game-container').appendChild(renderer.domElement);

            player1 = new Player(scene, new THREE.Vector3(-10, 1.6, 0), false);
            player2 = new Player(scene, new THREE.Vector3(10, 1.6, 0), true);

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(e.key.toLowerCase())) e.preventDefault();
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        function handleInput(delta) {
            let dx1 = 0, dz1 = 0;
            if (keys['w']) dz1 -= 1;
            if (keys['s']) dz1 += 1;
            if (keys['a']) dx1 -= 1;
            if (keys['d']) dx1 += 1;
            if (dx1 !== 0 || dz1 !== 0) player1.move(dx1, dz1, delta);
            if (keys['q']) player1.turnMusket(-1);
            if (keys['e']) player1.turnMusket(1);
            if (keys['x'] && !keys['x_prev']) player1.toggleAim();
            keys['x_prev'] = keys['x'];
            if (keys['f']) player1.fire();
            if (keys['r']) player1.reload();

            let dx2 = 0, dz2 = 0;
            if (keys['i']) dz2 -= 1;
            if (keys['k']) dz2 += 1;
            if (keys['j']) dx2 -= 1;
            if (keys['l']) dx2 += 1;
            if (dx2 !== 0 || dz2 !== 0) player2.move(dx2, dz2, delta);
            if (keys['u']) player2.turnMusket(-1);
            if (keys['o']) player2.turnMusket(1);
            if (keys['p'] && !keys['p_prev']) player2.toggleAim();
            keys['p_prev'] = keys['p'];
            if (keys['h']) player2.fire();
            if (keys['y']) player2.reload();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!gameStarted) return;
            const delta = Math.min(clock.getDelta(), 0.1);
            handleInput(delta);
            player1.update(delta);
            player2.update(delta);
            const width = window.innerWidth, height = window.innerHeight;
            renderer.setScissor(0, 0, width / 2, height);
            renderer.setViewport(0, 0, width / 2, height);
            renderer.render(scene, player1.camera);
            renderer.setScissor(width / 2, 0, width / 2, height);
            renderer.setViewport(width / 2, 0, width / 2, height);
            renderer.render(scene, player2.camera);
        }

        function startGame() { console.log("START GAME CALLED"); alert("Starting game...");
            document.getElementById('start-screen').style.display = 'none';
            gameStarted = true;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) new AudioContext();
        }

        init();
        // Add event listener for start button
        document.getElementById("start-btn").addEventListener("click", function() {
            console.log("Button clicked!");
            startGame();
        });
        animate();
    </script>
</body>
</html>
