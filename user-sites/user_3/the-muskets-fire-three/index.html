<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Muskets Fire Three</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #gameCanvas { display: block; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
        }
        .player-hud {
            position: absolute; padding: 20px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #p1-hud { top: 20px; left: 20px; border-left: 4px solid #4a9; }
        #p2-hud { top: 20px; right: 20px; text-align: right; border-right: 4px solid #a49; }
        .health-bar {
            width: 200px; height: 20px; background: rgba(0,0,0,0.5);
            border: 2px solid #fff; margin: 10px 0;
        }
        .health-fill { height: 100%; transition: width 0.3s; }
        #p1-health { background: linear-gradient(90deg, #4a9, #2a7); }
        #p2-health { background: linear-gradient(90deg, #a49, #827); }
        .ammo-status {
            font-size: 24px; font-weight: bold; margin-top: 10px;
        }
        .reload-stage {
            font-size: 14px; color: #ff8; margin-top: 5px;
            opacity: 0; transition: opacity 0.2s;
        }
        .reload-stage.active { opacity: 1; }
        #instructions {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: #fff; text-align: center; font-size: 14px;
            background: rgba(0,0,0,0.7); padding: 15px 30px; border-radius: 5px;
        }
        .key { display: inline-block; padding: 2px 8px; background: #333; border: 1px solid #666;
            border-radius: 3px; margin: 0 2px; font-size: 12px; }
        #victory {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 60px; font-weight: bold; color: #fff; text-align: center;
            text-shadow: 0 0 20px rgba(255,200,100,0.8); display: none;
        }
        #countdown {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 120px; font-weight: bold; color: #fff; text-shadow: 0 0 30px rgba(255,100,100,0.9);
        }
        .wound-indicator {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(255,0,0,0.3) 100%);
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div class="player-hud" id="p1-hud">
            <div>PLAYER 1</div>
            <div class="health-bar"><div class="health-fill" id="p1-health" style="width: 100%"></div></div>
            <div class="ammo-status" id="p1-ammo">LOADED</div>
            <div class="reload-stage" id="p1-reload">POWDER...</div>
        </div>
        
        <div class="player-hud" id="p2-hud">
            <div>PLAYER 2</div>
            <div class="health-bar"><div class="health-fill" id="p2-health" style="width: 100%"></div></div>
            <div class="ammo-status" id="p2-ammo">LOADED</div>
            <div class="reload-stage" id="p2-reload">POWDER...</div>
        </div>
        
        <div id="instructions">
            <div><strong>PLAYER 1:</strong> <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> Move | Mouse Aim | <span class="key">LMB</span> Fire | <span class="key">R</span> Reload</div>
            <div style="margin-top: 8px;"><strong>PLAYER 2:</strong> <span class="key">↑</span><span class="key">←</span><span class="key">↓</span><span class="key">→</span> Move | <span class="key">NUMPAD 4/6</span> Turn | <span class="key">NUMPAD 0</span> Fire | <span class="key">NUMPAD 1</span> Reload</div>
            <div style="margin-top: 8px; color: #ff8;">IRON SIGHTS: Hold <span class="key">RMB</span> (P1) / <span class="key">NUMPAD 5</span> (P2)</div>
        </div>
        
        <div id="countdown">3</div>
        <div id="victory"></div>
        <div class="wound-indicator" id="wound-fx"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
