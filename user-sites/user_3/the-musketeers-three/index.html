<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Musketeers Three</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Georgia', serif; }
        #gameCanvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #introScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; z-index: 100; }
        #introScreen h1 { font-size: 4rem; color: #d4af37; text-shadow: 3px 3px 6px rgba(0,0,0,0.8); margin-bottom: 1rem; letter-spacing: 4px; }
        #introScreen .subtitle { font-size: 1.5rem; color: #aaa; margin-bottom: 3rem; font-style: italic; }
        #playerSelect { display: flex; gap: 2rem; margin-bottom: 3rem; }
        .playerBtn { padding: 1.5rem 3rem; font-size: 1.3rem; background: rgba(212, 175, 55, 0.2); border: 2px solid #d4af37; color: #d4af37; cursor: pointer; transition: all 0.3s; font-family: 'Georgia', serif; }
        .playerBtn:hover { background: rgba(212, 175, 55, 0.4); transform: scale(1.05); }
        .controls { background: rgba(0,0,0,0.6); padding: 2rem; border-radius: 10px; color: #ccc; max-width: 600px; text-align: center; }
        .controls h3 { color: #d4af37; margin-bottom: 1rem; }
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; text-align: left; margin-top: 1rem; }
        .key { color: #d4af37; font-weight: bold; }
        #gameUI { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #turnIndicator { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 2rem; color: #d4af37; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); background: rgba(0,0,0,0.5); padding: 10px 30px; border-radius: 5px; }
        #reloadStatus { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); font-size: 1.2rem; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); background: rgba(0,0,0,0.5); padding: 8px 20px; border-radius: 5px; display: none; }
        #aimHint { position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%); font-size: 1rem; color: #aaa; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); display: none; }
        #hitMarker { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; color: #ff4444; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); display: none; animation: hitPulse 0.5s ease-out; }
        @keyframes hitPulse { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } }
        #victoryScreen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; z-index: 200; }
        #victoryScreen h2 { font-size: 4rem; color: #d4af37; margin-bottom: 2rem; }
        #victoryScreen button { padding: 1rem 2rem; font-size: 1.2rem; background: #d4af37; border: none; color: #1a1a2e; cursor: pointer; font-family: 'Georgia', serif; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="introScreen">
            <h1>⚔️ The Musketeers Three ⚔️</h1>
            <div class="subtitle">Honor. Precision. Powder.</div>
            <div id="playerSelect">
                <button class="playerBtn" onclick="startGame(1)">Player 1</button>
                <button class="playerBtn" onclick="startGame(2)">Player 2</button>
            </div>
            <div class="controls">
                <h3>⚜️ Controls ⚜️</h3>
                <div class="controls-grid">
                    <div><span class="key">W A S D</span> — Move</div>
                    <div><span class="key">Q / E</span> — Turn Musket</div>
                    <div><span class="key">X</span> — Iron Sights (Aim)</div>
                    <div><span class="key">F</span> — Fire</div>
                    <div><span class="key">R</span> — Reload</div>
                    <div><span class="key">ESC</span> — Release Mouse</div>
                </div>
                <p style="margin-top: 1rem; font-size: 0.9rem; color: #888;">Take turns. Each duelist has one shot. Aim true.</p>
            </div>
        </div>
        <div id="gameUI">
            <div id="turnIndicator">Player 1's Turn</div>
            <div id="aimHint">Hold X for Iron Sights</div>
            <div id="reloadStatus">Reloading...</div>
            <div id="hitMarker">☠️ HIT! ☠️</div>
        </div>
        <div id="victoryScreen">
            <h2 id="victoryText">Player 1 Wins!</h2>
            <button onclick="resetGame()">Duel Again</button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
