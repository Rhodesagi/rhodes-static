<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dueling Muskets</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.min.js"></script>
</head>
<body>
    <div id="container">
        <div id="player1-screen" class="screen">
            <canvas id="player1-canvas"></canvas>
            <div class="instructions">
                <h3>PLAYER 1</h3>
                <p>WASD: Move | Q/E: Tilt Musket | X: Aim | F: Fire | R: Reload</p>
                <p class="status" id="p1-status">Ready</p>
            </div>
        </div>
        <div id="player2-screen" class="screen">
            <canvas id="player2-canvas"></canvas>
            <div class="instructions">
                <h3>PLAYER 2</h3>
                <p>Arrow Keys: Move | I/K: Tilt Musket | M: Aim | .: Fire | L: Reload</p>
                <p class="status" id="p2-status">Ready</p>
            </div>
        </div>
    </div>
    <div id="game-over" class="hidden">
        <h1>DUEL OVER</h1>
        <p id="winner-text">Player 1 wins!</p>
        <button onclick="resetGame()">Restart Duel</button>
    </div>
    <script src="controls.js"></script>
    <script src="terrain.js"></script>
    <script src="musket.js"></script>
    <script src="player.js"></script>
    <script src="game.js"></script>
</body>
</html>
