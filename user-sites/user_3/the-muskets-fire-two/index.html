<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Muskets Fire Two</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        
        #game-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }
        
        .player-view {
            flex: 1;
            position: relative;
            border: 2px solid #333;
        }
        
        .player-view:first-child {
            border-right: 4px solid #444;
        }
        
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }
        
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: #ccc;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #8B4513;
        }
        
        .controls {
            display: flex;
            gap: 80px;
            margin: 30px 0;
        }
        
        .player-controls {
            text-align: left;
            padding: 20px;
            border: 1px solid #555;
            background: rgba(20,20,20,0.8);
        }
        
        .player-controls h3 {
            color: #fff;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .player-controls.p1 h3 { color: #4a90d9; }
        .player-controls.p2 h3 { color: #d94a4a; }
        
        .key {
            display: inline-block;
            background: #333;
            padding: 3px 8px;
            border-radius: 3px;
            margin: 2px;
            font-size: 0.9em;
        }
        
        button {
            padding: 15px 50px;
            font-size: 1.2em;
            background: #8B4513;
            color: white;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 30px;
        }
        
        button:hover { background: #A0522D; }
        
        #winner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 999;
            color: white;
        }
        
        #winner-text {
            font-size: 4em;
            margin-bottom: 30px;
        }
        
        .reload-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 14px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            display: none;
        }
        
        .reload-bar {
            width: 200px;
            height: 4px;
            background: #333;
            margin-top: 8px;
        }
        
        .reload-progress {
            height: 100%;
            background: #8B4513;
            width: 0%;
            transition: width 0.1s;
        }
        
        .round-counter {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 18px;
            background: rgba(0,0,0,0.5);
            padding: 10px 30px;
        }
        
        .health-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 150px;
            height: 20px;
            background: #333;
            border: 2px solid #555;
        }
        
        .health-fill {
            height: 100%;
            background: #4a9;
            width: 100%;
            transition: width 0.3s, background 0.3s;
        }
        
        .ammo-counter {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #fff;
            font-size: 24px;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>The Muskets Fire Two</h1>
        <p style="margin-bottom: 20px; color: #888;">Iron sights only. No crosshairs. One shot kills.</p>
        <div class="controls">
            <div class="player-controls p1">
                <h3>PLAYER 1 (Blue)</h3>
                <p><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> Move</p>
                <p><span class="key">SHIFT</span> Aim (Iron Sights)</p>
                <p><span class="key">F</span> Fire</p>
                <p><span class="key">R</span> Reload</p>
            </div>
            <div class="player-controls p2">
                <h3>PLAYER 2 (Red)</h3>
                <p><span class="key">↑</span><span class="key">←</span><span class="key">↓</span><span class="key">→</span> Move</p>
                <p><span class="key">ENTER</span> Aim (Iron Sights)</p>
                <p><span class="key">/</span> Fire</p>
                <p><span class="key">.</span> Reload</p>
            </div>
        </div>
        <button onclick="startGame()">Enter the Field</button>
    </div>
    
    <div id="winner-overlay">
        <div id="winner-text"></div>
        <button onclick="resetGame()">Next Round</button>
    </div>
    
    <div id="game-container">
        <div class="player-view" id="p1-view">
            <div class="round-counter" id="p1-rounds">Round 1</div>
            <div class="health-bar"><div class="health-fill" id="p1-health"></div></div>
            <div class="reload-indicator" id="p1-reload">
                <div id="p1-reload-text">Reloading...</div>
                <div class="reload-bar"><div class="reload-progress" id="p1-reload-bar"></div></div>
            </div>
            <div class="ammo-counter" id="p1-ammo">1 / 1</div>
        </div>
        <div class="player-view" id="p2-view">
            <div class="round-counter" id="p2-rounds">Round 1</div>
            <div class="health-bar"><div class="health-fill" id="p2-health"></div></div>
            <div class="reload-indicator" id="p2-reload">
                <div id="p2-reload-text">Reloading...</div>
                <div class="reload-bar"><div class="reload-progress" id="p2-reload-bar"></div></div>
            </div>
            <div class="ammo-counter" id="p2-ammo">1 / 1</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
