<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Musket Duellists</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="game-container">
        <div id="viewport-p1" class="viewport">
            <canvas id="canvas-p1"></canvas>
            <div class="player-label">PLAYER 1</div>
            <div class="controls-hint">WASD | Mouse Aim | Click Fire | R Reload</div>
            <div class="musket-state" id="state-p1">Ready</div>
        </div>
        <div id="viewport-p2" class="viewport">
            <canvas id="canvas-p2"></canvas>
            <div class="player-label">PLAYER 2</div>
            <div class="controls-hint">Arrows | Numpad 4/6 Aim | 0 Fire | . Reload / Gamepad</div>
            <div class="musket-state" id="state-p2">Ready</div>
        </div>
        <div id="center-line"></div>
        <div id="game-overlay">
            <div id="winner-display"></div>
            <button id="rematch-btn">REMATCH</button>
        </div>
    </div>

    <script src="js/assets.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/musket.js"></script>
    <script src="js/player.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
