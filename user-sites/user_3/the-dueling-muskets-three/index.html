<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dueling Muskets Three</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.min.js"></script>
</head>
<body>
    <div id="game-container">
        <div id="player1-view" class="viewport">
            <div class="hud">
                <div class="health-bar" id="p1-health-bar"></div>
                <div class="ammo" id="p1-ammo">READY</div>
                <div class="reload-status" id="p1-reload">[R] to reload</div>
                <div class="instructions">
                    Player 1: WASD move, Q/E turn musket, X aim, F fire, R reload
                </div>
            </div>
            <canvas id="player1-canvas"></canvas>
        </div>
        <div id="player2-view" class="viewport">
            <div class="hud">
                <div class="health-bar" id="p2-health-bar"></div>
                <div class="ammo" id="p2-ammo">READY</div>
                <div class="reload-status" id="p2-reload">[U] to reload</div>
                <div class="instructions">
                    Player 2: Arrows move, N/M turn musket, P aim, L fire, U reload
                </div>
            </div>
            <canvas id="player2-canvas"></canvas>
        </div>
    </div>
    <div id="game-over" style="display:none;">
        <h1 id="winner-text">Player 1 Wins!</h1>
        <button onclick="resetGame()">Restart Duel</button>
    </div>

    <script src="player.js"></script>
    <script src="musket.js"></script>
    <script src="game.js"></script>
</body>
</html>
