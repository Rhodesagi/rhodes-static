<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.8);
            background: linear-gradient(90deg, #e94560, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-board {
            display: flex;
            gap: 40px;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .score-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .score-label {
            color: #aaa;
            font-size: 0.9em;
        }

        .score-value {
            font-weight: bold;
            font-size: 1.3em;
            color: #feca57;
        }

        #gameCanvas {
            border: 4px solid #e94560;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.4), 
                        inset 0 0 50px rgba(0, 0, 0, 0.5);
            background: #0a0a0a;
        }

        .controls {
            margin-top: 20px;
            text-align: center;
            color: #888;
        }

        .controls p {
            margin: 5px 0;
        }

        .key {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.9em;
            margin: 0 2px;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            display: none;
            border: 2px solid #e94560;
            box-shadow: 0 0 40px rgba(233, 69, 96, 0.6);
        }

        #gameOver h2 {
            color: #e94560;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.8);
        }

        #gameOver p {
            font-size: 1.3em;
            margin: 10px 0;
        }

        #finalScore {
            color: #feca57;
            font-weight: bold;
            font-size: 1.5em;
        }

        #restartBtn {
            margin-top: 25px;
            padding: 15px 40px;
            font-size: 1.2em;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #restartBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.6);
        }

        .canvas-container {
            position: relative;
        }
    </style>
</head>
<body>
    <h1>🐍 SNAKE GAME 🐍</h1>
    
    <div class="score-board">
        <div class="score-item">
            <div class="score-label">SCORE</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">HIGH SCORE</div>
            <div class="score-value" id="highScore">0</div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="gameOver">
            <h2>GAME OVER</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p id="newRecord" style="color: #4cd137; display: none;">🏆 NEW RECORD! 🏆</p>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>

    <div class="controls">
        <p>Use <span class="key">↑</span> <span class="key">↓</span> <span class="key">←</span> <span class="key">→</span> or 
           <span class="key">W</span> <span class="key">S</span> <span class="key">A</span> <span class="key">D</span> to move</p>
        <p>Press <span class="key">SPACE</span> to pause</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverDiv = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const newRecordElement = document.getElementById('newRecord');
        const restartBtn = document.getElementById('restartBtn');

        const GRID_SIZE = 20;
        const CELL_SIZE = canvas.width / GRID_SIZE;
        const INITIAL_SPEED = 150;
        const MIN_SPEED = 60;
        const SPEED_DECREMENT = 2;

        let snake = [];
        let food = {};
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let gamePaused = false;
        let lastMoveTime = 0;
        let currentSpeed = INITIAL_SPEED;
        let particles = [];

        highScoreElement.textContent = highScore;

        const rainbowColors = [
            '#ff0000', '#ff7f00', '#ffff00', '#00ff00', 
            '#0000ff', '#4b0082', '#9400d3'
        ];

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            currentSpeed = INITIAL_SPEED;
            scoreElement.textContent = score;
            gameRunning = true;
            gamePaused = false;
            gameOverDiv.style.display = 'none';
            particles = [];
            
            spawnFood();
            requestAnimationFrame(gameLoop);
        }

        function spawnFood() {
            let validPosition = false;
            while (!validPosition) {
                food = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
                
                validPosition = true;
                for (let segment of snake) {
                    if (segment.x === food.x && segment.y === food.y) {
                        validPosition = false;
                        break;
                    }
                }
            }
        }

        function createParticles(x, y) {
            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'];
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x * CELL_SIZE + CELL_SIZE / 2,
                    y: y * CELL_SIZE + CELL_SIZE / 2,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1.0,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            for (let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;
        }

        function update(currentTime) {
            if (!gameRunning || gamePaused) return;

            if (currentTime - lastMoveTime < currentSpeed) return;
            lastMoveTime = currentTime;

            direction = { ...nextDirection };

            const head = { ...snake[0] };
            head.x += direction.x;
            head.y += direction.y;

            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver();
                return;
            }

            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                createParticles(food.x, food.y);
                
                currentSpeed = Math.max(MIN_SPEED, currentSpeed - SPEED_DECREMENT);
                
                spawnFood();
            } else {
                snake.pop();
            }

            updateParticles();
        }

        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#ff6b6b';
            const foodPadding = 2;
            ctx.fillRect(
                food.x * CELL_SIZE + foodPadding,
                food.y * CELL_SIZE + foodPadding,
                CELL_SIZE - foodPadding * 2,
                CELL_SIZE - foodPadding * 2
            );
            ctx.shadowBlur = 0;

            snake.forEach((segment, index) => {
                const colorIndex = index % rainbowColors.length;
                ctx.fillStyle = rainbowColors[colorIndex];
                
                if (index === 0) {
                    ctx.shadowColor = rainbowColors[0];
                    ctx.shadowBlur = 15;
                    ctx.fillStyle = '#ff4757';
                }

                const padding = index === 0 ? 1 : 2;
                ctx.fillRect(
                    segment.x * CELL_SIZE + padding,
                    segment.y * CELL_SIZE + padding,
                    CELL_SIZE - padding * 2,
                    CELL_SIZE - padding * 2
                );
                ctx.shadowBlur = 0;

                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeSize = 3;
                    
                    if (direction.x === 1) {
                        ctx.fillRect(segment.x * CELL_SIZE + 12, segment.y * CELL_SIZE + 5, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * CELL_SIZE + 12, segment.y * CELL_SIZE + 12, eyeSize, eyeSize);
                    } else if (direction.x === -1) {
                        ctx.fillRect(segment.x * CELL_SIZE + 5, segment.y * CELL_SIZE + 5, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * CELL_SIZE + 5, segment.y * CELL_SIZE + 12, eyeSize, eyeSize);
                    } else if (direction.y === -1) {
                        ctx.fillRect(segment.x * CELL_SIZE + 5, segment.y * CELL_SIZE + 5, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * CELL_SIZE + 12, segment.y * CELL_SIZE + 5, eyeSize, eyeSize);
                    } else {
                        ctx.fillRect(segment.x * CELL_SIZE + 5, segment.y * CELL_SIZE + 12, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * CELL_SIZE + 12, segment.y * CELL_SIZE + 12, eyeSize, eyeSize);
                    }
                }
            });

            drawParticles();

            if (gamePaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
                ctx.font = '20px Arial';
                ctx.fillText('Press SPACE to resume', canvas.width / 2, canvas.height / 2 + 40);
            }
        }

        function gameLoop(currentTime) {
            update(currentTime);
            draw();
            
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        function gameOver() {
            gameRunning = false;
            finalScoreElement.textContent = score;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreElement.textContent = highScore;
                newRecordElement.style.display = 'block';
            } else {
                newRecordElement.style.display = 'none';
            }
            
            gameOverDiv.style.display = 'block';
        }

        document.addEventListener('keydown', (e) => {
            if (!gameRunning && e.key !== ' ') return;

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y === 0) {
                        nextDirection = { x: 0, y: -1 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y === 0) {
                        nextDirection = { x: 0, y: 1 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x === 0) {
                        nextDirection = { x: -1, y: 0 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x === 0) {
                        nextDirection = { x: 1, y: 0 };
                    }
                    e.preventDefault();
                    break;
                case ' ':
                    if (gameRunning) {
                        gamePaused = !gamePaused;
                    }
                    e.preventDefault();
                    break;
            }
        });

        restartBtn.addEventListener('click', initGame);

        initGame();
    </script>
</body>
</html>
