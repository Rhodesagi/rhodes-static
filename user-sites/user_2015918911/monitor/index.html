<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Monitoring Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 10px;
            border: 1px solid #333;
        }
        .header h1 {
            color: #00d4ff;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: #1a1a1a;
            border-radius: 20px;
            margin-top: 10px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse 2s infinite;
        }
        .status-dot.connected { background: #00ff88; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .panel {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }
        .panel.alert {
            animation: alert-flash 0.5s ease-in-out infinite alternate;
            border-color: #ff4444;
        }
        @keyframes alert-flash {
            from { box-shadow: 0 0 0 rgba(255, 68, 68, 0); }
            to { box-shadow: 0 0 20px rgba(255, 68, 68, 0.5); }
        }
        .panel h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .panel h2 .icon { font-size: 1.3em; }
        .metric-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #00ff88;
            margin: 10px 0;
        }
        .metric-value.warning { color: #ffaa00; }
        .metric-value.alert {
            color: #ff4444;
            animation: text-flash 0.5s ease-in-out infinite alternate;
        }
        @keyframes text-flash {
            from { opacity: 1; }
            to { opacity: 0.6; }
        }
        .metric-label { color: #888; font-size: 0.9em; }
        canvas {
            width: 100%;
            height: 150px;
            background: #0a0a0a;
            border-radius: 5px;
            margin-top: 10px;
        }
        .process-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .process-list table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
        }
        .process-list th {
            background: #2a2a2a;
            padding: 10px;
            text-align: left;
            color: #00d4ff;
            position: sticky;
            top: 0;
        }
        .process-list td {
            padding: 8px 10px;
            border-bottom: 1px solid #333;
        }
        .process-list tr:hover { background: #252525; }
        .process-list .cpu-high { color: #ff4444; font-weight: bold; }
        .log-viewer {
            max-height: 300px;
            overflow-y: auto;
            background: #0a0a0a;
            padding: 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
            line-height: 1.4;
        }
        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid #222;
            color: #aaa;
        }
        .log-entry:last-child { border-bottom: none; }
        .log-entry.error { color: #ff6666; }
        .log-entry.warning { color: #ffaa66; }
        .log-entry.info { color: #66aaff; }
        .alerts-panel { grid-column: 1 / -1; }
        .alerts-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .alert-item {
            background: #ff4444;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            animation: alert-flash 0.5s ease-in-out infinite alternate;
        }
        .no-alerts { color: #00ff88; font-style: italic; }
        .threshold-config {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            margin-top: 15px;
        }
        .threshold-input {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .threshold-input label { color: #888; font-size: 0.9em; }
        .threshold-input input {
            width: 60px;
            padding: 5px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 3px;
            text-align: center;
        }
        .threshold-input button {
            padding: 5px 15px;
            background: #00d4ff;
            border: none;
            color: #000;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }
        .threshold-input button:hover { background: #00aacc; }
        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔧 Server Monitoring Dashboard</h1>
        <div class="status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Connecting...</span>
        </div>
    </div>
    
    <div class="dashboard">
        <div class="panel alerts-panel" id="alerts-panel">
            <h2><span class="icon">⚠️</span> Active Alerts</h2>
            <div class="alerts-container" id="alerts-container">
                <span class="no-alerts">No active alerts</span>
            </div>
            <div class="threshold-config">
                <div class="threshold-input">
                    <label>CPU Alert %:</label>
                    <input type="number" id="cpu-threshold" value="80" min="1" max="100">
                </div>
                <div class="threshold-input">
                    <label>Memory Alert %:</label>
                    <input type="number" id="memory-threshold" value="85" min="1" max="100">
                </div>
                <div class="threshold-input">
                    <label>Disk Alert %:</label>
                    <input type="number" id="disk-threshold" value="90" min="1" max="100">
                </div>
                <div class="threshold-input">
                    <button onclick="updateThresholds()">Update Thresholds</button>
                </div>
            </div>
        </div>
        
        <div class="panel" id="cpu-panel">
            <h2><span class="icon">🖥️</span> CPU Usage</h2>
            <div class="metric-value" id="cpu-value">--%</div>
            <div class="metric-label"><span id="cpu-cores">--</span> cores</div>
            <canvas id="cpu-chart"></canvas>
        </div>
        
        <div class="panel" id="memory-panel">
            <h2><span class="icon">💾</span> Memory Usage</h2>
            <div class="metric-value" id="memory-value">--%</div>
            <div class="metric-label"><span id="memory-used">--</span> / <span id="memory-total">--</span> GB</div>
            <canvas id="memory-chart"></canvas>
        </div>
        
        <div class="panel" id="disk-panel">
            <h2><span class="icon">💿</span> Disk Usage</h2>
            <div class="metric-value" id="disk-value">--%</div>
            <div class="metric-label"><span id="disk-used">--</span> / <span id="disk-total">--</span> GB</div>
            <canvas id="disk-chart"></canvas>
        </div>
        
        <div class="panel" id="network-panel">
            <h2><span class="icon">🌐</span> Network I/O</h2>
            <div style="display: flex; gap: 20px; margin-bottom: 10px;">
                <div>
                    <div class="metric-value" id="net-recv" style="font-size: 1.5em;">--</div>
                    <div class="metric-label">↓ MB/s</div>
                </div>
                <div>
                    <div class="metric-value" id="net-sent" style="font-size: 1.5em;">--</div>
                    <div class="metric-label">↑ MB/s</div>
                </div>
            </div>
            <canvas id="network-chart"></canvas>
        </div>
        
        <div class="panel">
            <h2><span class="icon">⚙️</span> Top Processes</h2>
            <div class="process-list">
                <table>
                    <thead>
                        <tr>
                            <th>PID</th>
                            <th>Name</th>
                            <th>CPU %</th>
                            <th>Mem %</th>
                        </tr>
                    </thead>
                    <tbody id="process-list-body">
                        <tr><td colspan="4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="panel">
            <h2><span class="icon">📜</span> System Log</h2>
            <div class="log-viewer" id="log-viewer">
                <div class="log-entry">Loading syslog...</div>
            </div>
        </div>
    </div>
    
    <script src="dashboard.js"></script>
</body>
</html>
