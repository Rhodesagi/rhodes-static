<!DOCTYPE html>
<html><head><title>Salle du Congres — Versailles</title>
<style>body{margin:0;overflow:hidden;background:#1a1008}
#hud{position:fixed;bottom:10px;left:10px;color:#daa520;font:12px monospace;z-index:5;text-shadow:0 0 4px #000}
#info{position:fixed;top:10px;left:10px;color:#daa520;font:13px monospace;z-index:5;text-shadow:0 0 4px #000}
</style></head><body>
<div id="info">Salle du Congres | Click to look · WASD move · Shift=run · Arrows=turn</div>
<div id="hud"></div>
<script src="lib/three.min.js?v=137"></script>
<script>
/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 1: CONSTANTS + SCENE + RENDERER
   ═══════════════════════════════════════════════════════════════════════════ */
var W=32,D=28,H=12,TIERS=9,TH=0.6,TD=1.2,R0=3.5;
var WALL_R=W/2, COL_R=WALL_R-1.2, DRAPE_R=WALL_R-0.3, NCOLS=16;
var DS=THREE.DoubleSide, PI=Math.PI;
var AISLES=[PI*0.5,PI*0.25,PI*0.75,PI*0.15,PI*0.85];
var scene=new THREE.Scene();
scene.background=new THREE.Color(0xd8c8a8);
scene.fog=new THREE.Fog(0xd8c8a8,25,55);
var camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,80);
camera.position.set(0,1.7,2);camera.rotation.order='YXZ';
var renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 2: TEXTURES (all Canvas-painted)
   ═══════════════════════════════════════════════════════════════════════════ */
function mkTex(w,h,fn){var c=document.createElement('canvas');c.width=w;c.height=h;fn(c.getContext('2d'),w,h);var t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;}

var velvetTex=mkTex(64,64,function(c,w,h){
    c.fillStyle='#5a0a0a';c.fillRect(0,0,w,h);
    c.fillStyle='rgba(90,15,18,0.12)';for(var i=0;i<100;i++)c.fillRect(Math.random()*w,Math.random()*h,2,1);
    c.strokeStyle='rgba(80,12,15,0.08)';c.lineWidth=0.5;
    for(var i=0;i<h;i+=2){c.beginPath();c.moveTo(0,i);c.lineTo(w,i);c.stroke();}
    c.fillStyle='rgba(70,10,12,0.15)';
    for(var dy=0;dy<h;dy+=10)for(var dx=0;dx<w;dx+=10){
        var ox=(Math.floor(dy/10)%2)*5;
        c.beginPath();c.arc(dx+ox,dy,1,0,PI*2);c.fill();
    }
});
var woodTex=mkTex(64,64,function(c,w,h){
    c.fillStyle='#7a5a30';c.fillRect(0,0,w,h);
    c.strokeStyle='rgba(100,70,35,0.25)';c.lineWidth=1;
    for(var i=0;i<25;i++){c.beginPath();c.moveTo(Math.random()*w,0);c.lineTo(Math.random()*w,h);c.stroke();}
});
var marbleTex=mkTex(128,128,function(c,w,h){
    c.fillStyle='#c08070';c.fillRect(0,0,w,h);
    c.strokeStyle='rgba(200,170,150,0.25)';c.lineWidth=2;
    for(var i=0;i<20;i++){c.beginPath();c.moveTo(Math.random()*w,Math.random()*h);c.quadraticCurveTo(Math.random()*w,Math.random()*h,Math.random()*w,Math.random()*h);c.stroke();}
    c.strokeStyle='rgba(160,85,70,0.15)';c.lineWidth=1;
    for(var i=0;i<12;i++){c.beginPath();c.moveTo(Math.random()*w,Math.random()*h);c.quadraticCurveTo(Math.random()*w,Math.random()*h,Math.random()*w,Math.random()*h);c.stroke();}
});
var goldTex=mkTex(64,64,function(c,w,h){
    c.fillStyle='#d4af37';c.fillRect(0,0,w,h);
    c.fillStyle='rgba(220,190,60,0.3)';for(var i=0;i<30;i++)c.fillRect(Math.random()*w,Math.random()*h,4,3);
    c.fillStyle='rgba(160,120,30,0.2)';for(var i=0;i<20;i++)c.fillRect(Math.random()*w,Math.random()*h,3,4);
});
var floorTex=mkTex(128,128,function(c,w,h){
    // Warm marble tile — two close tones, no harsh grid
    for(var y=0;y<h;y+=32)for(var x=0;x<w;x+=32){
        var alt=(Math.floor(x/32)+Math.floor(y/32))%2;
        c.fillStyle=alt?'#c8b898':'#b0a080';
        c.fillRect(x,y,32,32);
        // Subtle marble veining
        c.strokeStyle=alt?'rgba(180,165,140,0.2)':'rgba(150,135,110,0.2)';
        c.lineWidth=1;
        c.beginPath();c.moveTo(x+Math.random()*32,y);
        c.quadraticCurveTo(x+16,y+16+Math.random()*8,x+Math.random()*32,y+32);c.stroke();
    }
    // Very subtle grout (nearly invisible)
    c.strokeStyle='rgba(160,145,125,0.1)';c.lineWidth=0.5;
    for(var i=0;i<w;i+=32){c.beginPath();c.moveTo(i,0);c.lineTo(i,h);c.stroke();}
    for(var i=0;i<h;i+=32){c.beginPath();c.moveTo(0,i);c.lineTo(w,i);c.stroke();}
});floorTex.repeat.set(4,4);
var carpetTex=mkTex(32,32,function(c,w,h){
    c.fillStyle='#5a0a0a';c.fillRect(0,0,w,h);
    c.fillStyle='rgba(80,15,15,0.15)';for(var i=0;i<40;i++)c.fillRect(Math.random()*w,Math.random()*h,2,2);
});
var ceilTex=mkTex(256,256,function(c,w,h){
    c.fillStyle='#c8a050';c.fillRect(0,0,w,h);
    for(var y=0;y<h;y+=64)for(var x=0;x<w;x+=64){
        c.fillStyle='#a08030';c.fillRect(x+2,y+2,60,60);
        c.fillStyle='#b89838';c.fillRect(x+6,y+6,52,52);
        c.fillStyle='#4a6a5a';c.fillRect(x+10,y+10,44,44);
        c.fillStyle='#e8c848';c.beginPath();c.arc(x+32,y+32,7,0,PI*2);c.fill();
        c.strokeStyle='#d4b040';c.lineWidth=2;c.strokeRect(x+4,y+4,56,56);
    }
});
var panelTex=mkTex(128,128,function(c,w,h){
    c.fillStyle='#d8c8a8';c.fillRect(0,0,w,h);
    c.strokeStyle='rgba(190,160,80,0.25)';c.lineWidth=2;
    for(var y=0;y<h;y+=32)for(var x=0;x<w;x+=32){c.strokeRect(x+3,y+3,26,26);}
    c.fillStyle='rgba(220,210,190,0.08)';
    for(var y=0;y<h;y+=32)for(var x=0;x<w;x+=32){c.fillRect(x+5,y+5,22,22);}
});
var drapeTex=mkTex(128,256,function(c,w,h){
    c.fillStyle='#4a0a0e';c.fillRect(0,0,w,h);
    for(var i=0;i<w;i+=6){
        var d=Math.sin(i*PI/6)*50;
        c.fillStyle='rgba('+(130+d)+','+(22+d/3)+','+(28+d/3)+',0.5)';c.fillRect(i,0,3,h);
        c.fillStyle='rgba('+(40-d/2)+','+(5)+','+(7)+',0.5)';c.fillRect(i+3,0,3,h);
    }
    // Highlight ridges
    c.fillStyle='rgba(160,30,38,0.15)';
    for(var i=0;i<w;i+=12){c.fillRect(i,0,2,h);}
    c.fillStyle='#c8a030';c.fillRect(0,0,w,6);c.fillRect(0,h-3,w,3);
});

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 3: MATERIALS
   ═══════════════════════════════════════════════════════════════════════════ */
var velvet=new THREE.MeshPhongMaterial({map:velvetTex,side:DS,color:0x6b1020,emissive:0x200505,emissiveIntensity:0.15,shininess:15,specular:0x331010});
var carpet=new THREE.MeshLambertMaterial({map:carpetTex,side:DS,color:0x5a0a0a});
var wood=new THREE.MeshLambertMaterial({map:woodTex,side:DS});
var marble=new THREE.MeshLambertMaterial({map:marbleTex,side:DS,emissive:0x3a2018,emissiveIntensity:0.12});
var gold=new THREE.MeshStandardMaterial({map:goldTex,side:DS,color:0xd4af37,metalness:0.7,roughness:0.3,emissive:0x604010,emissiveIntensity:0.3});
var cream=new THREE.MeshLambertMaterial({map:panelTex,side:DS});
var floorMat=new THREE.MeshLambertMaterial({map:floorTex,side:DS});
var ceilMat=new THREE.MeshLambertMaterial({map:ceilTex,side:DS,emissive:0x403020,emissiveIntensity:0.15});
var drapeMat=new THREE.MeshLambertMaterial({map:drapeTex,side:DS});

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 4: HEMICYCLE TIERS + SEATS
   ═══════════════════════════════════════════════════════════════════════════ */
function isAisle(a){for(var i=0;i<AISLES.length;i++)if(Math.abs(a-AISLES[i])<0.055)return true;return false;}
function addM(geo,mat,px,py,pz,ry){var m=new THREE.Mesh(geo,mat);m.position.set(px,py,pz);if(ry)m.rotation.y=ry;scene.add(m);return m;}

for(var t=0;t<TIERS;t++){
    var iR=R0+t*TD,oR=iR+TD,y=t*TH;
    // Tier floor
    var ring=new THREE.Mesh(new THREE.RingGeometry(iR,oR,48,1,0,PI),carpet);
    ring.rotation.x=-PI/2;ring.position.y=y+0.01;scene.add(ring);
    // Risers
    if(t>0)for(var i=0;i<24;i++){
        var a1=PI*i/24,a2=PI*(i+1)/24;
        var x1=Math.cos(a1)*iR,z1=Math.sin(a1)*iR,x2=Math.cos(a2)*iR,z2=Math.sin(a2)*iR;
        var g=new THREE.BufferGeometry();
        g.setAttribute('position',new THREE.BufferAttribute(new Float32Array([x1,y-TH,z1,x2,y-TH,z2,x2,y,z2,x1,y-TH,z1,x2,y,z2,x1,y,z1]),3));
        g.computeVertexNormals();scene.add(new THREE.Mesh(g,wood));
    }
    // Desk fronts
    for(var i=0;i<24;i++){
        var a1=PI*i/24,a2=PI*(i+1)/24;
        var x1=Math.cos(a1)*oR,z1=Math.sin(a1)*oR,x2=Math.cos(a2)*oR,z2=Math.sin(a2)*oR;
        var g=new THREE.BufferGeometry();
        g.setAttribute('position',new THREE.BufferAttribute(new Float32Array([x1,y,z1,x2,y,z2,x2,y+0.45,z2,x1,y,z1,x2,y+0.45,z2,x1,y+0.45,z1]),3));
        g.computeVertexNormals();scene.add(new THREE.Mesh(g,wood));
    }
    // Seats
    var nS=Math.floor(7+t*3);
    for(var s=0;s<nS;s++){
        var a=PI*(0.04+s*0.92/(nS-1));
        if(isAisle(a))continue;
        var r=iR+TD*0.5,sx=Math.cos(a)*r,sz=Math.sin(a)*r;
        var seat=new THREE.Group();
        // Curved back (half-cylinder, larger)
        var sb=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.22,0.42,16,1,false,0,PI),velvet);
        sb.position.set(0,0.35,-0.12);sb.rotation.y=PI;sb.rotation.x=0.28;seat.add(sb);
        // Gold wood frame strip on top edge of back (catches light, visible at distance)
        var sbf=new THREE.Mesh(new THREE.CylinderGeometry(0.23,0.23,0.025,16,1,false,0,PI),gold);
        sbf.position.set(0,0.57,-0.13);sbf.rotation.y=PI;sbf.rotation.x=0.28;seat.add(sbf);
        // Dark border ring at back edges (upholstery-meets-frame)
        var br=new THREE.Mesh(new THREE.TorusGeometry(0.225,0.012,6,16,PI),new THREE.MeshLambertMaterial({color:0x2a1508,side:THREE.DoubleSide}));
        br.position.set(0,0.56,-0.12);br.rotation.y=PI;br.rotation.x=0.28;seat.add(br);
        // Side border strips
        var bsl=new THREE.Mesh(new THREE.BoxGeometry(0.015,0.42,0.015),new THREE.MeshLambertMaterial({color:0x2a1508,side:THREE.DoubleSide}));
        bsl.position.set(-0.22,0.35,-0.12);bsl.rotation.x=0.28;seat.add(bsl);
        var bsr=new THREE.Mesh(new THREE.BoxGeometry(0.015,0.42,0.015),new THREE.MeshLambertMaterial({color:0x2a1508,side:THREE.DoubleSide}));
        bsr.position.set(0.22,0.35,-0.12);bsr.rotation.x=0.28;seat.add(bsr);
        // Padded cushion (flattened sphere for roundness)
        var sc=new THREE.Mesh(new THREE.SphereGeometry(0.2,8,6),velvet);
        sc.scale.set(1.0,0.35,0.7);sc.position.set(0,0.11,0.03);seat.add(sc);
        // Gilt armrests with scroll tops
        var al=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.22,0.28),gold);al.position.set(-0.2,0.22,0);seat.add(al);
        var ar=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.22,0.28),gold);ar.position.set(0.2,0.22,0);seat.add(ar);
        // Scroll tops (small torus)
        var stl=new THREE.Mesh(new THREE.TorusGeometry(0.03,0.015,6,8),gold);stl.position.set(-0.2,0.35,0.12);stl.rotation.y=PI/2;seat.add(stl);
        var str=new THREE.Mesh(new THREE.TorusGeometry(0.03,0.015,6,8),gold);str.position.set(0.2,0.35,0.12);str.rotation.y=PI/2;seat.add(str);
        // Armrest flat tops
        var atl=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.025,0.3),gold);atl.position.set(-0.2,0.34,0);seat.add(atl);
        var atr=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.025,0.3),gold);atr.position.set(0.2,0.34,0);seat.add(atr);
        seat.position.set(sx,y,sz);seat.rotation.y=-a+PI/2;
        scene.add(seat);
    }
}

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 5: CENTRAL FLOOR + TRIBUNE
   ═══════════════════════════════════════════════════════════════════════════ */
var cf=new THREE.Mesh(new THREE.CircleGeometry(R0,32,0,PI),floorMat);cf.rotation.x=-PI/2;cf.position.y=0.01;scene.add(cf);
var mf=new THREE.Mesh(new THREE.PlaneGeometry(W+6,D+6),floorMat);mf.rotation.x=-PI/2;mf.position.y=-0.01;mf.receiveShadow=true;scene.add(mf);
addM(new THREE.BoxGeometry(2.5,1,1.2),wood,0,0.5,-0.5);
addM(new THREE.BoxGeometry(2.7,0.06,1.4),wood,0,1.03,-0.5);
addM(new THREE.BoxGeometry(2.7,0.05,0.06),gold,0,1.06,-0.2);
addM(new THREE.BoxGeometry(0.06,0.9,0.06),gold,-1.2,0.5,-0.2);
addM(new THREE.BoxGeometry(0.06,0.9,0.06),gold,1.2,0.5,-0.2);

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 6: DRAPES (3D sinusoidal fold geometry)
   ═══════════════════════════════════════════════════════════════════════════ */
var FOLDS=6;
for(var i=0;i<32;i++){
    var a1=PI*i/32,a2=PI*(i+1)/32;
    for(var fi=0;fi<FOLDS;fi++){
        var fa=a1+(a2-a1)*fi/FOLDS,fb=a1+(a2-a1)*(fi+1)/FOLDS;
        var fA=Math.sin(fi*PI/(FOLDS/2))*0.35,fB=Math.sin((fi+1)*PI/(FOLDS/2))*0.35;
        var rA=DRAPE_R+fA,rB=DRAPE_R+fB;
        var x1=Math.cos(fa)*rA,z1=Math.sin(fa)*rA,x2=Math.cos(fb)*rB,z2=Math.sin(fb)*rB;
        var g=new THREE.BufferGeometry();
        g.setAttribute('position',new THREE.BufferAttribute(new Float32Array([x2,0,z2,x1,0,z1,x1,7.5,z1,x2,0,z2,x1,7.5,z1,x2,7.5,z2]),3));
        g.setAttribute('uv',new THREE.BufferAttribute(new Float32Array([1,0,0,0,0,1,1,0,0,1,1,1]),2));
        g.computeVertexNormals();scene.add(new THREE.Mesh(g,drapeMat));
    }
}

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 7: COLUMNS + CORINTHIAN CAPITALS
   ═══════════════════════════════════════════════════════════════════════════ */
for(var ci=0;ci<NCOLS;ci++){
    var a=PI*(0.04+ci*0.92/(NCOLS-1)),cx=Math.cos(a)*COL_R,cz=Math.sin(a)*COL_R;
    // Shaft (fluted — 16 facets)
    var shaft=addM(new THREE.CylinderGeometry(0.33,0.38,7.2,16),marble,cx,3.9,cz);shaft.castShadow=true;
    // Entasis bulge
    addM(new THREE.CylinderGeometry(0.36,0.36,0.25,16),marble,cx,2.7,cz);
    // Base: plinth + torus
    addM(new THREE.BoxGeometry(0.85,0.12,0.85),marble,cx,0.06,cz);
    var bt=new THREE.Mesh(new THREE.TorusGeometry(0.36,0.045,8,16),marble);bt.rotation.x=PI/2;bt.position.set(cx,0.2,cz);scene.add(bt);
    // Capital: necking + bell + abacus
    addM(new THREE.CylinderGeometry(0.26,0.28,0.1,12),gold,cx,7.56,cz);
    addM(new THREE.CylinderGeometry(0.52,0.3,0.6,12),gold,cx,7.87,cz);
    addM(new THREE.BoxGeometry(1.05,0.12,1.05),gold,cx,8.2,cz);
    // Volutes (4 corner scrolls)
    for(var vi=0;vi<4;vi++){
        var va=vi*PI/2+PI/4;
        var vt=new THREE.Mesh(new THREE.TorusGeometry(0.08,0.025,6,8,PI*1.5),gold);
        vt.position.set(cx+Math.cos(va)*0.4,8.05,cz+Math.sin(va)*0.4);vt.rotation.y=va;scene.add(vt);
    }
    // Acanthus leaves (8 fins)
    for(var li=0;li<8;li++){
        var la=li*PI/4;
        addM(new THREE.BoxGeometry(0.04,0.28,0.12),gold,cx+Math.cos(la)*0.35,7.72,cz+Math.sin(la)*0.35,-la);
    }
}

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 8: ENTABLATURE (architrave + frieze + cornice)
   ═══════════════════════════════════════════════════════════════════════════ */
function curvedBand(yBot,yTop,r,mat){
    for(var i=0;i<32;i++){
        var a1=PI*i/32,a2=PI*(i+1)/32;
        var x1=Math.cos(a1)*r,z1=Math.sin(a1)*r,x2=Math.cos(a2)*r,z2=Math.sin(a2)*r;
        var g=new THREE.BufferGeometry();
        g.setAttribute('position',new THREE.BufferAttribute(new Float32Array([x2,yBot,z2,x1,yBot,z1,x1,yTop,z1,x2,yBot,z2,x1,yTop,z1,x2,yTop,z2]),3));
        g.computeVertexNormals();scene.add(new THREE.Mesh(g,mat));
    }
}
curvedBand(8.3,8.6,COL_R,gold);       // architrave
curvedBand(8.6,9.1,COL_R+0.08,cream); // frieze
curvedBand(9.1,9.35,COL_R+0.2,gold);  // cornice

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 9: UPPER GALLERY + BALUSTRADE
   ═══════════════════════════════════════════════════════════════════════════ */
var galY=7.5,galRo=WALL_R-0.3,galRi=COL_R-0.8;
var galF=new THREE.Mesh(new THREE.RingGeometry(galRi,galRo,32,1,0,PI),wood);galF.rotation.x=-PI/2;galF.position.y=galY;scene.add(galF);
// Balusters (vase-shaped: 3 stacked cylinders)
for(var bi=0;bi<40;bi++){
    var ba=PI*(0.02+bi*0.96/39),bx=Math.cos(ba)*(galRi+0.08),bz=Math.sin(ba)*(galRi+0.08);
    addM(new THREE.CylinderGeometry(0.02,0.03,0.15,6),gold,bx,galY+0.08,bz);
    addM(new THREE.CylinderGeometry(0.03,0.05,0.25,6),gold,bx,galY+0.28,bz);
    addM(new THREE.CylinderGeometry(0.05,0.025,0.2,6),gold,bx,galY+0.5,bz);
}
// Top rail
var tr=new THREE.Mesh(new THREE.RingGeometry(galRi,galRi+0.08,32,1,0,PI),gold);tr.rotation.x=-PI/2;tr.position.y=galY+0.65;scene.add(tr);

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 10: WALLS + FRONT WALL + PAINTING
   ═══════════════════════════════════════════════════════════════════════════ */
// Upper curved wall (above entablature, panels with gilt frames)
curvedBand(9.35,H,WALL_R,cream);
// Gilt horizontal bands on upper wall
curvedBand(10.0,10.08,WALL_R+0.02,gold);
curvedBand(11.2,11.28,WALL_R+0.02,gold);
// Front wall
addM(new THREE.PlaneGeometry(W+8,H+4),cream,0,H/2,-D/2+0.5);
// Painting
var pTex=new THREE.TextureLoader().load('lib/couder-painting.jpg');
var pMat=new THREE.MeshLambertMaterial({map:pTex,side:DS});
addM(new THREE.PlaneGeometry(7.5,4.5),pMat,0,8.5,-D/2+0.62);
// Gilt frame
addM(new THREE.BoxGeometry(7.8,0.14,0.1),gold,0,10.78,-D/2+0.6);
addM(new THREE.BoxGeometry(7.8,0.14,0.1),gold,0,6.22,-D/2+0.6);
addM(new THREE.BoxGeometry(0.14,4.7,0.1),gold,-3.9,8.5,-D/2+0.6);
addM(new THREE.BoxGeometry(0.14,4.7,0.1),gold,3.9,8.5,-D/2+0.6);
// Pilasters flanking painting
addM(new THREE.BoxGeometry(0.4,7,0.2),marble,-5,4,-D/2+0.6);
addM(new THREE.BoxGeometry(0.4,7,0.2),marble,5,4,-D/2+0.6);
addM(new THREE.BoxGeometry(0.55,0.4,0.3),gold,-5,7.7,-D/2+0.6);
addM(new THREE.BoxGeometry(0.55,0.4,0.3),gold,5,7.7,-D/2+0.6);
// Side walls
addM(new THREE.PlaneGeometry(D+14,H+4),cream,-WALL_R,H/2,0,PI/2);
addM(new THREE.PlaneGeometry(D+14,H+4),cream,WALL_R,H/2,0,-PI/2);

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 11: CEILING + COFFERS
   ═══════════════════════════════════════════════════════════════════════════ */
var ceil=new THREE.Mesh(new THREE.PlaneGeometry(W+8,W+8),ceilMat);ceil.rotation.x=PI/2;ceil.position.set(0,H,2);scene.add(ceil);
// Radial ribs
for(var ri=0;ri<8;ri++){
    var ra=PI*(0.06+ri*0.88/7),rLen=WALL_R*0.85;
    var rib=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.18,rLen),gold);
    rib.position.set(Math.cos(ra)*rLen/2,H-0.09,Math.sin(ra)*rLen/2);rib.rotation.y=-ra+PI/2;scene.add(rib);
}
// Concentric arc ribs
for(var cr=0;cr<4;cr++){
    var arcR=4+cr*3.5;
    curvedBand(H-0.15,H,arcR,gold);
}
// Skylight
var skyG=new THREE.Mesh(new THREE.CircleGeometry(3.5,16,0,PI),new THREE.MeshBasicMaterial({color:0xfffff0,transparent:true,opacity:0.2}));
skyG.rotation.x=PI/2;skyG.position.set(0,H-0.01,5);scene.add(skyG);

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 12: CHANDELIERS + SCONCES
   ═══════════════════════════════════════════════════════════════════════════ */
function chandelier(px,py,pz,sc){
    var g=new THREE.Group();
    var ch=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,H-py,4),gold);ch.position.y=(H-py)/2;g.add(ch);
    var cr=new THREE.Mesh(new THREE.TorusGeometry(0.18*sc,0.035,6,12),gold);cr.rotation.x=PI/2;cr.position.y=0.5;g.add(cr);
    var bd=new THREE.Mesh(new THREE.CylinderGeometry(0.35*sc,0.15*sc,0.5,8),gold);bd.position.y=0.15;g.add(bd);
    for(var tier=0;tier<2;tier++){
        var ty=-tier*0.45,armR=(0.7-tier*0.15)*sc;
        for(var ai=0;ai<8;ai++){
            var aa=ai*PI/4,ax=Math.cos(aa),az=Math.sin(aa);
            var arm=new THREE.Mesh(new THREE.CylinderGeometry(0.018,0.018,armR,4),gold);
            arm.position.set(ax*armR/2,ty,az*armR/2);arm.rotation.z=PI/2;arm.rotation.y=-aa;g.add(arm);
            var dr=new THREE.Mesh(new THREE.OctahedronGeometry(0.03*sc,0),new THREE.MeshLambertMaterial({color:0xffffff,transparent:true,opacity:0.4,side:DS}));
            dr.position.set(ax*armR,ty-0.08,az*armR);g.add(dr);
            var fl=new THREE.Mesh(new THREE.SphereGeometry(0.025,4,4),new THREE.MeshBasicMaterial({color:0xffeeaa}));
            fl.position.set(ax*armR,ty+0.06,az*armR);g.add(fl);
        }
    }
    var fn=new THREE.Mesh(new THREE.SphereGeometry(0.1*sc,8,8),gold);fn.position.y=-0.55;g.add(fn);
    var lt=new THREE.PointLight(0xffcc66,1.8*sc,22,1.5);g.add(lt);
    g.position.set(px,py,pz);scene.add(g);
}
chandelier(0,H-2.5,6,1.5);
chandelier(-5,H-2.5,9,1.0);chandelier(5,H-2.5,9,1.0);
chandelier(-8,H-2.5,4,0.8);chandelier(8,H-2.5,4,0.8);

// Sconces
for(var si=0;si<12;si++){
    var sa=PI*(0.05+si*0.9/11),sr=COL_R+0.3;
    var sx=Math.cos(sa)*sr,sz=Math.sin(sa)*sr;
    addM(new THREE.BoxGeometry(0.05,0.05,0.35),gold,sx,5.2,sz,-sa);
    addM(new THREE.CylinderGeometry(0.07,0.12,0.22,6),gold,sx,5.4,sz);
    addM(new THREE.SphereGeometry(0.04,6,6),new THREE.MeshBasicMaterial({color:0xffdd88}),sx,5.55,sz);
    var sl=new THREE.PointLight(0xffbb55,0.8,12,1.5);sl.position.set(sx,5.5,sz);scene.add(sl);
}

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 13: LIGHTING
   ═══════════════════════════════════════════════════════════════════════════ */
scene.add(new THREE.AmbientLight(0xffeedd,0.25));
scene.add(new THREE.HemisphereLight(0xfff0dd,0x6a3a20,0.4));
var dir=new THREE.DirectionalLight(0xffeedd,0.5);
dir.position.set(0,H,5);dir.castShadow=true;
dir.shadow.mapSize.width=1024;dir.shadow.mapSize.height=1024;
dir.shadow.camera.near=0.5;dir.shadow.camera.far=30;
dir.shadow.camera.left=-20;dir.shadow.camera.right=20;
dir.shadow.camera.top=20;dir.shadow.camera.bottom=-20;
scene.add(dir);
var skyL=new THREE.PointLight(0xfffff0,1.2,35);skyL.position.set(0,H-0.5,5);scene.add(skyL);
for(var fi=-2;fi<=2;fi++){var fpl=new THREE.PointLight(0xffcc88,0.35,10);fpl.position.set(fi*3,11,-D/2+2);scene.add(fpl);}
var torch=new THREE.PointLight(0xffcc88,0.6,10,1.5);scene.add(torch);
for(var t=0;t<TIERS;t+=3){var lr=R0+t*TD+TD/2;for(var fi=0;fi<3;fi++){var la=PI*(0.2+fi*0.3);var tl=new THREE.PointLight(0xffddaa,0.15,5);tl.position.set(Math.cos(la)*lr,t*TH+1.2,Math.sin(la)*lr);scene.add(tl);}}

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 14: CONTROLS
   ═══════════════════════════════════════════════════════════════════════════ */
var keys={},yaw=PI,pitch=0.1,dragging=false,lmx=0,lmy=0;
document.addEventListener('keydown',function(e){keys[e.code]=true;});
document.addEventListener('keyup',function(e){keys[e.code]=false;});
renderer.domElement.addEventListener('mousedown',function(e){dragging=true;lmx=e.clientX;lmy=e.clientY;renderer.domElement.requestPointerLock();});
document.addEventListener('mouseup',function(){dragging=false;});
document.addEventListener('mousemove',function(e){
    if(document.pointerLockElement===renderer.domElement){yaw-=e.movementX*0.002;pitch-=e.movementY*0.002;}
    else if(dragging){yaw-=(e.clientX-lmx)*0.004;pitch-=(e.clientY-lmy)*0.004;lmx=e.clientX;lmy=e.clientY;}
    pitch=Math.max(-1.3,Math.min(1.3,pitch));
});

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 15: GAME LOOP
   ═══════════════════════════════════════════════════════════════════════════ */
var clock=new THREE.Clock();
function animate(){
    requestAnimationFrame(animate);
    var dt=Math.min(clock.getDelta(),0.05);
    var p=camera.position,speed=(keys.ShiftLeft||keys.ShiftRight)?8:4;
    if(keys.ArrowLeft)yaw+=2*dt;if(keys.ArrowRight)yaw-=2*dt;
    camera.rotation.y=yaw;camera.rotation.x=pitch;
    var fwd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);fwd.y=0;fwd.normalize();
    var right=new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);right.y=0;right.normalize();
    if(keys.KeyW||keys.ArrowUp){p.x+=fwd.x*speed*dt;p.z+=fwd.z*speed*dt;}
    if(keys.KeyS||keys.ArrowDown){p.x-=fwd.x*speed*dt;p.z-=fwd.z*speed*dt;}
    if(keys.KeyA){p.x-=right.x*speed*dt;p.z-=right.z*speed*dt;}
    if(keys.KeyD){p.x+=right.x*speed*dt;p.z+=right.z*speed*dt;}
    var dist=Math.sqrt(p.x*p.x+p.z*p.z);
    if(p.z>0&&dist>WALL_R-1.5){var ang=Math.atan2(p.z,p.x);p.x=Math.cos(ang)*(WALL_R-1.5);p.z=Math.sin(ang)*(WALL_R-1.5);}
    if(p.z<-D/2+1.5)p.z=-D/2+1.5;
    if(p.z<=0){if(p.x<-WALL_R+1)p.x=-WALL_R+1;if(p.x>WALL_R-1)p.x=WALL_R-1;}
    var pR=Math.sqrt(p.x*p.x+p.z*p.z),ti=0;
    if(p.z>0&&pR>R0){ti=Math.floor((pR-R0)/TD);ti=Math.max(0,Math.min(ti,TIERS-1));}
    var tgtY=ti*TH+1.7;if(pR<R0||p.z<=0)tgtY=1.7;
    p.y+=(tgtY-p.y)*0.12;
    if(isNaN(p.x)||isNaN(p.z))p.set(0,1.7,2);
    torch.position.set(p.x,p.y-0.3,p.z);
    document.getElementById('hud').textContent=p.x.toFixed(1)+','+p.z.toFixed(1)+' y:'+p.y.toFixed(1)+' Tier:'+(ti+1);
    renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',function(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script></body></html>
