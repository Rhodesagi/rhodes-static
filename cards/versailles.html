<!DOCTYPE html>
<html><head><title>Salle du Congres - Versailles</title>
<style>body{margin:0;overflow:hidden;background:#1a1008}
#hud{position:fixed;bottom:10px;left:10px;color:#daa520;font:12px monospace;z-index:5}
#info{position:fixed;top:10px;left:10px;color:#daa520;font:13px monospace;z-index:5}
</style>
</head><body>
<div id="info">Salle du Congres | Click to look, WASD move, Arrows turn</div>
<div id="hud"></div>
<script src="lib/three.min.js?v=137"></script>
<script>
var W=32, D=28, H=16, TIERS=9, TH=0.6, TD=1.2;
var DS=THREE.DoubleSide;

var scene=new THREE.Scene();
scene.background=new THREE.Color(0x1a1410);
scene.fog=new THREE.Fog(0x1a1410, 20, 60);

var camera=new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 80);
// Spawn: center of hall, looking at the curved back wall (the impressive view)
camera.position.set(0, 2, 0);
camera.rotation.order='YXZ';

var renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
document.body.appendChild(renderer.domElement);

// ── Textures ──
function mkTex(w,h,fn){var c=document.createElement('canvas');c.width=w;c.height=h;fn(c.getContext('2d'),w,h);var t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;}

var velvetTex=mkTex(64,64,function(c,w,h){c.fillStyle='#8b1520';c.fillRect(0,0,w,h);c.fillStyle='rgba(140,25,35,0.2)';for(var i=0;i<100;i++)c.fillRect(Math.random()*w,Math.random()*h,3,2);c.strokeStyle='rgba(100,15,25,0.15)';for(var i=0;i<h;i+=3){c.beginPath();c.moveTo(0,i);c.lineTo(w,i);c.stroke();}});
var woodTex=mkTex(64,64,function(c,w,h){c.fillStyle='#6a4a28';c.fillRect(0,0,w,h);c.strokeStyle='rgba(90,60,30,0.3)';for(var i=0;i<20;i++){c.beginPath();c.moveTo(Math.random()*w,0);c.lineTo(Math.random()*w,h);c.stroke();}});
var marbleTex=mkTex(64,64,function(c,w,h){c.fillStyle='#d4a090';c.fillRect(0,0,w,h);c.strokeStyle='rgba(190,130,110,0.2)';c.lineWidth=2;for(var i=0;i<6;i++){c.beginPath();c.moveTo(Math.random()*w,Math.random()*h);c.quadraticCurveTo(Math.random()*w,Math.random()*h,Math.random()*w,Math.random()*h);c.stroke();}});
var goldTex=mkTex(32,32,function(c,w,h){c.fillStyle='#d4a830';c.fillRect(0,0,w,h);c.fillStyle='rgba(210,180,50,0.3)';for(var i=0;i<20;i++)c.fillRect(Math.random()*w,Math.random()*h,3,2);});
var floorTex=mkTex(64,64,function(c,w,h){c.fillStyle='#4a3a22';c.fillRect(0,0,w,h);c.strokeStyle='rgba(70,50,30,0.3)';for(var i=0;i<w;i+=16){c.beginPath();c.moveTo(i,0);c.lineTo(i,h);c.stroke();}for(var i=0;i<h;i+=16){c.beginPath();c.moveTo(0,i);c.lineTo(w,i);c.stroke();}});
floorTex.repeat.set(4,4);
var ceilTex=mkTex(128,128,function(c,w,h){c.fillStyle='#c8a050';c.fillRect(0,0,w,h);for(var y=0;y<h;y+=32)for(var x=0;x<w;x+=32){c.fillStyle='#b09040';c.fillRect(x+2,y+2,28,28);c.fillStyle='#c8a850';c.fillRect(x+4,y+4,24,24);}});
var creamTex=mkTex(32,32,function(c,w,h){c.fillStyle='#e8dcc8';c.fillRect(0,0,w,h);});
var drapeTex=mkTex(128,256,function(c,w,h){
    c.fillStyle='#7a1218';c.fillRect(0,0,w,h);
    // Deep fold pattern
    for(var i=0;i<w;i+=8){
        var depth=Math.sin(i*Math.PI/8)*30;
        c.fillStyle='rgba('+(100+depth)+','+(15+depth/4)+','+(20+depth/4)+',0.5)';
        c.fillRect(i,0,4,h);
        c.fillStyle='rgba('+(140+depth)+','+(25+depth/3)+','+(30+depth/3)+',0.3)';
        c.fillRect(i+4,0,4,h);
    }
    // Horizontal gather lines
    c.strokeStyle='rgba(60,8,12,0.15)';c.lineWidth=1;
    for(var y=0;y<h;y+=20){c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
    // Gold trim at top
    c.fillStyle='#c8a030';c.fillRect(0,0,w,6);
    // Gold trim at bottom
    c.fillStyle='#c8a030';c.fillRect(0,h-4,w,4);
});

// Materials
var velvet=new THREE.MeshLambertMaterial({map:velvetTex,side:DS});
var wood=new THREE.MeshLambertMaterial({map:woodTex,side:DS});
var marble=new THREE.MeshLambertMaterial({map:marbleTex,side:DS});
var gold=new THREE.MeshLambertMaterial({map:goldTex,side:DS});
var cream=new THREE.MeshLambertMaterial({map:creamTex,side:DS});
var floorMat=new THREE.MeshLambertMaterial({map:floorTex,side:DS});
var ceilMat=new THREE.MeshLambertMaterial({map:ceilTex,side:DS});
var drapeMat=new THREE.MeshLambertMaterial({map:drapeTex,side:DS});

// ═══════════════════════════════════════
// HEMICYCLE TIERS — flat rings + box risers (NO ExtrudeGeometry)
// ═══════════════════════════════════════
for(var t=0;t<TIERS;t++){
    var iR=3.5+t*TD, oR=iR+TD, y=t*TH;
    // Flat floor ring
    var ring=new THREE.Mesh(new THREE.RingGeometry(iR,oR,48,1,0,Math.PI),((t%2==0)?floorMat:wood));
    ring.rotation.x=-Math.PI/2; ring.position.y=y+0.01;
    scene.add(ring);
    // Riser (vertical step face) — build as curved wall segments
    if(t>0){
        for(var i=0;i<24;i++){
            var a1=Math.PI*i/24,a2=Math.PI*(i+1)/24;
            var x1=Math.cos(a1)*iR,z1=Math.sin(a1)*iR;
            var x2=Math.cos(a2)*iR,z2=Math.sin(a2)*iR;
            var g=new THREE.BufferGeometry();
            g.setAttribute('position',new THREE.BufferAttribute(new Float32Array([x1,y-TH,z1,x2,y-TH,z2,x2,y,z2,x1,y-TH,z1,x2,y,z2,x1,y,z1]),3));
            g.computeVertexNormals();
            scene.add(new THREE.Mesh(g,wood));
        }
    }
    // Desk front at outer edge
    for(var i=0;i<24;i++){
        var a1=Math.PI*i/24,a2=Math.PI*(i+1)/24;
        var x1=Math.cos(a1)*oR,z1=Math.sin(a1)*oR;
        var x2=Math.cos(a2)*oR,z2=Math.sin(a2)*oR;
        var g=new THREE.BufferGeometry();
        g.setAttribute('position',new THREE.BufferAttribute(new Float32Array([x1,y,z1,x2,y,z2,x2,y+0.45,z2,x1,y,z1,x2,y+0.45,z2,x1,y+0.45,z1]),3));
        g.computeVertexNormals();
        scene.add(new THREE.Mesh(g,wood));
    }
    // Seats — L-shaped chairs with back + cushion + armrests
    var nSeats=Math.floor(10+t*5);
    for(var s=0;s<nSeats;s++){
        var a=Math.PI*(0.05+s*0.9/(nSeats-1)+0.025);
        var r=iR+TD*0.45;
        var sx=Math.cos(a)*r, sz=Math.sin(a)*r;
        var seat=new THREE.Group();
        // Back
        seat.add(new THREE.Mesh(new THREE.BoxGeometry(0.32,0.45,0.04),velvet)).position.set(0,0.32,-0.15);
        // Cushion
        seat.add(new THREE.Mesh(new THREE.BoxGeometry(0.32,0.04,0.28),velvet)).position.set(0,0.08,0);
        // Left armrest
        seat.add(new THREE.Mesh(new THREE.BoxGeometry(0.03,0.2,0.25),wood)).position.set(-0.16,0.18,0);
        // Right armrest
        seat.add(new THREE.Mesh(new THREE.BoxGeometry(0.03,0.2,0.25),wood)).position.set(0.16,0.18,0);
        // Legs (4)
        var legGeo=new THREE.CylinderGeometry(0.015,0.015,0.08,4);
        seat.add(new THREE.Mesh(legGeo,wood)).position.set(-0.12,0.04,-0.1);
        seat.add(new THREE.Mesh(legGeo,wood)).position.set(0.12,0.04,-0.1);
        seat.add(new THREE.Mesh(legGeo,wood)).position.set(-0.12,0.04,0.1);
        seat.add(new THREE.Mesh(legGeo,wood)).position.set(0.12,0.04,0.1);
        seat.position.set(sx,y,sz);
        seat.rotation.y=-a+Math.PI/2;
        scene.add(seat);
    }
}

// ═══════════════════════════════════════
// CENTRAL FLOOR
// ═══════════════════════════════════════
var cf=new THREE.Mesh(new THREE.CircleGeometry(3.5,32,0,Math.PI),floorMat);
cf.rotation.x=-Math.PI/2; cf.position.y=0.01; scene.add(cf);
// Main floor extending behind tribune
var mf=new THREE.Mesh(new THREE.PlaneGeometry(W,D),floorMat);
mf.rotation.x=-Math.PI/2; mf.position.set(0,-0.01,0); scene.add(mf);

// ═══════════════════════════════════════
// TRIBUNE
// ═══════════════════════════════════════
var trib=new THREE.Mesh(new THREE.BoxGeometry(2.5,1,1.2),wood);
trib.position.set(0,0.5,-0.5); scene.add(trib);
var tribTop=new THREE.Mesh(new THREE.BoxGeometry(2.7,0.06,1.4),wood);
tribTop.position.set(0,1.03,-0.5); scene.add(tribTop);

// ═══════════════════════════════════════
// FRONT WALL + PAINTING
// ═══════════════════════════════════════
var fw=new THREE.Mesh(new THREE.PlaneGeometry(W+2,H),cream);
fw.position.set(0,H/2,-D/2+0.5); scene.add(fw);
// Gold frame
var ft=new THREE.Mesh(new THREE.BoxGeometry(7.5,0.12,0.08),gold); ft.position.set(0,10.5,-D/2+0.6); scene.add(ft);
var fb=new THREE.Mesh(new THREE.BoxGeometry(7.5,0.12,0.08),gold); fb.position.set(0,6,-D/2+0.6); scene.add(fb);
var fl=new THREE.Mesh(new THREE.BoxGeometry(0.12,4.5,0.08),gold); fl.position.set(-3.75,8.25,-D/2+0.6); scene.add(fl);
var fr=new THREE.Mesh(new THREE.BoxGeometry(0.12,4.5,0.08),gold); fr.position.set(3.75,8.25,-D/2+0.6); scene.add(fr);
// Couder painting
var pTex=new THREE.TextureLoader().load('lib/couder-painting.jpg');
var painting=new THREE.Mesh(new THREE.PlaneGeometry(7,4),new THREE.MeshLambertMaterial({map:pTex,side:DS}));
painting.position.set(0,8.25,-D/2+0.62); scene.add(painting);

// ═══════════════════════════════════════
// CURVED BACK WALL (red drapes)
// ═══════════════════════════════════════
var wallR=W/2;
for(var i=0;i<32;i++){
    var a1=Math.PI*i/32,a2=Math.PI*(i+1)/32;
    var x1=Math.cos(a1)*wallR,z1=Math.sin(a1)*wallR;
    var x2=Math.cos(a2)*wallR,z2=Math.sin(a2)*wallR;
    var g=new THREE.BufferGeometry();
    // Inward-facing (normals toward center)
    g.setAttribute('position',new THREE.BufferAttribute(new Float32Array([
        x2,0,z2, x1,0,z1, x1,H,z1, x2,0,z2, x1,H,z1, x2,H,z2
    ]),3));
    g.setAttribute('uv',new THREE.BufferAttribute(new Float32Array([
        1,0, 0,0, 0,1, 1,0, 0,1, 1,1
    ]),2));
    g.computeVertexNormals();
    scene.add(new THREE.Mesh(g,drapeMat));
}

// ═══════════════════════════════════════
// COLUMNS (around perimeter)
// ═══════════════════════════════════════
var nCols=14;
for(var i=0;i<nCols;i++){
    var a=Math.PI*(0.06+i*0.88/(nCols-1));
    var cr=wallR-1;
    var cx=Math.cos(a)*cr, cz=Math.sin(a)*cr;
    // Thicker shaft with fluting hint (12-sided)
    var shaft=new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.32,7.5,12),marble);
    shaft.position.set(cx,4,cz); scene.add(shaft);
    // Corinthian capital — layered rings + wider top
    var capBase=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.28,0.2,12),gold);
    capBase.position.set(cx,7.85,cz); scene.add(capBase);
    var capMid=new THREE.Mesh(new THREE.CylinderGeometry(0.38,0.3,0.25,12),gold);
    capMid.position.set(cx,8.05,cz); scene.add(capMid);
    var capTop=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.12,0.8),gold);
    capTop.position.set(cx,8.24,cz); scene.add(capTop);
    // Scrolls (simplified volutes — small spheres at corners)
    for(var vi=0;vi<4;vi++){
        var va=vi*Math.PI/2;
        var vol=new THREE.Mesh(new THREE.SphereGeometry(0.08,6,6),gold);
        vol.position.set(cx+Math.cos(va)*0.32,8.1,cz+Math.sin(va)*0.32);
        scene.add(vol);
    }
    // Base with molding
    var baseBot=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.42,0.15,12),marble);
    baseBot.position.set(cx,0.08,cz); scene.add(baseBot);
    var baseMid=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.4,0.15,12),marble);
    baseMid.position.set(cx,0.22,cz); scene.add(baseMid);
}

// ═══════════════════════════════════════
// UPPER GALLERY
// ═══════════════════════════════════════
var galY=8.5, galR=wallR-0.5, galRi=wallR-2;
var galFloor=new THREE.Mesh(new THREE.RingGeometry(galRi,galR,32,1,0,Math.PI),wood);
galFloor.rotation.x=-Math.PI/2; galFloor.position.y=galY; scene.add(galFloor);
// Balustrade
for(var i=0;i<30;i++){
    var a=Math.PI*(0.02+i*0.96/29);
    var bx=Math.cos(a)*(galRi+0.1), bz=Math.sin(a)*(galRi+0.1);
    var bar=new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.025,0.8,4),gold);
    bar.position.set(bx,galY+0.4,bz); scene.add(bar);
}
// Railing
var rail=new THREE.Mesh(new THREE.RingGeometry(galRi,galRi+0.06,32,1,0,Math.PI),gold);
rail.rotation.x=-Math.PI/2; rail.position.y=galY+0.8; scene.add(rail);

// ═══════════════════════════════════════
// CEILING
// ═══════════════════════════════════════
// Coffered ceiling base
var ceil=new THREE.Mesh(new THREE.CircleGeometry(wallR+1,32,0,Math.PI),ceilMat);
ceil.rotation.x=Math.PI/2; ceil.position.y=H; scene.add(ceil);
var ceilFront=new THREE.Mesh(new THREE.PlaneGeometry(W+2,6),ceilMat);
ceilFront.rotation.x=Math.PI/2; ceilFront.position.set(0,H,-D/2+3); scene.add(ceilFront);
// Coffer grid ribs (gold beams forming grid pattern)
for(var ci=0;ci<8;ci++){
    var ca=Math.PI*(0.05+ci*0.9/7);
    var ribR=wallR*0.9;
    // Radial ribs
    var ribGeo=new THREE.BoxGeometry(0.08,0.15,ribR);
    var rib=new THREE.Mesh(ribGeo,gold);
    rib.position.set(Math.cos(ca)*ribR/2,H-0.08,Math.sin(ca)*ribR/2);
    rib.rotation.y=-ca+Math.PI/2;
    scene.add(rib);
}
// Concentric arc ribs
for(var ri=0;ri<4;ri++){
    var arcR=4+ri*3.5;
    for(var ai=0;ai<16;ai++){
        var a1=Math.PI*ai/16,a2=Math.PI*(ai+1)/16;
        var x1=Math.cos(a1)*arcR,z1=Math.sin(a1)*arcR;
        var x2=Math.cos(a2)*arcR,z2=Math.sin(a2)*arcR;
        var ag=new THREE.BufferGeometry();
        ag.setAttribute('position',new THREE.BufferAttribute(new Float32Array([
            x1,H,z1, x2,H,z2, x2,H-0.12,z2, x1,H,z1, x2,H-0.12,z2, x1,H-0.12,z1
        ]),3));
        ag.computeVertexNormals();
        scene.add(new THREE.Mesh(ag,gold));
    }
}
// Central skylight (glowing panel)
var skyGeo=new THREE.CircleGeometry(4,16,0,Math.PI);
var skyMat=new THREE.MeshBasicMaterial({color:0xfffff0,transparent:true,opacity:0.2});
var sky=new THREE.Mesh(skyGeo,skyMat);
sky.rotation.x=Math.PI/2; sky.position.y=H-0.02; scene.add(sky);
// Skylight light
var skyPt=new THREE.PointLight(0xfffff0,1.0,20);
skyPt.position.set(0,H-0.5,5); scene.add(skyPt);

// ═══════════════════════════════════════
// LIGHTING
// ═══════════════════════════════════════
scene.add(new THREE.AmbientLight(0xffeedd,0.5));
scene.add(new THREE.HemisphereLight(0xffeedd,0x4a3a20,0.4));
// Skylight
var skyL=new THREE.PointLight(0xfffff0,1.5,40);
skyL.position.set(0,H-1,4); scene.add(skyL);
// Directional from above
var dir=new THREE.DirectionalLight(0xffeedd,0.6);
dir.position.set(0,H,5); scene.add(dir);
// Wall sconces with bracket fixtures
for(var i=0;i<12;i++){
    var a=Math.PI*(0.06+i*0.88/11);
    var lr=wallR-1.2;
    var sx=Math.cos(a)*lr, sz=Math.sin(a)*lr;
    // Warm point light
    var l=new THREE.PointLight(0xffaa44,0.6,12,1.5);
    l.position.set(sx,6.5,sz); scene.add(l);
    // Bracket (gold arm)
    var bracket=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.04,0.3),gold);
    bracket.position.set(sx,6.2,sz); bracket.rotation.y=-a; scene.add(bracket);
    // Lamp body
    var lamp=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.1,0.2,6),gold);
    lamp.position.set(sx,6.35,sz); scene.add(lamp);
    // Flame glow
    var flame=new THREE.Mesh(new THREE.SphereGeometry(0.04,6,6),new THREE.MeshBasicMaterial({color:0xffdd88}));
    flame.position.set(sx,6.5,sz); scene.add(flame);
}
// Front wall lights
for(var i=-2;i<=2;i++){
    var fl2=new THREE.PointLight(0xffcc88,0.4,10);
    fl2.position.set(i*3.5,11,-D/2+2); scene.add(fl2);
}
// Player torch
var torch=new THREE.PointLight(0xffcc88,0.8,12,1.5);
scene.add(torch);
// Tier fill lights
for(var t=0;t<TIERS;t+=3){
    var lr=3.5+t*TD+TD/2;
    for(var i=0;i<3;i++){
        var la=Math.PI*(0.2+i*0.6/2);
        var tl=new THREE.PointLight(0xffddaa,0.2,5);
        tl.position.set(Math.cos(la)*lr,t*TH+1,Math.sin(la)*lr); scene.add(tl);
    }
}

// ═══════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════
var keys={},yaw=Math.PI,pitch=0.05,dragging=false,lmx=0,lmy=0;
document.addEventListener('keydown',function(e){keys[e.code]=true;});
document.addEventListener('keyup',function(e){keys[e.code]=false;});
renderer.domElement.addEventListener('mousedown',function(e){dragging=true;lmx=e.clientX;lmy=e.clientY;renderer.domElement.requestPointerLock();});
document.addEventListener('mouseup',function(){dragging=false;});
document.addEventListener('mousemove',function(e){
    if(document.pointerLockElement===renderer.domElement){yaw-=e.movementX*0.002;pitch-=e.movementY*0.002;}
    else if(dragging){yaw-=(e.clientX-lmx)*0.005;pitch-=(e.clientY-lmy)*0.005;lmx=e.clientX;lmy=e.clientY;}
    pitch=Math.max(-1.3,Math.min(1.3,pitch));
    camera.rotation.y=yaw;camera.rotation.x=pitch;
});

// ═══════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════
var clock=new THREE.Clock();
function animate(){
    requestAnimationFrame(animate);
    var dt=Math.min(clock.getDelta(),0.05);
    var p=camera.position;
    var speed=(keys.ShiftLeft||keys.ShiftRight)?8:4;
    // Arrow key rotation
    if(keys.ArrowLeft)yaw+=2*dt;
    if(keys.ArrowRight)yaw-=2*dt;
    camera.rotation.y=yaw;camera.rotation.x=pitch;
    // Movement
    var fwd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);fwd.y=0;fwd.normalize();
    var right=new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);right.y=0;right.normalize();
    if(keys.KeyW||keys.ArrowUp){p.x+=fwd.x*speed*dt;p.z+=fwd.z*speed*dt;}
    if(keys.KeyS||keys.ArrowDown){p.x-=fwd.x*speed*dt;p.z-=fwd.z*speed*dt;}
    if(keys.KeyA){p.x-=right.x*speed*dt;p.z-=right.z*speed*dt;}
    if(keys.KeyD){p.x+=right.x*speed*dt;p.z+=right.z*speed*dt;}
    // Boundary
    var dist=Math.sqrt(p.x*p.x+p.z*p.z);
    if(dist>wallR-1.5){var ang=Math.atan2(p.z,p.x);p.x=Math.cos(ang)*(wallR-1.5);p.z=Math.sin(ang)*(wallR-1.5);}
    if(p.z<-D/2+1)p.z=-D/2+1;
    // Auto height — walk up tiers
    var playerR=Math.sqrt(p.x*p.x+p.z*p.z);
    var tierIdx=(p.z>0)?Math.max(0,Math.floor((playerR-3.5)/TD)):0;
    var targetY=Math.min(tierIdx,TIERS-1)*TH+1.6;
    if(playerR<3.5||p.z<=0)targetY=1.6;
    p.y+=(targetY-p.y)*0.12;
    // NaN guard
    if(isNaN(p.x)||isNaN(p.z)){p.set(0,2,0);}
    // Torch
    torch.position.set(p.x,p.y-0.3,p.z);
    // HUD
    document.getElementById('hud').textContent=Math.round(p.x)+','+Math.round(p.z)+' y:'+p.y.toFixed(1)+' | Tier:'+(tierIdx+1);
    renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',function(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body></html>
