// ── EYES ──
function paintEye(cx,cy,flip){
    // Eye socket shadow
    fc.fillStyle='rgba(100,70,50,0.18)';
    fc.beginPath();fc.ellipse(cx,cy,52,35,0,0,Math.PI*2);fc.fill();
    // Eyeball white
    fc.fillStyle='#f0ece8';
    fc.beginPath();fc.ellipse(cx,cy,32,20,0,0,Math.PI*2);fc.fill();
    // Slight redness at corners
    fc.fillStyle='rgba(200,140,140,0.15)';
    fc.beginPath();fc.ellipse(cx-28*flip,cy,10,12,0,0,Math.PI*2);fc.fill();
    fc.beginPath();fc.ellipse(cx+28*flip,cy,8,10,0,0,Math.PI*2);fc.fill();
    // Iris
    var irisGrad=fc.createRadialGradient(cx+3,cy-3,2,cx,cy,18);
    irisGrad.addColorStop(0,'#667788');irisGrad.addColorStop(0.4,'#556677');
    irisGrad.addColorStop(0.8,'#445566');irisGrad.addColorStop(1,'#334455');
    fc.fillStyle=irisGrad;
    fc.beginPath();fc.arc(cx,cy,18,0,Math.PI*2);fc.fill();
    // Iris detail — radial lines
    fc.strokeStyle='rgba(80,100,120,0.3)';fc.lineWidth=1;
    for(var ri=0;ri<12;ri++){
        var a=ri*Math.PI/6;
        fc.beginPath();fc.moveTo(cx+Math.cos(a)*6,cy+Math.sin(a)*6);
        fc.lineTo(cx+Math.cos(a)*16,cy+Math.sin(a)*16);fc.stroke();
    }
    // Pupil
    fc.fillStyle='#111118';
    fc.beginPath();fc.arc(cx,cy,9,0,Math.PI*2);fc.fill();
    // Specular highlight
    fc.fillStyle='rgba(255,255,255,0.9)';
    fc.beginPath();fc.arc(cx+6,cy-6,4,0,Math.PI*2);fc.fill();
    fc.fillStyle='rgba(255,255,255,0.4)';
    fc.beginPath();fc.arc(cx-4,cy+4,2.5,0,Math.PI*2);fc.fill();
    // Upper eyelid
    fc.fillStyle='rgba(190,150,120,0.85)';
    fc.beginPath();fc.ellipse(cx,cy-6,36,22,0,Math.PI,Math.PI*2);fc.fill();
    // Eyelid crease
    fc.strokeStyle='rgba(140,100,70,0.4)';fc.lineWidth=2;
    fc.beginPath();fc.ellipse(cx,cy-14,38,18,0,Math.PI+0.3,Math.PI*2-0.3);fc.stroke();
    // Lower eyelid line
    fc.strokeStyle='rgba(160,120,90,0.25)';fc.lineWidth=1.5;
    fc.beginPath();fc.ellipse(cx,cy+4,34,18,0,0.2,Math.PI-0.2);fc.stroke();
    // Eyelashes — upper
    fc.strokeStyle='rgba(50,30,20,0.7)';fc.lineWidth=2;
    fc.beginPath();fc.ellipse(cx,cy-2,34,20,0,Math.PI+0.15,Math.PI*2-0.15);fc.stroke();
    // Lower lashes (subtle)
    fc.strokeStyle='rgba(80,50,30,0.3)';fc.lineWidth=1;
    fc.beginPath();fc.ellipse(cx,cy+2,32,18,0,0.2,Math.PI-0.2);fc.stroke();
    // Eyebrow
    fc.fillStyle='rgba(50,30,15,0.75)';
    fc.beginPath();
    fc.moveTo(cx-40,cy-38);
    fc.quadraticCurveTo(cx-10,cy-52,cx+35,cy-40);
    fc.quadraticCurveTo(cx-10,cy-44,cx-40,cy-38);
    fc.fill();
}

// Camera targets
var targets={
    face:{pos:[0,1.55,1.2],look:[0,1.53,0]},
    hat:{pos:[0,1.9,0.8],look:[0,1.75,0]},
    torso:{pos:[0.3,1.1,1.2],look:[0,1.1,0]},
    hands:{pos:[0.4,1.0,0.8],look:[0.05,1.0,0.1]},
    legs:{pos:[0.3,0.4,1.5],look:[0,0.4,0]},
    full:{pos:[0,1.3,3.2],look:[0,1.0,0]}
};
var camTarget=targets.full;
var camLerp=0;

window.zoomTo=function(name){
    camTarget=targets[name]||targets.full;
    camLerp=0;
    document.getElementById('info').textContent=' → '+name.toUpperCase();
};

// Animate
var time=0;
function animate(){
    requestAnimationFrame(animate);
    time+=0.01;

    // Gentle idle
    N.rotation.y=Math.sin(time*0.3)*0.08;
    torso.scale.y=1+Math.sin(time*1.5)*0.008;
    headGroup.rotation.y=Math.sin(time*0.4)*0.02;
    headGroup.rotation.x=Math.sin(time*0.3+1)*0.01;

    // Camera lerp
    if(camLerp<1){
        camLerp=Math.min(1,camLerp+0.02);
        var t=camLerp*camLerp*(3-2*camLerp); // smoothstep
        camera.position.lerp(new THREE.Vector3(camTarget.pos[0],camTarget.pos[1],camTarget.pos[2]),t);
        var lookTarget=new THREE.Vector3(camTarget.look[0],camTarget.look[1],camTarget.look[2]);
        camera.lookAt(lookTarget);
    }

    renderer.render(scene,camera);
}
animate();

// Keyboard camera controls
document.addEventListener('keydown',function(e){
    if(e.key==='1')zoomTo('face');
    if(e.key==='2')zoomTo('hat');
    if(e.key==='3')zoomTo('torso');
    if(e.key==='4')zoomTo('hands');
    if(e.key==='5')zoomTo('legs');
    if(e.key==='6')zoomTo('full');
});

window.addEventListener('resize',function(){
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
zoomTo('face');
