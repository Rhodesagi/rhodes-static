<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhodes Language Courses</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e8e8e8;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }
        h1 {
            color: #00ff41;
            font-size: 28px;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #8aa0a6;
            font-size: 13px;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }
        .status-badge {
            display: inline-block;
            background: #ff4444;
            color: #fff;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 3px;
            letter-spacing: 1px;
            margin-bottom: 40px;
        }
        .courses {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            max-width: 800px;
            width: 100%;
        }
        .course {
            border: 1px solid #1d2a2d;
            padding: 30px 25px;
            text-decoration: none;
            color: #e8e8e8;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .course:hover {
            border-color: #26c6da;
            background: rgba(38, 198, 218, 0.05);
        }
        .course .lang {
            font-size: 20px;
            font-weight: bold;
            color: #26c6da;
            margin-bottom: 8px;
        }
        .course .info {
            font-size: 11px;
            color: #8aa0a6;
        }
        .back {
            margin-top: 50px;
            color: #8aa0a6;
            text-decoration: none;
            font-size: 13px;
        }
        .back:hover { color: #00ff41; }
    </style>
</head>
<body>
    <h1>LANGUAGE COURSES</h1>
    <div class="subtitle">RHODES FSI ENHANCED</div>
    <div class="status-badge">DEV / DARK MODE BROKEN</div>
    <div class="courses">
        <a href="/rhodes-french/" class="course">
            <div class="lang">FRENCH</div>
            <div class="info">10,999 drills &middot; 7,139 audio</div>
        </a>
        <a href="/rhodes-german/" class="course">
            <div class="lang">GERMAN</div>
            <div class="info">1,589 drills</div>
        </a>
        <a href="/rhodes-spanish/" class="course">
            <div class="lang">SPANISH</div>
            <div class="info">651 drills</div>
        </a>
        <a href="/rhodes-italian/" class="course">
            <div class="lang">ITALIAN</div>
            <div class="info">1,372 drills &middot; 3,454 audio</div>
        </a>
        <a href="/rhodes-russian/" class="course">
            <div class="lang">RUSSIAN</div>
            <div class="info">1,557 drills &middot; 1,034 audio</div>
        </a>
    </div>
    <a href="/" class="back">&larr; BACK TO RHODES</a>
</body>
</html>
