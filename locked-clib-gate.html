<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Rhodes</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:#0b0d10; color:#f5f7fb; font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    .gate { width:min(360px,calc(100vw - 32px)); display:grid; gap:14px; }
    label { font-size:13px; color:#b8c0cc; }
    input, button { height:42px; border-radius:6px; font:inherit; }
    input { box-sizing:border-box; width:100%; border:1px solid #343a46; background:#11151c; color:#f5f7fb; padding:0 12px; outline:none; }
    input:focus { border-color:#8ea7ff; }
    button { border:0; background:#f5f7fb; color:#101318; font-weight:700; cursor:pointer; }
    .error { min-height:18px; color:#ff8f8f; font-size:13px; }
  </style>
</head>
<body>
  <form class="gate" id="gate" autocomplete="off">
    <label for="code">Access code</label>
    <input id="code" name="code" inputmode="text" autocomplete="off" autofocus>
    <button type="submit">Enter</button>
    <div class="error" id="error" aria-live="polite"></div>
  </form>
  <script>
    (function () {
      'use strict';
      var form = document.getElementById('gate');
      var input = document.getElementById('code');
      var error = document.getElementById('error');
      form.addEventListener('submit', async function (event) {
        event.preventDefault();
        error.textContent = '';
        try {
          var response = await fetch('/api/locked-chat/clib-redteam/auth', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: input.value })
          });
          if (!response.ok) {
            error.textContent = 'Invalid code.';
            input.select();
            return;
          }
          location.reload();
        } catch (err) {
          error.textContent = 'Access check failed.';
          console.error(err);
        }
      });
    })();
  </script>
</body>
</html>
