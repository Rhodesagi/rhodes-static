<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Rhodes</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:#0b0d10; color:#f5f7fb; font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  </style>
</head>
<body>
  <script>
    (function () {
      'use strict';

      function lockedScript() {
        return String.raw`<script>
(function () {
  'use strict';

  var LOCKED_MODEL = 'clib1-replicator-redteam-k-0';
  var NativeWebSocket = window.WebSocket;
  var pendingMessages = [];

  function parsePacket(data) {
    if (typeof data !== 'string') return null;
    try { return JSON.parse(data); } catch (_) { return null; }
  }

  function stringifyPacket(packet) {
    try { return JSON.stringify(packet); } catch (_) { return null; }
  }

  function isUserMessage(packet) {
    return packet && packet.msg_type === 'user_message' && packet.payload;
  }

  function messageText(packet) {
    var payload = packet && packet.payload || {};
    return String(payload.message || payload.content || payload.text || '');
  }


  function LockedWebSocket(url, protocols) {
    var ws = protocols === undefined ? new NativeWebSocket(url) : new NativeWebSocket(url, protocols);
    var nativeSend = ws.send.bind(ws);
    var lockRequested = false;
    var modelReady = false;

    function requestLock() {
      if (lockRequested || ws.readyState !== NativeWebSocket.OPEN) return;
      lockRequested = true;
      nativeSend(JSON.stringify({ msg_type: 'model_set_request', request_id: 'locked-clib-' + Date.now(), payload: { model: LOCKED_MODEL } }));
    }

    function flushPending() {
      if (!modelReady || pendingMessages.length === 0) return;
      var queued = pendingMessages.splice(0, pendingMessages.length);
      queued.forEach(function (packet) {
        var serialized = stringifyPacket(packet);
        if (serialized) nativeSend(serialized);
      });
    }

    ws.addEventListener('open', function () { setTimeout(requestLock, 0); });
    ws.addEventListener('message', function (event) {
      var packet = parsePacket(event.data);
      if (!packet) return;
      if (packet.msg_type === 'auth_response' || packet.type === 'auth_response') setTimeout(requestLock, 0);
      if (packet.msg_type === 'model_set_response' || packet.type === 'model_set_response') {
        var payload = packet.payload || {};
        if (payload.success !== false) { modelReady = true; flushPending(); }
      }
    });

    ws.send = function (data) {
      var packet = parsePacket(data);
      if (!packet) { nativeSend(data); return; }
      if (packet.msg_type === 'auth_request') {
        packet.payload = packet.payload || {};
        packet.payload.force_new = true;
        packet.payload.resume_session = '';
        packet.payload.locked_model = LOCKED_MODEL;
        packet.payload.api_bridge_model = LOCKED_MODEL;
        var authData = stringifyPacket(packet);
        if (authData) nativeSend(authData);
        setTimeout(requestLock, 0);
        return;
      }
      if (packet.msg_type === 'model_set_request') {
        packet.payload = packet.payload || {};
        packet.payload.model = LOCKED_MODEL;
        modelReady = false;
        var modelData = stringifyPacket(packet);
        if (modelData) nativeSend(modelData);
        return;
      }
      if (isUserMessage(packet)) {
        var text = messageText(packet).trim();
        if (text.charAt(0) === '/') { console.warn('Rhodes locked chat blocked slash/model command:', text); return; }
        if (!modelReady) { pendingMessages.push(packet); requestLock(); return; }
      }
      var serialized = stringifyPacket(packet);
      nativeSend(serialized || data);
    };
    return ws;
  }

  Object.keys(NativeWebSocket).forEach(function (key) { try { LockedWebSocket[key] = NativeWebSocket[key]; } catch (_) {} });
  LockedWebSocket.prototype = NativeWebSocket.prototype;
  LockedWebSocket.CONNECTING = NativeWebSocket.CONNECTING;
  LockedWebSocket.OPEN = NativeWebSocket.OPEN;
  LockedWebSocket.CLOSING = NativeWebSocket.CLOSING;
  LockedWebSocket.CLOSED = NativeWebSocket.CLOSED;
  window.WebSocket = LockedWebSocket;
})();
` + '</' + 'script>';
      }

      function patchMainHtml(html) {
        var injection = '<base href="/">\n<meta name="robots" content="noindex,nofollow,noarchive">\n' + lockedScript();
        if (html.indexOf('<head>') !== -1) return html.replace('<head>', '<head>\n' + injection);
        return injection + html;
      }

      async function loadChat() {
        var response = await fetch('/index.html', { cache: 'no-store', credentials: 'same-origin' });
        if (!response.ok) throw new Error('Main page fetch failed: ' + response.status);
        document.open();
        document.write(patchMainHtml(await response.text()));
        document.close();
      }

      loadChat().catch(function (err) {
        document.body.textContent = 'Load failed.';
        console.error(err);
      });
    })();
  </script>
</body>
</html>
